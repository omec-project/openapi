        invalidParams:
        - reason: reason
          param: param
        - reason: reason
          param: param
        detail: detail
        accessTokenError:
          error_description: error_description
          error: invalid_request
          error_uri: error_uri
        nrfId: null
        status: 2
      properties:
        type:
          $ref: "#/components/schemas/Uri"
        title:
          type: string
        status:
          type: integer
        detail:
          description: A human-readable explanation specific to this occurrence of
            the problem.
          type: string
        instance:
          $ref: "#/components/schemas/Uri"
        cause:
          description: |
            A machine-readable application error cause specific to this occurrence of the problem.  This IE should be present and provide application-related error information, if available.
          type: string
        invalidParams:
          items:
            $ref: "#/components/schemas/InvalidParam"
          minItems: 1
          type: array
        supportedFeatures:
          $ref: "#/components/schemas/SupportedFeatures"
        accessTokenError:
          $ref: "#/components/schemas/AccessTokenErr"
        accessTokenRequest:
          $ref: "#/components/schemas/AccessTokenReq"
        nrfId:
          $ref: "#/components/schemas/Fqdn"
        supportedApiVersions:
          items:
            type: string
          minItems: 1
          type: array
        noProfileMatchInfo:
          $ref: "#/components/schemas/NoProfileMatchInfo"
      type: object
    Uri:
      description: String providing an URI formatted according to RFC 3986.
      type: string
    InvalidParam:
      description: It contains an invalid parameter and a related description.
      example:
        reason: reason
        param: param
      properties:
        param:
          description: |
            If the invalid parameter is an attribute in a JSON body, this IE shall contain the  attribute's name and shall be encoded as a JSON Pointer. If the invalid parameter is  an HTTP header, this IE shall be formatted as the concatenation of the string "header "  plus the name of such header. If the invalid parameter is a query parameter, this IE  shall be formatted as the concatenation of the string "query " plus the name of such  query parameter. If the invalid parameter is a variable part in the path of a resource  URI, this IE shall contain the name of the variable, including the symbols "{" and "}"  used in OpenAPI specification as the notation to represent variable path segments.
          type: string
        reason:
          description: |
            A human-readable reason, e.g. "must be a positive integer". In cases involving failed  operations in a PATCH request, the reason string should identify the operation that  failed using the operation's array index to assist in correlation of the invalid  parameter with the failed operation, e.g." Replacement value invalid for attribute  (failed operation index= 4)"
          type: string
      required:
      - param
      type: object
    SupportedFeatures:
      description: |
        A string used to indicate the features supported by an API that is used as defined in clause  6.6 in 3GPP TS 29.500. The string shall contain a bitmask indicating supported features in  hexadecimal representation Each character in the string shall take a value of "0" to "9",  "a" to "f" or "A" to "F" and shall represent the support of 4 features as described in  table 5.2.2-3. The most significant character representing the highest-numbered features shall  appear first in the string, and the character representing features 1 to 4 shall appear last  in the string. The list of features and their numbering (starting with 1) are defined  separately for each API. If the string contains a lower number of characters than there are  defined features for an API, all features that would be represented by characters that are not  present in the string are not supported.
      pattern: "^[A-Fa-f0-9]*$"
      type: string
    Fqdn:
      description: Fully Qualified Domain Name
      maxLength: 253
      minLength: 4
      pattern: "^([0-9A-Za-z]([-0-9A-Za-z]{0,61}[0-9A-Za-z])?\\.)+[A-Za-z]{2,63}\\\
        .?$"
      type: string
    RedirectResponse:
      description: |
        The response shall include a Location header field containing a different URI  (pointing to a different URI of an other service instance), or the same URI if a request  is redirected to the same target resource via a different SCP.
      example:
        targetSepp: null
        cause: cause
        targetScp: null
      properties:
        cause:
          type: string
        targetScp:
          $ref: "#/components/schemas/Uri"
        targetSepp:
          $ref: "#/components/schemas/Uri"
      type: object
    Gpsi:
      description: "String identifying a Gpsi shall contain either an External Id\
        \ or an MSISDN.  It shall be formatted as follows -External Identifier= \"\
        extid-'extid', where 'extid'  shall be formatted according to clause 19.7.2\
        \ of 3GPP TS 23.003 that describes an  External Identifier. \n"
      pattern: "^(msisdn-[0-9]{5,15}|extid-[^@]+@[^@]+|.+)$"
      type: string
    Supi:
      description: "String identifying a Supi that shall contain either an IMSI, a\
        \ network specific identifier,\na Global Cable Identifier (GCI) or a Global\
        \ Line Identifier (GLI) as specified in clause \n2.2A of 3GPP TS 23.003. It\
        \ shall be formatted as follows\n - for an IMSI \"imsi-<imsi>\", where <imsi>\
        \ shall be formatted according to clause 2.2\n   of 3GPP TS 23.003 that describes\
        \ an IMSI.\n - for a network specific identifier \"nai-<nai>, where <nai>\
        \ shall be formatted\n   according to clause 28.7.2 of 3GPP TS 23.003 that\
        \ describes an NAI.\n - for a GCI \"gci-<gci>\", where <gci> shall be formatted\
        \ according to clause 28.15.2\n   of 3GPP TS 23.003.\n - for a GLI \"gli-<gli>\"\
        , where <gli> shall be formatted according to clause 28.16.2 of\n   3GPP TS\
        \ 23.003.To enable that the value is used as part of an URI, the string shall\n\
        \   only contain characters allowed according to the \"lower-with-hyphen\"\
        \ naming convention\n   defined in 3GPP TS 29.501.\n"
      pattern: "^(imsi-[0-9]{5,15}|nai-.+|gci-.+|gli-.+|.+)$"
      type: string
    GroupId:
      description: "String identifying a group of devices network internal globally\
        \ unique ID which identifies a set of IMSIs, as specified in clause 19.9 of\
        \ 3GPP TS 23.003. \n"
      pattern: "^[A-Fa-f0-9]{8}-[0-9]{3}-[0-9]{2,3}-([A-Fa-f0-9][A-Fa-f0-9]){1,10}$"
      type: string
    PduSessionId:
      description: "Unsigned integer identifying a PDU session, within the range 0\
        \ to 255, as specified in  clause 11.2.3.1b, bits 1 to 8, of 3GPP TS 24.007.\
        \ If the PDU Session ID is allocated by the  Core Network for UEs not supporting\
        \ N1 mode, reserved range 64 to 95 is used. PDU Session ID  within the reserved\
        \ range is only visible in the Core Network. \n"
      maximum: 255
      minimum: 0
      type: integer
    PduSessionType:
      description: "PduSessionType indicates the type of a PDU session. It shall comply\
        \ with the provisions defined in table 5.4.3.3-1. \n"
      enum:
      - IPV4
      - IPV6
      - IPV4V6
      - UNSTRUCTURED
      - ETHERNET
      type: string
    Dnn:
      description: |
        String representing a Data Network as defined in clause 9A of 3GPP TS 23.003;  it shall contain either a DNN Network Identifier, or a full DNN with both the Network  Identifier and Operator Identifier, as specified in 3GPP TS 23.003 clause 9.1.1 and 9.1.2. It shall be coded as string in which the labels are separated by dots  (e.g. "Label1.Label2.Label3").
      type: string
    DnnSelectionMode:
      description: |
        DNN Selection Mode. Possible values are
        - VERIFIED
        - UE_DNN_NOT_VERIFIED
        - NW_DNN_NOT_VERIFIED
      enum:
      - VERIFIED
      - UE_DNN_NOT_VERIFIED
      - NW_DNN_NOT_VERIFIED
      type: string
    AccessType:
      description: Indicates whether the access is  via 3GPP or via non-3GPP.
      enum:
      - 3GPP_ACCESS
      - NON_3GPP_ACCESS
      type: string
    RatType:
      description: Indicates the radio access used.
      enum:
      - NR
      - EUTRA
      - WLAN
      - VIRTUAL
      - NBIOT
      - WIRELINE
      - WIRELINE_CABLE
      - WIRELINE_BBF
      - LTE-M
      - NR_U
      - EUTRA_U
      - TRUSTED_N3GA
      - TRUSTED_WLAN
      - UTRA
      - GERA
      - NR_LEO
      - NR_MEO
      - NR_GEO
      - NR_OTHER_SAT
      - NR_REDCAP
      - WB_E_UTRAN_LEO
      - WB_E_UTRAN_MEO
      - WB_E_UTRAN_GEO
      - WB_E_UTRAN_OTHERSAT
      - NB_IOT_LEO
      - NB_IOT_MEO
      - NB_IOT_GEO
      - NB_IOT_OTHERSAT
      - LTE_M_LEO
      - LTE_M_MEO
      - LTE_M_GEO
      - LTE_M_OTHERSAT
      - NR_EREDCAP
      type: string
    PlmnIdNid:
      description: |
        Contains the serving core network operator PLMN ID and, for an SNPN, the NID that together with the PLMN ID identifies the SNPN.
      example:
        mnc: null
        nid: null
        mcc: null
      properties:
        mcc:
          $ref: "#/components/schemas/Mcc"
        mnc:
          $ref: "#/components/schemas/Mnc"
        nid:
          $ref: "#/components/schemas/Nid"
      required:
      - mcc
      - mnc
      type: object
    Mcc:
      description: "Mobile Country Code part of the PLMN, comprising 3 digits, as\
        \ defined in clause 9.3.3.5 of 3GPP TS 38.413. \n"
      pattern: "^\\d{3}$"
      type: string
    Mnc:
      description: "Mobile Network Code part of the PLMN, comprising 2 or 3 digits,\
        \ as defined in  clause 9.3.3.5 of 3GPP TS 38.413. \n"
      pattern: "^\\d{2,3}$"
      type: string
    Nid:
      description: "This represents the Network Identifier, which together with a\
        \ PLMN ID is used to identify an SNPN (see 3GPP TS 23.003 and 3GPP TS 23.501\
        \ clause 5.30.2.1). \n"
      pattern: "^[A-Fa-f0-9]{11}$"
      type: string
    UserLocation:
      description: |
        At least one of eutraLocation, nrLocation and n3gaLocation shall be present. Several of them may be present.
      example:
        geraLocation:
          geographicalInformation: geographicalInformation
          ageOfLocationInformation: 19536
          cgi:
            plmnId:
              mnc: null
              mcc: null
            cellId: cellId
            lac: lac
          lai:
            plmnId:
              mnc: null
              mcc: null
            lac: lac
          mscNumber: mscNumber
          sai:
            sac: sac
            plmnId:
              mnc: null
              mcc: null
            lac: lac
          rai:
            rac: rac
            plmnId:
              mnc: null
              mcc: null
            lac: lac
          vlrNumber: vlrNumber
          locationNumber: locationNumber
          ueLocationTimestamp: null
          geodeticInformation: geodeticInformation
        eutraLocation:
          geographicalInformation: geographicalInformation
          globalNgenbId:
            eNbId: null
            wagfId: null
            tngfId: null
            gNbId:
              bitLength: 29
              gNBValue: gNBValue
            nid: null
            plmnId:
              mnc: null
              mcc: null
            n3IwfId: null
            ngeNbId: SMacroNGeNB-34B89
          ageOfLocationInformation: 2624
          ignoreEcgi: false
          globalENbId:
            eNbId: null
            wagfId: null
            tngfId: null
            gNbId:
              bitLength: 29
              gNBValue: gNBValue
            nid: null
            plmnId:
              mnc: null
              mcc: null
            n3IwfId: null
            ngeNbId: SMacroNGeNB-34B89
          tai:
            tac: null
            nid: null
            plmnId:
              mnc: null
              mcc: null
          ignoreTai: false
          ueLocationTimestamp: null
          geodeticInformation: geodeticInformation
          ecgi:
            eutraCellId: null
            nid: null
            plmnId:
              mnc: null
              mcc: null
        nrLocation:
          ignoreNcgi: false
          geographicalInformation: geographicalInformation
          globalGnbId:
            eNbId: null
            wagfId: null
            tngfId: null
            gNbId:
              bitLength: 29
              gNBValue: gNBValue
            nid: null
            plmnId:
              mnc: null
              mcc: null
            n3IwfId: null
            ngeNbId: SMacroNGeNB-34B89
          ageOfLocationInformation: 19750
          ncgi:
            nid: null
            plmnId:
              mnc: null
              mcc: null
            nrCellId: null
          ntnTaiInfo:
            tacList:
            - null
            - null
            derivedTac: null
            plmnId:
              mnc: null
              nid: null
              mcc: null
          tai:
            tac: null
            nid: null
            plmnId:
              mnc: null
              mcc: null
          ueLocationTimestamp: null
          geodeticInformation: geodeticInformation
        n3gaLocation:
          ueIpv4Addr: 198.51.100.1
          twapId:
            bssId: bssId
            civicAddress: null
            ssId: ssId
          hfcNodeId:
            hfcNId: null
          protocol: UDP
          gli: null
          n3gppTai:
            tac: null
            nid: null
            plmnId:
              mnc: null
              mcc: null
          tnapId:
            bssId: bssId
            civicAddress: null
            ssId: ssId
          w5gbanLineType: DSL
          ueIpv6Addr: 2001:db8:85a3::8a2e:370:7334
          gci: null
          n3IwfId: n3IwfId
          portNumber: null
        utraLocation:
          geographicalInformation: geographicalInformation
          ageOfLocationInformation: 4803
          cgi:
            plmnId:
              mnc: null
              mcc: null
            cellId: cellId
            lac: lac
          lai:
            plmnId:
              mnc: null
              mcc: null
            lac: lac
          sai:
            sac: sac
            plmnId:
              mnc: null
              mcc: null
            lac: lac
          rai:
            rac: rac
            plmnId:
              mnc: null
              mcc: null
            lac: lac
          ueLocationTimestamp: null
          geodeticInformation: geodeticInformation
      properties:
        eutraLocation:
          $ref: "#/components/schemas/EutraLocation"
        nrLocation:
          $ref: "#/components/schemas/NrLocation"
        n3gaLocation:
          $ref: "#/components/schemas/N3gaLocation"
        utraLocation:
          $ref: "#/components/schemas/UtraLocation"
        geraLocation:
          $ref: "#/components/schemas/GeraLocation"
      type: object
    EutraLocation:
      description: Contains the E-UTRA user location.
      example:
        geographicalInformation: geographicalInformation
        globalNgenbId:
          eNbId: null
          wagfId: null
          tngfId: null
          gNbId:
            bitLength: 29
            gNBValue: gNBValue
          nid: null
          plmnId:
            mnc: null
            mcc: null
          n3IwfId: null
          ngeNbId: SMacroNGeNB-34B89
        ageOfLocationInformation: 2624
        ignoreEcgi: false
        globalENbId:
          eNbId: null
          wagfId: null
          tngfId: null
          gNbId:
            bitLength: 29
            gNBValue: gNBValue
          nid: null
          plmnId:
            mnc: null
            mcc: null
          n3IwfId: null
          ngeNbId: SMacroNGeNB-34B89
        tai:
          tac: null
          nid: null
          plmnId:
            mnc: null
            mcc: null
        ignoreTai: false
        ueLocationTimestamp: null
        geodeticInformation: geodeticInformation
        ecgi:
          eutraCellId: null
          nid: null
          plmnId:
            mnc: null
            mcc: null
      properties:
        tai:
          $ref: "#/components/schemas/Tai"
        ignoreTai:
          default: false
          type: boolean
        ecgi:
          $ref: "#/components/schemas/Ecgi"
        ignoreEcgi:
          default: false
          description: |
            This flag when present shall indicate that the Ecgi shall be ignored When present, it shall be set as follows: - true: ecgi shall be ignored. - false (default): ecgi shall not be ignored.
          type: boolean
        ageOfLocationInformation:
          description: |
            The value represents the elapsed time in minutes since the last network contact of the mobile station.  Value "0" indicates that the location information was obtained after a successful paging procedure for Active Location Retrieval when the UE is in idle mode or after a successful NG-RAN location reporting procedure with the eNB when the UE is in connected mode.  Any other value than "0" indicates that the location information is the last known one.  See 3GPP TS 29.002 clause 17.7.8.
          maximum: 32767
          minimum: 0
          type: integer
        ueLocationTimestamp:
          $ref: "#/components/schemas/DateTime"
        geographicalInformation:
          description: |
            Refer to geographical Information. See 3GPP TS 23.032 clause 7.3.2. Only the description of an ellipsoid point with uncertainty circle is allowed to be used.
          pattern: "^[0-9A-F]{16}$"
          type: string
        geodeticInformation:
          description: |
            Refers to Calling Geodetic Location. See ITU-T Recommendation Q.763 (1999) [24] clause 3.88.2. Only the description of an ellipsoid point with uncertainty circle is allowed to be used.
          pattern: "^[0-9A-F]{20}$"
          type: string
        globalNgenbId:
          $ref: "#/components/schemas/GlobalRanNodeId"
        globalENbId:
          $ref: "#/components/schemas/GlobalRanNodeId"
      required:
      - ecgi
      - tai
      type: object
    Tai:
      description: Contains the tracking area identity as described in 3GPP 23.003
      example:
        tac: null
        nid: null
        plmnId:
          mnc: null
          mcc: null
      properties:
        plmnId:
          $ref: "#/components/schemas/PlmnId"
        tac:
          $ref: "#/components/schemas/Tac"
        nid:
          $ref: "#/components/schemas/Nid"
      required:
      - plmnId
      - tac
      type: object
    PlmnId:
      description: |
        When PlmnId needs to be converted to string (e.g. when used in maps as key), the string  shall be composed of three digits "mcc" followed by "-" and two or three digits "mnc".
      example:
        mnc: null
        mcc: null
      properties:
        mcc:
          $ref: "#/components/schemas/Mcc"
        mnc:
          $ref: "#/components/schemas/Mnc"
      required:
      - mcc
      - mnc
      type: object
    Tac:
      description: "2 or 3-octet string identifying a tracking area code as specified\
        \ in clause 9.3.3.10  of 3GPP TS 38.413, in hexadecimal representation. Each\
        \ character in the string shall  take a value of \"0\" to \"9\", \"a\" to\
        \ \"f\" or \"A\" to \"F\" and shall represent 4 bits. The most significant\
        \ character representing the 4 most significant bits of the TAC shall  appear\
        \ first in the string, and the character representing the 4 least significant\
        \ bit  of the TAC shall appear last in the string. \n"
      pattern: "(^[A-Fa-f0-9]{4}$)|(^[A-Fa-f0-9]{6}$)"
      type: string
    Ecgi:
      description: "Contains the ECGI (E-UTRAN Cell Global Identity), as described\
        \ in 3GPP 23.003"
      example:
        eutraCellId: null
        nid: null
        plmnId:
          mnc: null
          mcc: null
      properties:
        plmnId:
          $ref: "#/components/schemas/PlmnId"
        eutraCellId:
          $ref: "#/components/schemas/EutraCellId"
        nid:
          $ref: "#/components/schemas/Nid"
      required:
      - eutraCellId
      - plmnId
      type: object
    EutraCellId:
      description: "28-bit string identifying an E-UTRA Cell Id as specified in clause\
        \ 9.3.1.9 of  3GPP TS 38.413, in hexadecimal representation. Each character\
        \ in the string shall take a  value of \"0\" to \"9\", \"a\" to \"f\" or \"\
        A\" to \"F\" and shall represent 4 bits. The most  significant character representing\
        \ the 4 most significant bits of the Cell Id shall appear  first in the string,\
        \ and the character representing the 4 least significant bit of the  Cell\
        \ Id shall appear last in the string. \n"
      pattern: "^[A-Fa-f0-9]{7}$"
      type: string
    DateTime:
      description: string with format 'date-time' as defined in OpenAPI.
      format: date-time
      type: string
    GlobalRanNodeId:
      description: |
        One of the six attributes n3IwfId, gNbIdm, ngeNbId, wagfId, tngfId, eNbId shall be present.
      example:
        eNbId: null
        wagfId: null
        tngfId: null
        gNbId:
          bitLength: 29
          gNBValue: gNBValue
        nid: null
        plmnId:
          mnc: null
          mcc: null
        n3IwfId: null
        ngeNbId: SMacroNGeNB-34B89
      nullable: true
      oneOf: []
      properties:
        plmnId:
          $ref: "#/components/schemas/PlmnId"
        n3IwfId:
          $ref: "#/components/schemas/N3IwfId"
        gNbId:
          $ref: "#/components/schemas/GNbId"
        ngeNbId:
          $ref: "#/components/schemas/NgeNbId"
        wagfId:
          $ref: "#/components/schemas/WAgfId"
        tngfId:
          $ref: "#/components/schemas/TngfId"
        nid:
          $ref: "#/components/schemas/Nid"
        eNbId:
          $ref: "#/components/schemas/ENbId"
      required:
      - plmnId
      type: object
    N3IwfId:
      description: "This represents the identifier of the N3IWF ID as specified in\
        \ clause 9.3.1.57 of  3GPP TS 38.413 in hexadecimal representation. Each character\
        \ in the string shall take a value  of \"0\" to \"9\", \"a\" to \"f\" or \"\
        A\" to \"F\" and shall represent 4 bits. The most significant  character representing\
        \ the 4 most significant bits of the N3IWF ID shall appear first in the  string,\
        \ and the character representing the 4 least significant bit of the N3IWF\
        \ ID shall  appear last in the string. \n"
      pattern: "^[A-Fa-f0-9]+$"
      type: string
    GNbId:
      description: Provides the G-NB identifier.
      example:
        bitLength: 29
        gNBValue: gNBValue
      properties:
        bitLength:
          description: |
            Unsigned integer representing the bit length of the gNB ID as defined in clause 9.3.1.6 of 3GPP TS 38.413 [11], within the range 22 to 32.
          maximum: 32
          minimum: 22
          type: integer
        gNBValue:
          description: |
            This represents the identifier of the gNB. The value of the gNB ID shall be encoded in hexadecimal representation. Each character in the string shall take a value of "0" to "9", "a" to "f" or "A" to "F" and shall represent 4 bits. The padding 0 shall be added to make multiple nibbles,  the most significant character representing the padding 0 if required together with the 4 most significant bits of the gNB ID shall appear first in the string, and the character representing the 4 least significant bit of the gNB ID shall appear last in the string.
          pattern: "^[A-Fa-f0-9]{6,8}$"
          type: string
      required:
      - bitLength
      - gNBValue
      type: object
    NgeNbId:
      description: "This represents the identifier of the ng-eNB ID as specified in\
        \ clause 9.3.1.8 of  3GPP TS 38.413. The value of the ng-eNB ID shall be encoded\
        \ in hexadecimal representation.  Each character in the string shall take\
        \ a value of \"0\" to \"9\", \"a\" to \"f\" or \"A\" to \"F\" and  shall represent\
        \ 4 bits. The padding 0 shall be added to make multiple nibbles, so the most\
        \  significant character representing the padding 0 if required together with\
        \ the 4 most  significant bits of the ng-eNB ID shall appear first in the\
        \ string, and the character  representing the 4 least significant bit of the\
        \ ng-eNB ID (to form a nibble) shall appear last  in the string. \n"
      example: SMacroNGeNB-34B89
      pattern: "^(MacroNGeNB-[A-Fa-f0-9]{5}|LMacroNGeNB-[A-Fa-f0-9]{6}|SMacroNGeNB-[A-Fa-f0-9]{5})$"
      type: string
    WAgfId:
      description: "This represents the identifier of the W-AGF ID as specified in\
        \ clause 9.3.1.162 of  3GPP TS 38.413 in hexadecimal representation. Each\
        \ character in the string shall take a value  of \"0\" to \"9\", \"a\" to\
        \ \"f\" or \"A\" to \"F\" and shall represent 4 bits. The most significant\
        \  character representing the 4 most significant bits of the W-AGF ID shall\
        \ appear first in the  string, and the character representing the 4 least\
        \ significant bit of the W-AGF ID shall  appear last in the string. \n"
      pattern: "^[A-Fa-f0-9]+$"
      type: string
    TngfId:
      description: "This represents the identifier of the TNGF ID as specified in\
        \ clause 9.3.1.161 of  3GPP TS 38.413  in hexadecimal representation. Each\
        \ character in the string shall take a value of \"0\" to \"9\", \"a\"  to\
        \ \"f\" or \"A\" to \"F\" and shall represent 4 bits. The most significant\
        \ character representing the  4 most significant bits of the TNGF ID shall\
        \ appear first in the string, and the character  representing the 4 least\
        \ significant bit of the TNGF ID shall appear last in the string. \n"
      pattern: "^[A-Fa-f0-9]+$"
      type: string
    ENbId:
      description: |
        This represents the identifier of the eNB ID as specified in clause 9.2.1.37 of  3GPP TS 36.413. The string shall be formatted with the following pattern  '^('MacroeNB-[A-Fa-f0-9]{5}|LMacroeNB-[A-Fa-f0-9]{6}|SMacroeNB-[A-Fa-f0-9]{5} |HomeeNB-[A-Fa-f0-9]{7})$'. The value of the eNB ID shall be encoded in hexadecimal representation. Each character in the  string shall take a value of "0" to "9", "a" to "f" or "A" to "F" and shall represent 4 bits.  The padding 0 shall be added to make multiple nibbles, so the most significant character  representing the padding 0 if required together with the 4 most significant bits of the eNB ID  shall appear first in the string, and the character representing the 4 least significant bit  of the eNB ID (to form a nibble) shall appear last in the string.
      pattern: "^(MacroeNB-[A-Fa-f0-9]{5}|LMacroeNB-[A-Fa-f0-9]{6}|SMacroeNB-[A-Fa-f0-9]{5}|HomeeNB-[A-Fa-f0-9]{7})$"
      type: string
    NrLocation:
      description: Contains the NR user location.
      example:
        ignoreNcgi: false
        geographicalInformation: geographicalInformation
        globalGnbId:
          eNbId: null
          wagfId: null
          tngfId: null
          gNbId:
            bitLength: 29
            gNBValue: gNBValue
          nid: null
          plmnId:
            mnc: null
            mcc: null
          n3IwfId: null
          ngeNbId: SMacroNGeNB-34B89
        ageOfLocationInformation: 19750
        ncgi:
          nid: null
          plmnId:
            mnc: null
            mcc: null
          nrCellId: null
        ntnTaiInfo:
          tacList:
          - null
          - null
          derivedTac: null
          plmnId:
            mnc: null
            nid: null
            mcc: null
        tai:
          tac: null
          nid: null
          plmnId:
            mnc: null
            mcc: null
        ueLocationTimestamp: null
        geodeticInformation: geodeticInformation
      properties:
        tai:
          $ref: "#/components/schemas/Tai"
        ncgi:
          $ref: "#/components/schemas/Ncgi"
        ignoreNcgi:
          default: false
          type: boolean
        ageOfLocationInformation:
          description: |
            The value represents the elapsed time in minutes since the last network contact of the mobile station. Value "0" indicates that the location information was obtained after a successful paging procedure for Active Location Retrieval when the UE is in idle mode or after a successful  NG-RAN location reporting procedure with the eNB when the UE is in connected mode. Any other value than "0" indicates that the location information is the last known one. See 3GPP TS 29.002 clause 17.7.8.
          maximum: 32767
          minimum: 0
          type: integer
        ueLocationTimestamp:
          $ref: "#/components/schemas/DateTime"
        geographicalInformation:
          description: |
            Refer to geographical Information. See 3GPP TS 23.032 clause 7.3.2. Only the description of an ellipsoid point with uncertainty circle is allowed to be used.
          pattern: "^[0-9A-F]{16}$"
          type: string
        geodeticInformation:
          description: |
            Refers to Calling Geodetic Location. See ITU-T Recommendation Q.763 (1999) [24] clause 3.88.2. Only the description of an ellipsoid point with uncertainty circle is allowed to be used.
          pattern: "^[0-9A-F]{20}$"
          type: string
        globalGnbId:
          $ref: "#/components/schemas/GlobalRanNodeId"
        ntnTaiInfo:
          $ref: "#/components/schemas/NtnTaiInfo"
      required:
      - ncgi
      - tai
      type: object
    Ncgi:
      description: "Contains the NCGI (NR Cell Global Identity), as described in 3GPP\
        \ 23.003"
      example:
        nid: null
        plmnId:
          mnc: null
          mcc: null
        nrCellId: null
      properties:
        plmnId:
          $ref: "#/components/schemas/PlmnId"
        nrCellId:
          $ref: "#/components/schemas/NrCellId"
        nid:
          $ref: "#/components/schemas/Nid"
      required:
      - nrCellId
      - plmnId
      type: object
    NrCellId:
      description: "36-bit string identifying an NR Cell Id as specified in clause\
        \ 9.3.1.7 of 3GPP TS 38.413,  in hexadecimal representation. Each character\
        \ in the string shall take a value of \"0\" to \"9\",  \"a\" to \"f\" or \"\
        A\" to \"F\" and shall represent 4 bits. The most significant character  representing\
        \ the 4 most significant bits of the Cell Id shall appear first in the string,\
        \ and  the character representing the 4 least significant bit of the Cell\
        \ Id shall appear last in the  string. \n"
      pattern: "^[A-Fa-f0-9]{9}$"
      type: string
    NtnTaiInfo:
      example:
        tacList:
        - null
        - null
        derivedTac: null
        plmnId:
          mnc: null
          nid: null
          mcc: null
      properties:
        plmnId:
          $ref: "#/components/schemas/PlmnIdNid"
        tacList:
          items:
            $ref: "#/components/schemas/Tac"
          minItems: 1
          type: array
        derivedTac:
          $ref: "#/components/schemas/Tac"
      required:
      - plmnId
      - tacList
      type: object
    N3gaLocation:
      description: Contains the Non-3GPP access user location.
      example:
        ueIpv4Addr: 198.51.100.1
        twapId:
          bssId: bssId
          civicAddress: null
          ssId: ssId
        hfcNodeId:
          hfcNId: null
        protocol: UDP
        gli: null
        n3gppTai:
          tac: null
          nid: null
          plmnId:
            mnc: null
            mcc: null
        tnapId:
          bssId: bssId
          civicAddress: null
          ssId: ssId
        w5gbanLineType: DSL
        ueIpv6Addr: 2001:db8:85a3::8a2e:370:7334
        gci: null
        n3IwfId: n3IwfId
        portNumber: null
      properties:
        n3gppTai:
          $ref: "#/components/schemas/Tai"
        n3IwfId:
          description: "This IE shall contain the N3IWF identifier received over NGAP\
            \ and shall be encoded as a  string of hexadecimal characters. Each character\
            \ in the string shall take a value of \"0\"  to \"9\", \"a\" to \"f\"\
            \ or \"A\" to \"F\" and shall represent 4 bits. The most significant \
            \ character representing the 4 most significant bits of the N3IWF ID shall\
            \ appear first in  the string, and the character representing the 4 least\
            \ significant bit of the N3IWF ID  shall appear last in the string. \n"
          pattern: "^[A-Fa-f0-9]+$"
          type: string
        ueIpv4Addr:
          $ref: "#/components/schemas/Ipv4Addr"
        ueIpv6Addr:
          $ref: "#/components/schemas/Ipv6Addr"
        portNumber:
          $ref: "#/components/schemas/Uinteger"
        protocol:
          $ref: "#/components/schemas/TransportProtocol"
        tnapId:
          $ref: "#/components/schemas/TnapId"
        twapId:
          $ref: "#/components/schemas/TwapId"
        hfcNodeId:
          $ref: "#/components/schemas/HfcNodeId"
        gli:
          $ref: "#/components/schemas/Gli"
        w5gbanLineType:
          $ref: "#/components/schemas/LineType"
        gci:
          $ref: "#/components/schemas/Gci"
      type: object
    Ipv4Addr:
      description: |
        String identifying a IPv4 address formatted in the 'dotted decimal' notation as defined in RFC 1166.
      example: 198.51.100.1
      pattern: "^(([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])\\.){3}([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])$"
      type: string
    Ipv6Addr:
      description: |
        String identifying an IPv6 address formatted according to clause 4 of RFC5952. The mixed IPv4 IPv6 notation according to clause 5 of RFC5952 shall not be used.
      example: 2001:db8:85a3::8a2e:370:7334
      pattern: "^(((:|(0?|([1-9a-f][0-9a-f]{0,3}))):)((0?|([1-9a-f][0-9a-f]{0,3})):){0,6}(:|(0?|([1-9a-f][0-9a-f]{0,3}))))|((([^:]+:){7}([^:]+))|((([^:]+:)*[^:]+)?::(([^:]+:)*[^:]+)?)))$"
      type: string
    Uinteger:
      description: "Unsigned Integer, i.e. only value 0 and integers above 0 are permissible."
      minimum: 0
      type: integer
    TransportProtocol:
      description: "Possible values are:\n- UDP: User Datagram Protocol.\n- TCP: Transmission\
        \ Control Protocol. \n"
      enum:
      - UDP
      - TCP
      type: string
    TnapId:
      description: Contain the TNAP Identifier see clause5.6.2 of 3GPP TS 23.501.
      example:
        bssId: bssId
        civicAddress: null
        ssId: ssId
      properties:
        ssId:
          description: "This IE shall be present if the UE is accessing the 5GC via\
            \ a trusted WLAN access network.When present, it shall contain the SSID\
            \ of the access point to which the UE is attached, that is received over\
            \ NGAP,  see IEEE Std 802.11-2012. \n"
          type: string
        bssId:
          description: "When present, it shall contain the BSSID of the access point\
            \ to which the UE is attached, that is received over NGAP, see IEEE Std\
            \ 802.11-2012. \n"
          type: string
        civicAddress:
          $ref: "#/components/schemas/Bytes"
      type: object
    Bytes:
      description: string with format 'bytes' as defined in OpenAPI
      format: byte
      type: string
    TwapId:
      description: |
        Contain the TWAP Identifier as defined in clause 4.2.8.5.3 of 3GPP TS 23.501 or the WLAN location information as defined in clause 4.5.7.2.8 of 3GPP TS 23.402.
      example:
        bssId: bssId
        civicAddress: null
        ssId: ssId
      properties:
        ssId:
          description: "This IE shall contain the SSID of the access point to which\
            \ the UE is attached, that is received over NGAP, see IEEE Std 802.11-2012.\
            \ \n"
          type: string
        bssId:
          description: "When present, it shall contain the BSSID of the access point\
            \ to which the UE is attached, for trusted WLAN access, see IEEE Std 802.11-2012.\
            \ \n"
          type: string
        civicAddress:
          $ref: "#/components/schemas/Bytes"
      required:
      - ssId
      type: object
    HfcNodeId:
      description: REpresents the HFC Node Identifer received over NGAP.
      example:
        hfcNId: null
      properties:
        hfcNId:
          $ref: "#/components/schemas/HfcNId"
      required:
      - hfcNId
      type: object
    HfcNId:
      description: |
        This IE represents the identifier of the HFC node Id as specified in CableLabs WR-TR-5WWC-ARCH. It is provisioned by the wireline operator as part of wireline operations and may contain up to six characters.
      maxLength: 6
      type: string
    Gli:
      $ref: "#/components/schemas/Bytes"
    LineType:
      description: |
        Possible values are:
        - DSL: Identifies a DSL line
        - PON: Identifies a PON line
      enum:
      - DSL
      - PON
      type: string
    Gci:
      description: |
        Global Cable Identifier uniquely identifying the connection between the 5G-CRG or FN-CRG to the 5GS. See clause 28.15.4 of 3GPP TS 23.003. This shall be encoded as a string per clause 28.15.4 of 3GPP TS 23.003, and compliant with the syntax specified  in clause 2.2  of IETF RFC 7542 for the username part of a NAI. The GCI value is specified in CableLabs WR-TR-5WWC-ARCH.
      type: string
    UtraLocation:
      description: "Exactly one of cgi, sai or lai shall be present."
      example:
        geographicalInformation: geographicalInformation
        ageOfLocationInformation: 4803
        cgi:
          plmnId:
            mnc: null
            mcc: null
          cellId: cellId
          lac: lac
        lai:
          plmnId:
            mnc: null
            mcc: null
          lac: lac
        sai:
          sac: sac
          plmnId:
            mnc: null
            mcc: null
          lac: lac
        rai:
          rac: rac
          plmnId:
            mnc: null
            mcc: null
          lac: lac
        ueLocationTimestamp: null
        geodeticInformation: geodeticInformation
      nullable: true
      oneOf: []
      properties:
        cgi:
          $ref: "#/components/schemas/CellGlobalId"
        sai:
          $ref: "#/components/schemas/ServiceAreaId"
        lai:
          $ref: "#/components/schemas/LocationAreaId"
        rai:
          $ref: "#/components/schemas/RoutingAreaId"
        ageOfLocationInformation:
          description: |
            The value represents the elapsed time in minutes since the last network contact of the mobile station.  Value "0" indicates that the location information was obtained after a successful paging procedure for  Active Location Retrieval when the UE is in idle mode
             or after a successful location reporting procedure  the UE is in connected mode. Any
            other value than "0" indicates that the location information is the last known one.  See 3GPP TS 29.002 clause 17.7.8.
          maximum: 32767
          minimum: 0
          type: integer
        ueLocationTimestamp:
          $ref: "#/components/schemas/DateTime"
        geographicalInformation:
          description: |
            Refer to geographical Information.See 3GPP TS 23.032 clause 7.3.2. Only the description of an ellipsoid point with uncertainty circle is allowed to be used.
          pattern: "^[0-9A-F]{16}$"
          type: string
        geodeticInformation:
          description: |
            Refers to Calling Geodetic Location. See ITU-T Recommendation Q.763 (1999) clause 3.88.2. Only the description of an ellipsoid point with uncertainty circle is allowed to be used.
          pattern: "^[0-9A-F]{20}$"
          type: string
      type: object
    CellGlobalId:
      description: "Contains a Cell Global Identification as defined in 3GPP TS 23.003,\
        \ clause 4.3.1."
      example:
        plmnId:
          mnc: null
          mcc: null
        cellId: cellId
        lac: lac
      properties:
        plmnId:
          $ref: "#/components/schemas/PlmnId"
        lac:
          pattern: "^[A-Fa-f0-9]{4}$"
          type: string
        cellId:
          pattern: "^[A-Fa-f0-9]{4}$"
          type: string
      required:
      - cellId
      - lac
      - plmnId
      type: object
    ServiceAreaId:
      description: "Contains a Service Area Identifier as defined in 3GPP TS 23.003,\
        \ clause 12.5."
      example:
        sac: sac
        plmnId:
          mnc: null
          mcc: null
        lac: lac
      properties:
        plmnId:
          $ref: "#/components/schemas/PlmnId"
        lac:
          description: Location Area Code.
          pattern: "^[A-Fa-f0-9]{4}$"
          type: string
        sac:
          description: Service Area Code.
          pattern: "^[A-Fa-f0-9]{4}$"
          type: string
      required:
      - lac
      - plmnId
      - sac
      type: object
    LocationAreaId:
      description: "Contains a Location area identification as defined in 3GPP TS\
        \ 23.003, clause 4.1."
      example:
        plmnId:
          mnc: null
          mcc: null
        lac: lac
      properties:
        plmnId:
          $ref: "#/components/schemas/PlmnId"
        lac:
          description: Location Area Code.
          pattern: "^[A-Fa-f0-9]{4}$"
          type: string
      required:
      - lac
      - plmnId
      type: object
    RoutingAreaId:
      description: "Contains a Routing Area Identification as defined in 3GPP TS 23.003,\
        \ clause 4.2."
      example:
        rac: rac
        plmnId:
          mnc: null
          mcc: null
        lac: lac
      properties:
        plmnId:
          $ref: "#/components/schemas/PlmnId"
        lac:
          description: Location Area Code
          pattern: "^[A-Fa-f0-9]{4}$"
          type: string
        rac:
          description: Routing Area Code
          pattern: "^[A-Fa-f0-9]{2}$"
          type: string
      required:
      - lac
      - plmnId
      - rac
      type: object
    GeraLocation:
      description: "Exactly one of cgi, sai or lai shall be present."
      example:
        geographicalInformation: geographicalInformation
        ageOfLocationInformation: 19536
        cgi:
          plmnId:
            mnc: null
            mcc: null
          cellId: cellId
          lac: lac
        lai:
          plmnId:
            mnc: null
            mcc: null
          lac: lac
        mscNumber: mscNumber
        sai:
          sac: sac
          plmnId:
            mnc: null
            mcc: null
          lac: lac
        rai:
          rac: rac
          plmnId:
            mnc: null
            mcc: null
          lac: lac
        vlrNumber: vlrNumber
        locationNumber: locationNumber
        ueLocationTimestamp: null
        geodeticInformation: geodeticInformation
      nullable: true
      oneOf: []
      properties:
        locationNumber:
          description: "Location number within the PLMN. See 3GPP TS 23.003, clause\
            \ 4.5."
          type: string
        cgi:
          $ref: "#/components/schemas/CellGlobalId"
        sai:
          $ref: "#/components/schemas/ServiceAreaId"
        lai:
          $ref: "#/components/schemas/LocationAreaId"
        rai:
          $ref: "#/components/schemas/RoutingAreaId"
        vlrNumber:
          description: VLR number. See 3GPP TS 23.003 clause 5.1.
          type: string
        mscNumber:
          description: MSC number. See 3GPP TS 23.003 clause 5.1.
          type: string
        ageOfLocationInformation:
          description: |
            The value represents the elapsed time in minutes since the last network contact of the mobile station. Value "0" indicates that the location information was obtained after a successful paging procedure for  Active Location Retrieval when the UE is in idle mode or after a successful location reporting procedure the UE is in connected mode. Any other value than "0" indicates that the location information is the last known one. See 3GPP TS 29.002 clause 17.7.8.
          maximum: 32767
          minimum: 0
          type: integer
        ueLocationTimestamp:
          $ref: "#/components/schemas/DateTime"
        geographicalInformation:
          description: |
            Refer to geographical Information.See 3GPP TS 23.032 clause 7.3.2. Only the description of an ellipsoid point with uncertainty circle is allowed to be used.
          pattern: "^[0-9A-F]{16}$"
          type: string
        geodeticInformation:
          description: |
            Refers to Calling Geodetic Location.See ITU-T Recommendation Q.763 (1999) clause 3.88.2.  Only the description of an ellipsoid point with uncertainty circle is allowed to be used.
          pattern: "^[0-9A-F]{20}$"
          type: string
      type: object
    TimeZone:
      description: "String with format \"time-numoffset\" optionally appended by \"\
        daylightSavingTime\", where \n- \"time-numoffset\" shall represent the time\
        \ zone adjusted for daylight saving time and be\n   encoded as time-numoffset\
        \ as defined in clause\_5.6 of IETF RFC 3339; \n- \"daylightSavingTime\" shall\
        \ represent the adjustment that has been made and shall be\n   encoded as\
        \ \"+1\" or \"+2\" for a +1 or +2 hours adjustment. \n\nThe example is for\
        \ 8 hours behind UTC, +1 hour adjustment for Daylight Saving Time.\n"
      example: -08:00+1
      type: string
    Pei:
      description: "String representing a Permanent Equipment Identifier that may\
        \ contain - an IMEI or IMEISV, as  specified in clause 6.2 of 3GPP TS 23.003;\
        \ a MAC address for a 5G-RG or FN-RG via  wireline  access, with an indication\
        \ that this address cannot be trusted for regulatory purpose if this  address\
        \ cannot be used as an Equipment Identifier of the FN-RG, as specified in\
        \ clause 4.7.7  of 3GPP TS23.316. Examples are imei-012345678901234 or imeisv-0123456789012345.\
        \ \n"
      pattern: "^(imei-[0-9]{15}|imeisv-[0-9]{16}|mac((-[0-9a-fA-F]{2}){6})(-untrusted)?|eui((-[0-9a-fA-F]{2}){8})|.+)$"
      type: string
    Ipv6Prefix:
      description: |
        String identifying an IPv6 address prefix formatted according to clause 4 of RFC 5952. IPv6Prefix data type may contain an individual /128 IPv6 address.
      example: 2001:db8:abcd:12::0/64
      pattern: "^(((:|(0?|([1-9a-f][0-9a-f]{0,3}))):)((0?|([1-9a-f][0-9a-f]{0,3})):){0,6}(:|(0?|([1-9a-f][0-9a-f]{0,3})))(\\\
        /(([0-9])|([0-9]{2})|(1[0-1][0-9])|(12[0-8])))|((([^:]+:){7}([^:]+))|((([^:]+:)*[^:]+)?::(([^:]+:)*[^:]+)?))(\\\
        /.+))$"
      type: string
    Ambr:
      description: Contains the maximum aggregated uplink and downlink bit rates.
      example:
        uplink: null
        downlink: null
      properties:
        uplink:
          $ref: "#/components/schemas/BitRate"
        downlink:
          $ref: "#/components/schemas/BitRate"
      required:
      - downlink
      - uplink
      type: object
    BitRate:
      description: |
        String representing a bit rate; the prefixes follow the standard symbols from The International System of Units, and represent x1000 multipliers, with the exception that prefix "K" is used to represent the standard symbol "k".
      pattern: ^\d+(\.\d+)? (bps|Kbps|Mbps|Gbps|Tbps)$
      type: string
    SubscribedDefaultQos:
      description: "Provides the subsribed 5QI and the ARP, it may contain the priority\
        \ level."
      example:
        priorityLevel: null
        "5qi": null
        arp:
          priorityLevel: null
          preemptCap: NOT_PREEMPT
          preemptVuln: NOT_PREEMPTABLE
      properties:
        "5qi":
          $ref: "#/components/schemas/fiveQi"
        arp:
          $ref: "#/components/schemas/Arp"
        priorityLevel:
          $ref: "#/components/schemas/fiveQiPriorityLevel"
      required:
      - 5qi
      - arp
      type: object
    fiveQi:
      description: |
        Unsigned integer representing a 5G QoS Identifier (see clause 5.7.2.1 of 3GPP TS 23.501, within the range 0 to 255.
      maximum: 255
      minimum: 0
      type: integer
    Arp:
      description: Contains Allocation and Retention Priority information.
      example:
        priorityLevel: null
        preemptCap: NOT_PREEMPT
        preemptVuln: NOT_PREEMPTABLE
      properties:
        priorityLevel:
          $ref: "#/components/schemas/ArpPriorityLevel"
        preemptCap:
          $ref: "#/components/schemas/PreemptionCapability"
        preemptVuln:
          $ref: "#/components/schemas/PreemptionVulnerability"
      required:
      - preemptCap
      - preemptVuln
      - priorityLevel
      type: object
    ArpPriorityLevel:
      description: "nullable true shall not be used for this attribute. Unsigned integer\
        \ indicating the ARP Priority Level (see clause 5.7.2.2 of 3GPP TS 23.501,\
        \ within the range 1 to 15.Values are ordered in decreasing order of priority,\
        \ i.e. with 1 as the highest priority and 15 as the lowest priority. \n"
      maximum: 15
      minimum: 1
      nullable: true
      type: integer
    PreemptionCapability:
      description: |
        The enumeration PreemptionCapability indicates the pre-emption capability of a request on other QoS flows. See clause 5.7.2.2 of 3GPP TS 23.501. It shall comply with the provisions defined in table 5.5.3.1-1.
      enum:
      - NOT_PREEMPT
      - MAY_PREEMPT
      type: string
    PreemptionVulnerability:
      description: |
        The enumeration PreemptionVulnerability indicates the pre-emption vulnerability of the QoS flow to pre-emption from other QoS flows. See clause 5.7.2.2 of 3GPP TS 23.501. It shall comply with the provisions defined in table 5.5.3.2-1
      enum:
      - NOT_PREEMPTABLE
      - PREEMPTABLE
      type: string
    fiveQiPriorityLevel:
      description: "Unsigned integer indicating the 5QI Priority Level (see clauses\
        \ 5.7.3.3 and 5.7.4 of 3GPP TS 23.501, within the range 1 to 127.Values are\
        \ ordered in decreasing order of priority,  i.e. with 1 as the highest priority\
        \ and 127 as the lowest priority. \n"
      maximum: 127
      minimum: 1
      type: integer
    VplmnQos:
      description: VPLMN QoS
      example:
        maxFbrDl: null
        sessionAmbr:
          uplink: null
          downlink: null
        maxFbrUl: null
        "5qiPL": null
        guaFbrUl: null
        guaFbrDl: null
        "5qi": null
        arp:
          priorityLevel: null
          preemptCap: NOT_PREEMPT
          preemptVuln: NOT_PREEMPTABLE
      properties:
        "5qi":
          $ref: "#/components/schemas/fiveQi"
        arp:
          $ref: "#/components/schemas/Arp"
        sessionAmbr:
          $ref: "#/components/schemas/Ambr"
        maxFbrDl:
          $ref: "#/components/schemas/BitRate"
        maxFbrUl:
          $ref: "#/components/schemas/BitRate"
        guaFbrDl:
          $ref: "#/components/schemas/BitRate"
        guaFbrUl:
          $ref: "#/components/schemas/BitRate"
        "5qiPL":
          $ref: "#/components/schemas/fiveQiPriorityLevel"
      type: object
    TraceData:
      description: contains Trace control and configuration parameters.
      example:
        eventList: eventList
        collectionEntityIpv6Addr: 2001:db8:85a3::8a2e:370:7334
        collectionEntityIpv4Addr: 198.51.100.1
        traceRef: traceRef
        interfaceList: interfaceList
        neTypeList: neTypeList
        traceReportingConsumerUri: null
        traceDepth: MINIMUM
      nullable: true
      properties:
        traceRef:
          description: |
            Trace Reference (see 3GPP TS 32.422).It shall be encoded as the concatenation of MCC, MNC and Trace ID as follows: <MCC><MNC>-<Trace ID> The Trace ID shall be encoded as a 3 octet string in hexadecimal representation. Each character in the Trace ID string shall take a value of "0" to "9", "a" to "f" or "A" to "F" and shall represent 4 bits. The most significant character representing the 4 most significant bits of the Trace ID shall appear first in the string, and the character representing the 4 least significant bit of the Trace ID shall appear last in the string.
          pattern: "^[0-9]{3}[0-9]{2,3}-[A-Fa-f0-9]{6}$"
          type: string
        traceDepth:
          $ref: "#/components/schemas/TraceDepth"
        neTypeList:
          description: |
            List of NE Types (see 3GPP TS 32.422). It shall be encoded as an octet string in hexadecimal representation. Each character in the string shall take a value of "0" to "9", "a" to "f" or "A" to "F" and shall represent 4 bits. The most significant character representing the 4 most significant bits shall appear first in the string, and the character representing the 4 least significant bit shall appear last in the string. Octets shall be coded according to 3GPP TS 32.422.
          pattern: "^[A-Fa-f0-9]+$"
          type: string
        eventList:
          description: |
            Triggering events (see 3GPP TS 32.422). It shall be encoded as an octet string in hexadecimal representation. Each character in the string shall take a value of "0" to "9", "a" to "f" or "A" to "F" and shall represent 4 bits. The most significant character representing the 4 most significant bits shall appear first in the string, and the character representing the 4 least significant bit shall appear last in the string. Octets shall be coded according to 3GPP TS 32.422.
          pattern: "^[A-Fa-f0-9]+$"
          type: string
        collectionEntityIpv4Addr:
          $ref: "#/components/schemas/Ipv4Addr"
        collectionEntityIpv6Addr:
          $ref: "#/components/schemas/Ipv6Addr"
        traceReportingConsumerUri:
          $ref: "#/components/schemas/Uri"
        interfaceList:
          description: |
            List of Interfaces (see 3GPP TS 32.422). It shall be encoded as an octet string in hexadecimal representation. Each character in the string shall take a value of "0" to "9", "a" to "f" or "A" to "F" and shall represent 4 bits. The most significant character representing the 4 most significant bits shall appear first in the string, and the character representing the  4 least significant bit shall appear last in the string. Octets shall be coded according to 3GPP TS 32.422. If this attribute is not present, all the interfaces applicable to the list of NE types indicated in the neTypeList attribute should be traced.
          pattern: "^[A-Fa-f0-9]+$"
          type: string
      required:
      - eventList
      - neTypeList
      - traceDepth
      - traceRef
      type: object
    TraceDepth:
      enum:
      - MINIMUM
      - MEDIUM
      - MAXIMUM
      - MINIMUM_WO_VENDOR_EXTENSION
      - MEDIUM_WO_VENDOR_EXTENSION
      - MAXIMUM_WO_VENDOR_EXTENSION
      type: string
    Snssai:
      description: |
        When Snssai needs to be converted to string (e.g. when used in maps as key), the string shall be composed of one to three digits "sst" optionally followed by "-" and 6 hexadecimal digits "sd".
      example:
        sd: sd
        sst: 180
      properties:
        sst:
          description: "Unsigned integer, within the range 0 to 255, representing\
            \ the Slice/Service Type.  It indicates the expected Network Slice behaviour\
            \ in terms of features and services. Values 0 to 127 correspond to the\
            \ standardized SST range. Values 128 to 255 correspond  to the Operator-specific\
            \ range. See clause 28.4.2 of 3GPP TS 23.003. Standardized values are\
            \ defined in clause 5.15.2.2 of 3GPP TS 23.501. \n"
          maximum: 255
          minimum: 0
          type: integer
        sd:
          description: |
            3-octet string, representing the Slice Differentiator, in hexadecimal representation. Each character in the string shall take a value of "0" to "9", "a" to "f" or "A" to "F" and shall represent 4 bits. The most significant character representing the 4 most significant bits of the SD shall appear first in the string, and the character representing the 4 least significant bit of the SD shall appear last in the string. This is an optional parameter that complements the Slice/Service type(s) to allow to  differentiate amongst multiple Network Slices of the same Slice/Service type. This IE shall be absent if no SD value is associated with the SST.
          pattern: "^[A-Fa-f0-9]{6}$"
          type: string
      required:
      - sst
      type: object
    NfInstanceId:
      description: "String uniquely identifying a NF instance. The format of the NF\
        \ Instance ID shall be a  Universally Unique Identifier (UUID) version 4,\
        \ as described in IETF RFC 4122. \n"
      format: uuid
      type: string
    Ipv4AddrMask:
      description: |
        "String identifying a IPv4 address mask formatted in the 'dotted decimal' notation as defined in RFC 1166."
      example: 198.51.0.0/16
      pattern: "^(([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])\\.){3}([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])(\\\
        /([0-9]|[1-2][0-9]|3[0-2]))$"
      type: string
    SatelliteBackhaulCategory:
      description: Indicates the satellite backhaul used.
      enum:
      - GEO
      - MEO
      - LEO
      - OTHER_SAT
      - DYNAMIC_GEO
      - DYNAMIC_MEO
      - DYNAMIC_LEO
      - DYNAMIC_OTHER_SAT
      - NON_SATELLITE
      type: string
    PcfUeCallbackInfo:
      description: |
        Contains the PCF for the UE information necessary for the PCF for the PDU session to send  SM Policy Association Establishment and Termination events.
      example:
        callbackUri: null
        bindingInfo: bindingInfo
      nullable: true
      properties:
        callbackUri:
          $ref: "#/components/schemas/Uri"
        bindingInfo:
          type: string
      required:
      - callbackUri
      type: object
    ServerAddressingInfo:
      anyOf: []
      description: Contains addressing information (IP addresses and/or FQDNs) of
        a server.
      example:
        ipv4Addresses:
        - 198.51.100.1
        - 198.51.100.1
        ipv6Addresses:
        - 2001:db8:85a3::8a2e:370:7334
        - 2001:db8:85a3::8a2e:370:7334
        fqdnList:
        - null
        - null
      nullable: true
      properties:
        ipv4Addresses:
          items:
            $ref: "#/components/schemas/Ipv4Addr"
          minItems: 1
          type: array
        ipv6Addresses:
          items:
            $ref: "#/components/schemas/Ipv6Addr"
          minItems: 1
          type: array
        fqdnList:
          items:
            $ref: "#/components/schemas/Fqdn"
          minItems: 1
          type: array
      type: object
    SscMode:
      description: "represents the service and session continuity mode It shall comply\
        \ with the provisions defined in table 5.4.3.6-1. \n"
      enum:
      - SSC_MODE_1
      - SSC_MODE_2
      - SSC_MODE_3
      type: string
    RedundantPduSessionInformation:
      description: Redundant PDU Session Information
      example:
        pduSessionPairId: 143
        rsn: V1
      properties:
        rsn:
          $ref: "#/components/schemas/Rsn"
        pduSessionPairId:
          maximum: 255
          minimum: 0
          type: integer
      required:
      - rsn
      type: object
    Rsn:
      description: |
        Redundancy Sequence Number. Possible values are
          - V1
          - V2
          - NONE
      enum:
      - V1
      - V2
      - NONE
      type: string
    DurationSec:
      description: indicating a time in seconds.
      type: integer
    PresenceInfoRm:
      description: "This data type is defined in the same way as the 'PresenceInfo'\
        \ data type, but with the OpenAPI 'nullable: true' property.  If the additionalPraId\
        \ IE is present, this IE shall state the presence information of the UE for\
        \ the individual PRA identified by the additionalPraId IE;  If the additionalPraId\
        \ IE is not present, this IE shall state the presence information of the UE\
        \ for the PRA identified by the praId IE. \n"
      example:
        additionalPraId: additionalPraId
        ecgiList:
        - eutraCellId: null
          nid: null
          plmnId:
            mnc: null
            mcc: null
        - eutraCellId: null
          nid: null
          plmnId:
            mnc: null
            mcc: null
        globalRanNodeIdList:
        - eNbId: null
          wagfId: null
          tngfId: null
          gNbId:
            bitLength: 29
            gNBValue: gNBValue
          nid: null
          plmnId:
            mnc: null
            mcc: null
          n3IwfId: null
          ngeNbId: SMacroNGeNB-34B89
        - eNbId: null
          wagfId: null
          tngfId: null
          gNbId:
            bitLength: 29
            gNBValue: gNBValue
          nid: null
          plmnId:
            mnc: null
            mcc: null
          n3IwfId: null
          ngeNbId: SMacroNGeNB-34B89
        presenceState: IN_AREA
        praId: praId
        trackingAreaList:
        - tac: null
          nid: null
          plmnId:
            mnc: null
            mcc: null
        - tac: null
          nid: null
          plmnId:
            mnc: null
            mcc: null
        ncgiList:
        - nid: null
          plmnId:
            mnc: null
            mcc: null
          nrCellId: null
        - nid: null
          plmnId:
            mnc: null
            mcc: null
          nrCellId: null
        globaleNbIdList:
        - eNbId: null
          wagfId: null
          tngfId: null
          gNbId:
            bitLength: 29
            gNBValue: gNBValue
          nid: null
          plmnId:
            mnc: null
            mcc: null
          n3IwfId: null
          ngeNbId: SMacroNGeNB-34B89
        - eNbId: null
          wagfId: null
          tngfId: null
          gNbId:
            bitLength: 29
            gNBValue: gNBValue
          nid: null
          plmnId:
            mnc: null
            mcc: null
          n3IwfId: null
          ngeNbId: SMacroNGeNB-34B89
      nullable: true
      properties:
        praId:
          description: "Represents an identifier of the Presence Reporting Area (see\
            \ clause 28.10 of \n3GPP TS 23.003. This IE shall be present  if the Area\
            \ of Interest subscribed or\nreported is a Presence Reporting Area or\
            \ a Set of Core Network predefined Presence\nReporting Areas. When present,\
            \ it shall be encoded as a string representing an integer\nin the following\
            \ ranges:\n- 0 to 8 388 607 for UE-dedicated PRA\n- 8 388 608 to 16 777\
            \ 215 for Core Network predefined PRA\nExamples:\nPRA ID 123 is encoded\
            \ as \"123\"\nPRA ID 11 238 660 is encoded as \"11238660\"\n"
          type: string
        additionalPraId:
          description: |
            This IE may be present if the praId IE is present and if it contains a PRA identifier referring to a set of Core Network predefined Presence Reporting Areas. When present, this IE shall contain a PRA Identifier of an individual PRA within the Set of Core Network predefined Presence Reporting Areas indicated by the praId IE.
          type: string
        presenceState:
          $ref: "#/components/schemas/PresenceState"
        trackingAreaList:
          description: |
            Represents the list of tracking areas that constitutes the area. This IE shall be present if the subscription or the event report  is for tracking UE presence in the tracking areas. For non 3GPP access the TAI shall be the N3GPP TAI.
          items:
            $ref: "#/components/schemas/Tai"
          minItems: 0
          type: array
        ecgiList:
          description: |
            Represents the list of EUTRAN cell Ids that constitutes the area. This IE shall be present if the Area of Interest subscribed is a list of EUTRAN cell Ids.
          items:
            $ref: "#/components/schemas/Ecgi"
          minItems: 0
          type: array
        ncgiList:
          description: |
            Represents the list of NR cell Ids that constitutes the area. This IE shall be present if the Area of Interest subscribed is a list of NR cell Ids.
          items:
            $ref: "#/components/schemas/Ncgi"
          minItems: 0
          type: array
        globalRanNodeIdList:
          description: |
            Represents the list of NG RAN node identifiers that constitutes the area. This IE shall be present if the Area of Interest subscribed is a list of NG RAN node identifiers.
          items:
            $ref: "#/components/schemas/GlobalRanNodeId"
          type: array
        globaleNbIdList:
          description: |
            Represents the list of eNodeB identifiers that constitutes the area. This IE shall be present if the Area of Interest subscribed is a list of eNodeB identifiers.
          items:
            $ref: "#/components/schemas/GlobalRanNodeId"
          minItems: 1
          type: array
      type: object
    PresenceState:
      description: "Possible values are:\n-IN_AREA: Indicates that the UE is inside\
        \ or enters the presence reporting area.\n-OUT_OF_AREA: Indicates that the\
        \ UE is outside or leaves the presence reporting area\n-UNKNOW: Indicates\
        \ it is unknown whether the UE is in the presence reporting area or not\n\
        -INACTIVE: Indicates that the presence reporting area is inactive in the serving\
        \ node. \n"
      enum:
      - IN_AREA
      - OUT_OF_AREA
      - UNKNOWN
      - INACTIVE
      type: string
    IpIndex:
      description: |
        Represents information that identifies which IP pool or external server is used to allocate the IP address.
      type: integer
    VplmnOffloadingInfo:
      description: VPLMN Specific Offloading Information
      example:
        ipv4AddrMasks:
        - 198.51.0.0/16
        - 198.51.0.0/16
        ipv6AddressRanges:
        - start: 2001:db8:85a3::8a2e:370:7334
          end: 2001:db8:85a3::8a2e:370:7334
        - start: 2001:db8:85a3::8a2e:370:7334
          end: 2001:db8:85a3::8a2e:370:7334
        ipv6PrefixRanges:
        - start: 2001:db8:abcd:12::0/64
          end: 2001:db8:abcd:12::0/64
        - start: 2001:db8:abcd:12::0/64
          end: 2001:db8:abcd:12::0/64
        fqdnPatterns:
        - regex: regex
          stringMatchingRule:
            stringMatchingConditions:
            - matchingString: matchingString
              matchingOperator: FULL_MATCH
            - matchingString: matchingString
              matchingOperator: FULL_MATCH
        - regex: regex
          stringMatchingRule:
            stringMatchingConditions:
            - matchingString: matchingString
              matchingOperator: FULL_MATCH
            - matchingString: matchingString
              matchingOperator: FULL_MATCH
        allowedTraffic: true
        offloadIdentifier: null
        sessionDIAmbr: null
        vplmnId:
          mnc: null
          mcc: null
        fqdnList:
        - null
        - null
        ipv4AddressRanges:
        - start: 198.51.100.1
          end: 198.51.100.1
        - start: 198.51.100.1
          end: 198.51.100.1
      nullable: true
      properties:
        offloadIdentifier:
          $ref: "#/components/schemas/OffloadIdentifier"
        vplmnId:
          $ref: "#/components/schemas/PlmnId"
        allowedTraffic:
          default: true
          type: boolean
        ipv4AddressRanges:
          items:
            $ref: "#/components/schemas/Ipv4AddressRange"
          minItems: 1
          type: array
        ipv4AddrMasks:
          items:
            $ref: "#/components/schemas/Ipv4AddrMask"
          minItems: 1
          type: array
        ipv6AddressRanges:
          items:
            $ref: "#/components/schemas/Ipv6AddressRange"
          minItems: 1
          type: array
        ipv6PrefixRanges:
          items:
            $ref: "#/components/schemas/Ipv6PrefixRange"
          minItems: 1
          type: array
        fqdnList:
          items:
            $ref: "#/components/schemas/Fqdn"
          minItems: 1
          type: array
        fqdnPatterns:
          items:
            $ref: "#/components/schemas/FqdnPatternMatchingRule"
          minItems: 1
          type: array
        sessionDIAmbr:
          $ref: "#/components/schemas/BitRate"
      type: object
    OffloadIdentifier:
      description: |
        Offload identifier uniquely identifying a VPLMN offloading policy information instance
      pattern: "^[0-9]{3}-[0-9]{2,3}-[A-Fa-f0-9]{8}(-v[0-9]{1,2}){0,1}$"
      type: string
    Ipv4AddressRange:
      description: Range of IPv4 addresses
      example:
        start: 198.51.100.1
        end: 198.51.100.1
      properties:
        start:
          $ref: "#/components/schemas/Ipv4Addr"
        end:
          $ref: "#/components/schemas/Ipv4Addr"
      required:
      - end
      - start
      type: object
    Ipv6AddressRange:
      description: Range of IPv6 addresses
      example:
        start: 2001:db8:85a3::8a2e:370:7334
        end: 2001:db8:85a3::8a2e:370:7334
      properties:
        start:
          $ref: "#/components/schemas/Ipv6Addr"
        end:
          $ref: "#/components/schemas/Ipv6Addr"
      required:
      - end
      - start
      type: object
    Ipv6PrefixRange:
      description: Range of IPv6 prefixes
      example:
        start: 2001:db8:abcd:12::0/64
        end: 2001:db8:abcd:12::0/64
      properties:
        start:
          $ref: "#/components/schemas/Ipv6Prefix"
        end:
          $ref: "#/components/schemas/Ipv6Prefix"
      required:
      - end
      - start
      type: object
    FqdnPatternMatchingRule:
      description: a matching rule for a FQDN pattern
      example:
        regex: regex
        stringMatchingRule:
          stringMatchingConditions:
          - matchingString: matchingString
            matchingOperator: FULL_MATCH
          - matchingString: matchingString
            matchingOperator: FULL_MATCH
      nullable: true
      oneOf: []
      properties:
        regex:
          type: string
        stringMatchingRule:
          $ref: "#/components/schemas/StringMatchingRule"
      type: object
    StringMatchingRule:
      description: A list of conditions for string matching
      example:
        stringMatchingConditions:
        - matchingString: matchingString
          matchingOperator: FULL_MATCH
        - matchingString: matchingString
          matchingOperator: FULL_MATCH
      properties:
        stringMatchingConditions:
          items:
            $ref: "#/components/schemas/StringMatchingCondition"
          minItems: 1
          type: array
      type: object
    StringMatchingCondition:
      description: A String with Matching Operator
      example:
        matchingString: matchingString
        matchingOperator: FULL_MATCH
      properties:
        matchingString:
          type: string
        matchingOperator:
          $ref: "#/components/schemas/MatchingOperator"
      required:
      - matchingOperator
      type: object
    MatchingOperator:
      description: the matching operation.
      enum:
      - FULL_MATCH
      - MATCH_ALL
      - STARTS_WITH
      - NOT_START_WITH
      - ENDS_WITH
      - NOT_END_WITH
      - CONTAINS
      - NOT_CONTAIN
      type: string
    ContentVersion:
      description: Represents the content version of some content.
      type: integer
    ProtocolDescription:
      description: ProtocolDescription contains information to derive PDU set information.
      example:
        rtpPayloadInfoList:
        - rtpPayloadTypeList:
          - 76
          - 76
          rtpPayloadFormat: H264
        - rtpPayloadTypeList:
          - 76
          - 76
          rtpPayloadFormat: H264
        rtpHeaderExtInfo:
          rtpHeaderExtType: PDU_SET_MARKING
          pduSetSizeActive: true
          rtpHeaderExtId: 21
          longFormat: true
        transportProto: RTP
      properties:
        transportProto:
          $ref: "#/components/schemas/MediaTransportProto"
        rtpHeaderExtInfo:
          $ref: "#/components/schemas/RtpHeaderExtInfo"
        rtpPayloadInfoList:
          items:
            $ref: "#/components/schemas/RtpPayloadInfo"
          minItems: 1
          type: array
      type: object
    MediaTransportProto:
      description: |
        The enumeration MediaTransportProto indicates the transport protocol used for a media flow.
      enum:
      - RTP
      - SRTP
      type: string
    RtpHeaderExtInfo:
      description: RTP Header Extension information
      example:
        rtpHeaderExtType: PDU_SET_MARKING
        pduSetSizeActive: true
        rtpHeaderExtId: 21
        longFormat: true
      properties:
        rtpHeaderExtType:
          $ref: "#/components/schemas/RtpHeaderExtType"
        rtpHeaderExtId:
          maximum: 255
          minimum: 1
          type: integer
        longFormat:
          type: boolean
        pduSetSizeActive:
          type: boolean
      type: object
    RtpHeaderExtType:
      description: "The enumeration indicates the type of Rtp Header Extension type\
        \ \n"
      enum:
      - PDU_SET_MARKING
      type: string
    RtpPayloadInfo:
      description: RtpPayloadInfo contains Rtp payload type and format.
      example:
        rtpPayloadTypeList:
        - 76
        - 76
        rtpPayloadFormat: H264
      properties:
        rtpPayloadTypeList:
          items:
            maximum: 127
            minimum: 1
            type: integer
          minItems: 1
          type: array
        rtpPayloadFormat:
          $ref: "#/components/schemas/RtpPayloadFormat"
      type: object
    RtpPayloadFormat:
      description: "The enumeration RtpPayloadFormat indicates the RTP Payload format\
        \ \n"
      enum:
      - H264
      - H265
      type: string
    TscaiInputContainer:
      description: Indicates TSC Traffic pattern.
      example:
        burstArrivalTime: null
        surTimeInTime: null
        periodicity: null
        surTimeInNumMsg: null
        burstArrivalTimeWnd:
          startTime: null
          stopTime: null
        periodicityRange:
          upperBound: null
          lowerBound: null
          periodicVals:
          - null
          - null
      nullable: true
      properties:
        periodicity:
          $ref: "#/components/schemas/Uinteger"
        burstArrivalTime:
          $ref: "#/components/schemas/DateTime"
        surTimeInNumMsg:
          $ref: "#/components/schemas/Uinteger"
        surTimeInTime:
          $ref: "#/components/schemas/Uinteger"
        burstArrivalTimeWnd:
          $ref: "#/components/schemas/TimeWindow"
        periodicityRange:
          $ref: "#/components/schemas/PeriodicityRange"
      type: object
    PeriodicityRange:
      description: |
        Contains the acceptable range (which is formulated as lower bound and upper bound of the periodicity of the start twobursts in reference to the external GM) or acceptable periodicity value(s) (which is formulated as a list of values for the periodicity).
      example:
        upperBound: null
        lowerBound: null
        periodicVals:
        - null
        - null
      nullable: true
      oneOf: []
      properties:
        lowerBound:
          $ref: "#/components/schemas/Uinteger"
        upperBound:
          $ref: "#/components/schemas/Uinteger"
        periodicVals:
          items:
            $ref: "#/components/schemas/Uinteger"
          minItems: 1
          type: array
      type: object
    BitRateRm:
      description: |
        This data type is defined in the same way as the 'BitRate' data type, but with the OpenAPI 'nullable: true' property.
      nullable: true
      pattern: ^\d+(\.\d+)? (bps|Kbps|Mbps|Gbps|Tbps)$
      type: string
    fiveQiPriorityLevelRm:
      description: |
        This data type is defined in the same way as the 'fiveQiPriorityLevel' data type, but with the OpenAPI 'nullable: true' property.
      maximum: 127
      minimum: 1
      nullable: true
      type: integer
    AverWindowRm:
      default: 2000
      description: |
        This data type is defined in the same way as the 'AverWindow' data type, but with the OpenAPI 'nullable: true' property.
      maximum: 4095
      minimum: 1
      nullable: true
      type: integer
    MaxDataBurstVolRm:
      description: |
        This data type is defined in the same way as the 'MaxDataBurstVol' data type, but with the OpenAPI 'nullable: true' property.
      maximum: 4095
      minimum: 1
      nullable: true
      type: integer
    PacketLossRateRm:
      description: |
        This data type is defined in the same way as the 'PacketLossRate' data type, but with the OpenAPI 'nullable: true' property.
      maximum: 1000
      minimum: 0
      nullable: true
      type: integer
    ExtMaxDataBurstVolRm:
      description: |
        This data type is defined in the same way as the 'ExtMaxDataBurstVol' data type, but with the OpenAPI 'nullable: true' property.
      maximum: 2000000
      minimum: 4096
      nullable: true
      type: integer
    PacketDelBudget:
      description: |
        Unsigned integer indicating Packet Delay Budget (see clauses 5.7.3.4 and 5.7.4 of 3GPP TS 23.501), expressed in milliseconds.
      minimum: 1
      type: integer
    PacketErrRate:
      description: |
        String representing Packet Error Rate (see clause 5.7.3.5 and 5.7.4 of 3GPP TS 23.501, expressed as a "scalar x 10-k" where the scalar and the exponent k are each encoded as one decimal digit.
      pattern: "^([0-9]E-[0-9])$"
      type: string
    PduSetQosParaRm:
      allOf:
      - $ref: "#/components/schemas/PduSetQosPara"
      example:
        pduSetDelayBudget: null
        pduSetHandlingInfo: ALL_PDUS_NEEDED
        pduSetErrRate: null
      nullable: true
    PduSetQosPara:
      description: Represents the PDU Set level QoS parameters.
      properties:
        pduSetDelayBudget:
          $ref: "#/components/schemas/ExtPacketDelBudget"
        pduSetErrRate:
          $ref: "#/components/schemas/PacketErrRate"
        pduSetHandlingInfo:
          $ref: "#/components/schemas/PduSetHandlingInfo"
      type: object
    ExtPacketDelBudget:
      description: |
        Unsigned integer indicating Packet Delay Budget (see clauses 5.7.3.4 and 5.7.4 of 3GPP TS 23.501 [8])), expressed in 0.01 milliseconds.
      minimum: 1
      type: integer
    PduSetHandlingInfo:
      description: |
        Possible values are:
        - "ALL_PDUS_NEEDED": All PDUs of the PDU Set are needed
        - "ALL_PDUS_NOT_NEEDED": All PDUs of the PDU Set are not needed
      enum:
      - ALL_PDUS_NEEDED
      - ALL_PDUS_NOT_NEEDED
      type: string
    NullValue:
      description: JSON's null value.
      enum:
      - null
      type: string
    DateTimeRm:
      description: "string with format 'date-time' as defined in OpenAPI with 'nullable:true'\
        \ property. \n"
      format: date-time
      nullable: true
      type: string
    UplinkDownlinkSupport:
      description: |
        Represents whether an indication or capability is supported for the UL, the DL or both, UL and DL.
      enum:
      - UL
      - DL
      - UL_DL
      type: string
    FlowStatus:
      description: Describes whether the IP flow(s) are enabled or disabled.
      enum:
      - ENABLED-UPLINK
      - ENABLED-DOWNLINK
      - ENABLED
      - DISABLED
      - REMOVED
      type: string
    Metadata:
      description: |
        A String which is transparently passed to the UPF to be applied for traffic to SFC.
      format: byte
      nullable: true
      type: string
    RouteToLocation:
      anyOf: []
      description: |
        At least one of the "routeInfo" attribute and the "routeProfId" attribute shall be included in the "RouteToLocation" data type.
      example:
        dnai: null
        routeInfo:
          ipv6Addr: 2001:db8:85a3::8a2e:370:7334
          ipv4Addr: 198.51.100.1
          portNumber: null
        routeProfId: routeProfId
      nullable: true
      properties:
        dnai:
          $ref: "#/components/schemas/Dnai"
        routeInfo:
          $ref: "#/components/schemas/RouteInformation"
        routeProfId:
          description: Identifies the routing profile Id.
          nullable: true
          type: string
      required:
      - dnai
      type: object
    Dnai:
      description: "DNAI (Data network access identifier), see clause 5.6.7 of 3GPP\
        \ TS 23.501."
      type: string
    RouteInformation:
      description: "At least one of the \"ipv4Addr\" attribute and the \"ipv6Addr\"\
        \ attribute shall be included in the \"RouteInformation\" data type. \n"
      example:
        ipv6Addr: 2001:db8:85a3::8a2e:370:7334
        ipv4Addr: 198.51.100.1
        portNumber: null
      nullable: true
      properties:
        ipv4Addr:
          $ref: "#/components/schemas/Ipv4Addr"
        ipv6Addr:
          $ref: "#/components/schemas/Ipv6Addr"
        portNumber:
          $ref: "#/components/schemas/Uinteger"
      required:
      - portNumber
      type: object
    UintegerRm:
      description: |
        Unsigned Integer, i.e. only value 0 and integers above 0 are permissible with the OpenAPI 'nullable: true' property.
      minimum: 0
      nullable: true
      type: integer
    EasIpReplacementInfo:
      description: Contains EAS IP replacement information for a Source and a Target
        EAS.
      example:
        source:
          port: null
          ip:
            ipv6Addr: 2001:db8:85a3::8a2e:370:7334
            ipv4Addr: 198.51.100.1
            ipv6Prefix: 2001:db8:abcd:12::0/64
        target:
          port: null
          ip:
            ipv6Addr: 2001:db8:85a3::8a2e:370:7334
            ipv4Addr: 198.51.100.1
            ipv6Prefix: 2001:db8:abcd:12::0/64
      properties:
        source:
          $ref: "#/components/schemas/EasServerAddress"
        target:
          $ref: "#/components/schemas/EasServerAddress"
      required:
      - source
      - target
      type: object
    EasServerAddress:
      description: Represents the IP address and port of an EAS server.
      example:
        port: null
        ip:
          ipv6Addr: 2001:db8:85a3::8a2e:370:7334
          ipv4Addr: 198.51.100.1
          ipv6Prefix: 2001:db8:abcd:12::0/64
      properties:
        ip:
          $ref: "#/components/schemas/IpAddr"
        port:
          $ref: "#/components/schemas/Uinteger"
      required:
      - ip
      - port
      type: object
    IpAddr:
      description: Contains an IP adresse.
      example:
        ipv6Addr: 2001:db8:85a3::8a2e:370:7334
        ipv4Addr: 198.51.100.1
        ipv6Prefix: 2001:db8:abcd:12::0/64
      nullable: true
      oneOf: []
      properties:
        ipv4Addr:
          $ref: "#/components/schemas/Ipv4Addr"
        ipv6Addr:
          $ref: "#/components/schemas/Ipv6Addr"
        ipv6Prefix:
          $ref: "#/components/schemas/Ipv6Prefix"
      type: object
    TrafficCorrelationInfo:
      description: |
        Contains the information for traffic correlation.
      example:
        tfcCorrId: tfcCorrId
        notifUri: null
        fqdnRange:
        - regex: regex
          stringMatchingRule:
            stringMatchingConditions:
            - matchingString: matchingString
              matchingOperator: FULL_MATCH
            - matchingString: matchingString
              matchingOperator: FULL_MATCH
        - regex: regex
          stringMatchingRule:
            stringMatchingConditions:
            - matchingString: matchingString
              matchingOperator: FULL_MATCH
            - matchingString: matchingString
              matchingOperator: FULL_MATCH
        corrType: COMMON_DNAI
        comEasIpv4Addr: 198.51.100.1
        notifCorrId: notifCorrId
        comEasIpv6Addr: 2001:db8:85a3::8a2e:370:7334
      nullable: true
      properties:
        corrType:
          $ref: "#/components/schemas/CorrelationType"
        tfcCorrId:
          description: |
            Identification of a set of UEs accessing the application identified by the  Application Identifier or traffic filtering information.
          type: string
        comEasIpv4Addr:
          $ref: "#/components/schemas/Ipv4AddrRm"
        comEasIpv6Addr:
          $ref: "#/components/schemas/Ipv6AddrRm"
        fqdnRange:
          items:
            $ref: "#/components/schemas/FqdnPatternMatchingRule"
          minItems: 1
          nullable: true
          type: array
        notifUri:
          $ref: "#/components/schemas/UriRm"
        notifCorrId:
          description: Notification correlation identifier.
          nullable: true
          type: string
      type: object
    CorrelationType:
      description: Indicates that a common DNAI or common EAS should be selected.
      enum:
      - COMMON_DNAI
      - COMMON_EAS
      type: string
    RatingGroup:
      $ref: "#/components/schemas/Uint32"
    Uint32:
      description: |
        Integer where the allowed values correspond to the value range of an unsigned 32-bit integer.
      maximum: 4294967295
      minimum: 0
      type: integer
    ServiceId:
      $ref: "#/components/schemas/Uint32"
    ChargingId:
      deprecated: true
      description: |
        Integer where the allowed values correspond to the value range of an unsigned 32-bit integer.
      maximum: 4294967295
      minimum: 0
      type: integer
    ApplicationChargingId:
      description: |
        Application provided charging identifier allowing correlation of charging information.
      type: string
    VolumeRm:
      description: |
        Unsigned integer identifying a volume in units of bytes with "nullable=true" property.
      format: int64
      minimum: 0
      nullable: true
      type: integer
    DurationSecRm:
      description: "indicating a time in seconds with OpenAPI defined 'nullable: true'\
        \ property."
      nullable: true
      type: integer
    EthFlowDescription:
      description: Identifies an Ethernet flow.
      example:
        destMacAddr: null
        destMacAddrEnd: null
        sourceMacAddr: null
        fDir: DOWNLINK
        ethType: ethType
        fDesc: null
        vlanTags:
        - vlanTags
        - vlanTags
        srcMacAddrEnd: null
      properties:
        destMacAddr:
          $ref: "#/components/schemas/MacAddr48"
        ethType:
          type: string
        fDesc:
          $ref: "#/components/schemas/FlowDescription_1"
        fDir:
          $ref: "#/components/schemas/FlowDirection"
        sourceMacAddr:
          $ref: "#/components/schemas/MacAddr48"
        vlanTags:
          items:
            type: string
          maxItems: 2
          minItems: 1
          type: array
        srcMacAddrEnd:
          $ref: "#/components/schemas/MacAddr48"
        destMacAddrEnd:
          $ref: "#/components/schemas/MacAddr48"
      required:
      - ethType
      type: object
    FlowDescription_1:
      description: Defines a packet filter of an IP flow.
      type: string
    QosResourceType:
      description: "The enumeration QosResourceType indicates whether a QoS Flow is\
        \ non-GBR, delay critical GBR, or non-delay critical GBR (see clauses 5.7.3.4\
        \ and 5.7.3.5 of 3GPP TS 23.501). It shall comply with the provisions defined\
        \ in table 5.5.3.6-1. \n"
      enum:
      - NON_GBR
      - NON_CRITICAL_GBR
      - CRITICAL_GBR
      type: string
    AverWindow:
      default: 2000
      description: "Unsigned integer indicating Averaging Window (see clause 5.7.3.6\
        \ and 5.7.4 of 3GPP TS 23.501), expressed in milliseconds. \n"
      maximum: 4095
      minimum: 1
      type: integer
    MaxDataBurstVol:
      description: "Unsigned integer indicating Maximum Data Burst Volume (see clauses\
        \ 5.7.3.7 and 5.7.4 of 3GPP TS 23.501), expressed in Bytes. \n"
      maximum: 4095
      minimum: 1
      type: integer
    ExtMaxDataBurstVol:
      description: "Unsigned integer indicating Maximum Data Burst Volume (see clauses\
        \ 5.7.3.7 and 5.7.4 of 3GPP TS 23.501), expressed in Bytes. \n"
      maximum: 2000000
      minimum: 4096
      type: integer
    NfSetId:
      description: "NF Set Identifier (see clause 28.12 of 3GPP TS 23.003), formatted\
        \ as the following string \"set<Set ID>.<nftype>set.5gc.mnc<MNC>.mcc<MCC>\"\
        , or  \"set<SetID>.<NFType>set.5gc.nid<NID>.mnc<MNC>.mcc<MCC>\" with  <MCC>\
        \ encoded as defined in clause 5.4.2 (\"Mcc\" data type definition)  <MNC>\
        \ encoding the Mobile Network Code part of the PLMN, comprising 3 digits.\
        \ \n  If there are only 2 significant digits in the MNC, one \"0\" digit shall\
        \ be inserted \n  at the left side to fill the 3 digits coding of MNC.  Pattern:\
        \ '^[0-9]{3}$'\n<NFType> encoded as a value defined in Table 6.1.6.3.3-1 of\
        \ 3GPP TS 29.510 but \n  with lower case characters <Set ID> encoded as a\
        \ string of characters consisting of \n  alphabetic characters (A-Z and a-z),\
        \ digits (0-9) and/or the hyphen (-) and that \n  shall end with either an\
        \ alphabetic character or a digit. \n"
      type: string
    Volume:
      description: Unsigned integer identifying a volume in units of bytes.
      format: int64
      minimum: 0
      type: integer
    MacAddr48:
      description: |
        String identifying a MAC address formatted in the hexadecimal notation according to clause 1.1 and clause 2.1 of RFC 7042.
      pattern: "^([0-9a-fA-F]{2})((-[0-9a-fA-F]{2}){5})$"
      type: string
    PresenceInfo:
      description: |
        If the additionalPraId IE is present, this IE shall state the presence information of the UE for the individual PRA identified by the additionalPraId IE;  If the additionalPraId IE is not present, this IE shall state the presence information of the UE for the PRA identified by the praId IE.
      example:
        additionalPraId: additionalPraId
        ecgiList:
        - eutraCellId: null
          nid: null
          plmnId:
            mnc: null
            mcc: null
        - eutraCellId: null
          nid: null
          plmnId:
            mnc: null
            mcc: null
        globalRanNodeIdList:
        - eNbId: null
          wagfId: null
          tngfId: null
          gNbId:
            bitLength: 29
            gNBValue: gNBValue
          nid: null
          plmnId:
            mnc: null
            mcc: null
          n3IwfId: null
          ngeNbId: SMacroNGeNB-34B89
        - eNbId: null
          wagfId: null
          tngfId: null
          gNbId:
            bitLength: 29
            gNBValue: gNBValue
          nid: null
          plmnId:
            mnc: null
            mcc: null
          n3IwfId: null
          ngeNbId: SMacroNGeNB-34B89
        presenceState: IN_AREA
        praId: praId
        trackingAreaList:
        - tac: null
          nid: null
          plmnId:
            mnc: null
            mcc: null
        - tac: null
          nid: null
          plmnId:
            mnc: null
            mcc: null
        ncgiList:
        - nid: null
          plmnId:
            mnc: null
            mcc: null
          nrCellId: null
        - nid: null
          plmnId:
            mnc: null
            mcc: null
          nrCellId: null
        globaleNbIdList:
        - eNbId: null
          wagfId: null
          tngfId: null
          gNbId:
            bitLength: 29
            gNBValue: gNBValue
          nid: null
          plmnId:
            mnc: null
            mcc: null
          n3IwfId: null
          ngeNbId: SMacroNGeNB-34B89
        - eNbId: null
          wagfId: null
          tngfId: null
          gNbId:
            bitLength: 29
            gNBValue: gNBValue
          nid: null
          plmnId:
            mnc: null
            mcc: null
          n3IwfId: null
          ngeNbId: SMacroNGeNB-34B89
      properties:
        praId:
          description: |
            Represents an identifier of the Presence Reporting Area (see clause 28.10 of 3GPP  TS 23.003.  This IE shall be present  if the Area of Interest subscribed or reported is a Presence Reporting Area or a Set of Core Network predefined Presence Reporting Areas. When present, it shall be encoded as a string representing an integer in the following ranges: 0 to 8 388 607 for UE-dedicated PRA 8 388 608 to 16 777 215 for Core Network predefined PRA Examples: PRA ID 123 is encoded as "123" PRA ID 11 238 660 is encoded as "11238660"
          type: string
        additionalPraId:
          description: "This IE may be present if the praId IE is present and if it\
            \ contains a PRA identifier referring to a set of Core Network predefined\
            \ Presence Reporting Areas. When present, this IE shall contain a PRA\
            \ Identifier of an individual PRA within the Set of Core Network predefined\
            \ Presence Reporting Areas indicated by the praId IE. \n"
          type: string
        presenceState:
          $ref: "#/components/schemas/PresenceState"
        trackingAreaList:
          description: "Represents the list of tracking areas that constitutes the\
            \ area. This IE shall be present if the subscription or  the event report\
            \ is for tracking UE presence in the tracking areas. For non 3GPP access\
            \ the TAI shall be the N3GPP TAI. \n"
          items:
            $ref: "#/components/schemas/Tai"
          minItems: 1
          type: array
        ecgiList:
          description: "Represents the list of EUTRAN cell Ids that constitutes the\
            \ area. This IE shall be present if the Area of Interest subscribed is\
            \ a list of EUTRAN cell Ids. \n"
          items:
            $ref: "#/components/schemas/Ecgi"
          minItems: 1
          type: array
        ncgiList:
          description: "Represents the list of NR cell Ids that constitutes the area.\
            \ This IE shall be present if the Area of Interest subscribed is a list\
            \ of NR cell Ids. \n"
          items:
            $ref: "#/components/schemas/Ncgi"
          minItems: 1
          type: array
        globalRanNodeIdList:
          description: "Represents the list of NG RAN node identifiers that constitutes\
            \ the area. This IE shall be present if the Area of Interest subscribed\
            \ is a list of NG RAN node identifiers. \n"
          items:
            $ref: "#/components/schemas/GlobalRanNodeId"
          minItems: 1
          type: array
        globaleNbIdList:
          description: |
            Represents the list of eNodeB identifiers that constitutes the area. This IE shall be  present if the Area of Interest subscribed is a list of eNodeB identifiers.
          items:
            $ref: "#/components/schemas/GlobalRanNodeId"
          minItems: 1
          type: array
      type: object
    DddTrafficDescriptor:
      description: Contains a Traffic Descriptor.
      example:
        ipv6Addr: 2001:db8:85a3::8a2e:370:7334
        ipv4Addr: 198.51.100.1
        portNumber: null
        macAddr: null
      properties:
        ipv4Addr:
          $ref: "#/components/schemas/Ipv4Addr"
        ipv6Addr:
          $ref: "#/components/schemas/Ipv6Addr"
        portNumber:
          $ref: "#/components/schemas/Uinteger"
        macAddr:
          $ref: "#/components/schemas/MacAddr48"
      type: object
    DlDataDeliveryStatus:
      description: |
        Possible values are:
        - BUFFERED: The first downlink data is buffered with extended buffering matching the
          source of the downlink traffic.
        - TRANSMITTED: The first downlink data matching the source of the downlink traffic is
          transmitted after previous buffering or discarding of corresponding packet(s) because
          the UE of the PDU Session becomes ACTIVE, and buffered data can be delivered to UE.
        - DISCARDED: The first downlink data matching the source of the downlink traffic is
          discarded because the Extended Buffering time, as determined by the SMF, expires or
          the amount of downlink data to be buffered is exceeded.
      enum:
      - BUFFERED
      - TRANSMITTED
      - DISCARDED
      type: string
    BatOffsetInfo:
      description: |
        Indicates the offset of the BAT and the optionally adjusted periodicity.
      example:
        flows:
        - fNums:
          - 7
          - 7
          contVers:
          - null
          - null
          medCompN: 9
        - fNums:
          - 7
          - 7
          contVers:
          - null
          - null
          medCompN: 9
        adjPeriod: null
        ranBatOffsetNotif: 2
      properties:
        ranBatOffsetNotif:
          description: |
            Indicates the BAT offset of the arrival time of the data burst in units of milliseconds.
          type: integer
        adjPeriod:
          $ref: "#/components/schemas/Uinteger"
        flows:
          description: |
            Identification of the flows. If no flows are provided, the BAT offset applies for all flows of the AF session.
          items:
            $ref: "#/components/schemas/Flows"
          minItems: 1
          type: array
      required:
      - ranBatOffsetNotif
      type: object
    Flows:
      description: Identifies the flows.
      example:
        fNums:
        - 7
        - 7
        contVers:
        - null
        - null
        medCompN: 9
      properties:
        contVers:
          items:
            $ref: "#/components/schemas/ContentVersion"
          minItems: 1
          type: array
        fNums:
          items:
            type: integer
          minItems: 1
          type: array
        medCompN:
          type: integer
      required:
      - medCompN
      type: object
    DnaiChangeType:
      description: "Possible values are:\n- EARLY: Early notification of UP path reconfiguration.\n\
        - EARLY_LATE: Early and late notification of UP path reconfiguration. This\
        \ value shall\n  only be present in the subscription to the DNAI change event.\n\
        - LATE: Late notification of UP path reconfiguration. \n"
      enum:
      - EARLY
      - EARLY_LATE
      - LATE
      type: string
    FinalUnitAction:
      enum:
      - TERMINATE
      - REDIRECT
      - RESTRICT_ACCESS
      type: string
    NgApCause:
      description: Represents the NGAP cause.
      example:
        value: null
        group: null
      properties:
        group:
          $ref: "#/components/schemas/Uinteger"
        value:
          $ref: "#/components/schemas/Uinteger"
      required:
      - group
      - value
      type: object
    fiveGMmCause:
      $ref: "#/components/schemas/Uinteger"
    QosNotifType:
      description: Indicates the notification type for QoS Notification Control.
      enum:
      - GUARANTEED
      - NOT_GUARANTEED
      type: string
    Guami:
      description: "Globally Unique AMF Identifier constructed out of PLMN, Network\
        \ and AMF identity."
      example:
        plmnId:
          mnc: null
          nid: null
          mcc: null
        amfId: null
      properties:
        plmnId:
          $ref: "#/components/schemas/PlmnIdNid"
        amfId:
          $ref: "#/components/schemas/AmfId"
      required:
      - amfId
      - plmnId
      type: object
    AmfId:
      description: "String identifying the AMF ID composed of AMF Region ID (8 bits),\
        \ AMF Set ID (10 bits) and AMF  Pointer (6 bits) as specified in clause 2.10.1\
        \ of 3GPP TS 23.003. It is encoded as a string of  6 hexadecimal characters\
        \ (i.e., 24 bits). \n"
      pattern: "^[A-Fa-f0-9]{6}$"
      type: string
    AnGwAddress:
      anyOf: []
      description: Describes the address of the access network gateway control node.
      example:
        anGwIpv6Addr: 2001:db8:85a3::8a2e:370:7334
        anGwIpv4Addr: 198.51.100.1
      nullable: true
      properties:
        anGwIpv4Addr:
          $ref: "#/components/schemas/Ipv4Addr"
        anGwIpv6Addr:
          $ref: "#/components/schemas/Ipv6Addr"
      type: object
    AccessTypeRm:
      description: |
        Indicates wether the access is via 3GPP or via non-3GPP but with the OpenAPI  'nullable: true' property."
      enum:
      - 3GPP_ACCESS
      - NON_3GPP_ACCESS
      - null
      type: string
      x-enum-descriptions:
      - ""
      - ""
      - JSON's null value.
    UriRm:
      description: |
        String providing an URI formatted according to RFC 3986 with the OpenAPI 'nullable: true' property.
      nullable: true
      type: string
    ApplicationId:
      description: String providing an application identifier.
      type: string
    Uint64:
      description: |
        Integer where the allowed values correspond to the value range of an unsigned 64-bit integer.
      maximum: 18446744073709551615
      minimum: 0
      type: integer
    Uint16:
      description: |
        Integer where the allowed values correspond to the value range of an unsigned 16-bit integer.
      maximum: 65535
      minimum: 0
      type: integer
    NwdafEvent:
      description: "Describes the NWDAF Events.  \nPossible values are:\n- SLICE_LOAD_LEVEL:\
        \ Indicates that the event subscribed is load level information of Network\n\
        \  Slice.\n- NETWORK_PERFORMANCE: Indicates that the event subscribed is network\
        \ performance\n  information.\n- NF_LOAD: Indicates that the event subscribed\
        \ is load level and status of one or several\n  Network Functions.\n- SERVICE_EXPERIENCE:\
        \ Indicates that the event subscribed is service experience.\n- UE_MOBILITY:\
        \ Indicates that the event subscribed is UE mobility information.\n- UE_COMMUNICATION:\
        \ Indicates that the event subscribed is UE communication information.\n-\
        \ QOS_SUSTAINABILITY: Indicates that the event subscribed is QoS sustainability.\n\
        - ABNORMAL_BEHAVIOUR: Indicates that the event subscribed is abnormal behaviour.\n\
        - USER_DATA_CONGESTION: Indicates that the event subscribed is user data congestion\n\
        \  information.\n- NSI_LOAD_LEVEL: Indicates that the event subscribed is\
        \ load level information of Network\n  Slice and the optionally associated\
        \ Network Slice Instance.\n- DN_PERFORMANCE: Indicates that the event subscribed\
        \ is DN performance information.\n- DISPERSION: Indicates that the event subscribed\
        \ is dispersion information.\n- RED_TRANS_EXP: Indicates that the event subscribed\
        \ is redundant transmission experience.\n- WLAN_PERFORMANCE: Indicates that\
        \ the event subscribed is WLAN performance.\n- SM_CONGESTION: Indicates the\
        \ Session Management Congestion Control Experience information\n  for specific\
        \ DNN and/or S-NSSAI.\n- PFD_DETERMINATION: Indicates that the event subscribed\
        \ is the PFD Determination nformation\n  for known application identifier(s).\n\
        - PDU_SESSION_TRAFFIC: Indicates that the event subscribed is the PDU Session\
        \ traffic\n  information.\n- E2E_DATA_VOL_TRANS_TIME: Indicates that the event\
        \ subscribed is of E2E data volume \n  transfer time.\n- MOVEMENT_BEHAVIOUR:\
        \ Indicates that the event subscribed is the Movement Behaviour\n  information.\n\
        - LOC_ACCURACY: Indicates that the event subscribed is of location accuracy.\n\
        - RELATIVE_PROXIMITY: Indicates that the event subscribed is the Relative\
        \ Proximity\n  information.\n"
      enum:
      - SLICE_LOAD_LEVEL
      - NETWORK_PERFORMANCE
      - NF_LOAD
      - SERVICE_EXPERIENCE
      - UE_MOBILITY
      - UE_COMMUNICATION
      - QOS_SUSTAINABILITY
      - ABNORMAL_BEHAVIOUR
      - USER_DATA_CONGESTION
      - NSI_LOAD_LEVEL
      - DN_PERFORMANCE
      - DISPERSION
      - RED_TRANS_EXP
      - WLAN_PERFORMANCE
      - SM_CONGESTION
      - PFD_DETERMINATION
      - PDU_SESSION_TRAFFIC
      - E2E_DATA_VOL_TRANS_TIME
      - MOVEMENT_BEHAVIOUR
      - NUM_OF_UE
      - MOV_UE_RATIO
      - AVR_SPEED
      - SPEED_THRESHOLD
      - MOV_UE_DIRECTION
      - LOC_ACCURACY
      - RELATIVE_PROXIMITY
      type: string
    DurationMilliSecRm:
      description: |
        This data type is defined in the same way as the "DurationMillisec" data type, but with the OpenAPI nullable property set to true.
      type: integer
    L4sNotifType:
      description: Indicates the notification type for ECN marking for L4S support
        in 5GS.
      enum:
      - AVAILABLE
      - NOT_AVAILABLE
      type: string
    AccessTokenErr:
      description: Error returned in the access token response message
      example:
        error_description: error_description
        error: invalid_request
        error_uri: error_uri
      properties:
        error:
          enum:
          - invalid_request
          - invalid_client
          - invalid_grant
          - unauthorized_client
          - unsupported_grant_type
          - invalid_scope
          type: string
        error_description:
          type: string
        error_uri:
          type: string
      required:
      - error
      type: object
    AccessTokenReq:
      description: Contains information related to the access token request
      example:
        nfInstanceId: null
        targetNfSetId: null
        hnrfAccessTokenUri: null
        nfType: NRF
        requesterSnpnList:
        - mnc: null
          nid: null
          mcc: null
        - mnc: null
          nid: null
          mcc: null
        targetSnpn:
          mnc: null
          nid: null
          mcc: null
        requesterPlmn:
          mnc: null
          mcc: null
        targetNfType: null
        targetNfInstanceId: null
        targetPlmn:
          mnc: null
          mcc: null
        requesterSnssaiList:
        - sd: sd
          sst: 180
        - sd: sd
          sst: 180
        targetNfServiceSetId: null
        grant_type: client_credentials
        scope: scope
        targetNsiList:
        - targetNsiList
        - targetNsiList
        sourceNfInstanceId: null
        targetSnssaiList:
        - sd: sd
          sst: 180
        - sd: sd
          sst: 180
        requesterPlmnList:
        - mnc: null
          mcc: null
        - mnc: null
          mcc: null
        requesterFqdn: null
      properties:
        grant_type:
          enum:
          - client_credentials
          type: string
        nfInstanceId:
          $ref: "#/components/schemas/NfInstanceId"
        nfType:
          $ref: "#/components/schemas/NFType"
        targetNfType:
          $ref: "#/components/schemas/NFType"
        scope:
          pattern: "^([a-zA-Z0-9_:-]+)( [a-zA-Z0-9_:-]+)*$"
          type: string
        targetNfInstanceId:
          $ref: "#/components/schemas/NfInstanceId"
        requesterPlmn:
          $ref: "#/components/schemas/PlmnId"
        requesterPlmnList:
          items:
            $ref: "#/components/schemas/PlmnId"
          minItems: 2
          type: array
        requesterSnssaiList:
          items:
            $ref: "#/components/schemas/Snssai"
          minItems: 1
          type: array
        requesterFqdn:
          $ref: "#/components/schemas/Fqdn"
        requesterSnpnList:
          items:
            $ref: "#/components/schemas/PlmnIdNid"
          minItems: 1
          type: array
        targetPlmn:
          $ref: "#/components/schemas/PlmnId"
        targetSnpn:
          $ref: "#/components/schemas/PlmnIdNid"
        targetSnssaiList:
          items:
            $ref: "#/components/schemas/Snssai"
          minItems: 1
          type: array
        targetNsiList:
          items:
            type: string
          minItems: 1
          type: array
        targetNfSetId:
          $ref: "#/components/schemas/NfSetId"
        targetNfServiceSetId:
          $ref: "#/components/schemas/NfServiceSetId"
        hnrfAccessTokenUri:
          $ref: "#/components/schemas/Uri"
        sourceNfInstanceId:
          $ref: "#/components/schemas/NfInstanceId"
      required:
      - grant_type
      - nfInstanceId
      - scope
      type: object
    NoProfileMatchInfo:
      description: Provides the reason for not finding NF matching the search criteria
      example:
        reason: REQUESTER_PLMN_NOT_ALLOWED
        queryParamCombinationList:
        - queryParams:
          - name: name
            value: value
          - name: name
            value: value
        - queryParams:
          - name: name
            value: value
          - name: name
            value: value
      properties:
        reason:
          $ref: "#/components/schemas/NoProfileMatchReason"
        queryParamCombinationList:
          items:
            $ref: "#/components/schemas/QueryParamCombination"
          minItems: 1
          type: array
      required:
      - reason
      type: object
    NoProfileMatchReason:
      description: No Profile Match Reason
      enum:
      - REQUESTER_PLMN_NOT_ALLOWED
      - TARGET_NF_SUSPENDED
      - TARGET_NF_UNDISCOVERABLE
      - QUERY_PARAMS_COMBINATION_NO_MATCH
      - TARGET_NF_TYPE_NOT_SUPPORTED
      - UNSPECIFIED
      type: string
    QueryParamCombination:
      description: Contains a list of Query Parameters
      example:
        queryParams:
        - name: name
          value: value
        - name: name
          value: value
      properties:
        queryParams:
          items:
            $ref: "#/components/schemas/QueryParameter"
          minItems: 1
          type: array
      required:
      - queryParams
      type: object
    QueryParameter:
      description: Contains the name and value of a query parameter
      example:
        name: name
        value: value
      properties:
        name:
          type: string
        value:
          type: string
      required:
      - name
      - value
      type: object
    TimeWindow:
      description: Represents a time window identified by a start time and a stop
        time.
      example:
        startTime: null
        stopTime: null
      properties:
        startTime:
          $ref: "#/components/schemas/DateTime_1"
        stopTime:
          $ref: "#/components/schemas/DateTime_1"
      required:
      - startTime
      - stopTime
      type: object
    DateTime_1:
      description: string with format "date-time" as defined in OpenAPI.
      format: date-time
      type: string
    Ipv4AddrRm:
      description: |
        String identifying a IPv4 address formatted in the 'dotted decimal' notation as defined in RFC 1166 with the OpenAPI defined 'nullable: true' property.
      example: 198.51.100.1
      nullable: true
      pattern: "^(([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])\\.){3}([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])$"
      type: string
    Ipv6AddrRm:
      description: |
        String identifying an IPv6 address formatted according to clause 4 of RFC5952 with the OpenAPI 'nullable: true' property. The mixed IPv4 IPv6 notation according to clause 5 of RFC5952 shall not be used.
      example: 2001:db8:85a3::8a2e:370:7334
      nullable: true
      pattern: "^(((:|(0?|([1-9a-f][0-9a-f]{0,3}))):)((0?|([1-9a-f][0-9a-f]{0,3})):){0,6}(:|(0?|([1-9a-f][0-9a-f]{0,3}))))|((([^:]+:){7}([^:]+))|((([^:]+:)*[^:]+)?::(([^:]+:)*[^:]+)?)))$"
      type: string
    NFType:
      description: NF types known to NRF
      enum:
      - NRF
      - UDM
      - AMF
      - SMF
      - AUSF
      - NEF
      - PCF
      - SMSF
      - NSSF
      - UDR
      - LMF
      - GMLC
      - 5G_EIR
      - SEPP
      - UPF
      - N3IWF
      - AF
      - UDSF
      - BSF
      - CHF
      - NWDAF
      - PCSCF
      - CBCF
      - HSS
      - UCMF
      - SOR_AF
      - SPAF
      - MME
      - SCSAS
      - SCEF
      - SCP
      - NSSAAF
      - ICSCF
      - SCSCF
      - DRA
      - IMS_AS
      - AANF
      - 5G_DDNMF
      - NSACF
      - MFAF
      - EASDF
      - DCCF
      - MB_SMF
      - TSCTSF
      - ADRF
      - GBA_BSF
      - CEF
      - MB_UPF
      - NSWOF
      - PKMF
      - MNPF
      - SMS_GMSC
      - SMS_IWMSC
      - MBSF
      - MBSTF
      - PANF
      - IP_SM_GW
      - SMS_ROUTER
      - DCSF
      - MRF
      - MRFP
      - MF
      - SLPKMF
      - RH
      type: string
    NfServiceSetId:
      description: "NF Service Set Identifier (see clause 28.12 of 3GPP TS 23.003)\
        \ formatted as the following  string \"set<Set ID>.sn<Service Name>.nfi<NF\
        \ Instance ID>.5gc.mnc<MNC>.mcc<MCC>\", or  \"set<SetID>.sn<ServiceName>.nfi<NFInstanceID>.5gc.nid<NID>.mnc<MNC>.mcc<MCC>\"\
        \ with  <MCC> encoded as defined in clause 5.4.2 (\"Mcc\" data type definition)\
        \   <MNC> encoding the Mobile Network Code part of the PLMN, comprising 3\
        \ digits. \n  If there are only 2 significant digits in the MNC, one \"0\"\
        \ digit shall be inserted \n  at the left side to fill the 3 digits coding\
        \ of MNC.  Pattern: '^[0-9]{3}$'\n<NID> encoded as defined in clause\_5.4.2\
        \ (\"Nid\" data type definition)  <NFInstanceId> encoded as defined in clause\
        \ 5.3.2  <ServiceName> encoded as defined in 3GPP TS 29.510  <Set ID> encoded\
        \ as a string of characters consisting of alphabetic \n  characters (A-Z and\
        \ a-z), digits (0-9) and/or the hyphen (-) and that shall end \n  with either\
        \ an alphabetic character or a digit.\n"
      type: string
