      description: SCP Domain Routing Information Subscription
      example:
        validityTime: 2000-01-23T04:56:07.000+00:00
        callbackUri: callbackUri
        reqInstanceId: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        localInd: false
      properties:
        callbackUri:
          description: String providing an URI formatted according to RFC 3986.
          type: string
        validityTime:
          description: string with format 'date-time' as defined in OpenAPI.
          format: date-time
          type: string
        reqInstanceId:
          description: "String uniquely identifying a NF instance. The format of the\
            \ NF Instance ID shall be a  Universally Unique Identifier (UUID) version\
            \ 4, as described in IETF RFC 4122. \n"
          format: uuid
          type: string
        localInd:
          default: false
          type: boolean
      required:
      - callbackUri
      type: object
