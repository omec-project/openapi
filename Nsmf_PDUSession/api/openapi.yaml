        ipv4EndpointAddresses:
          items:
            $ref: "#/components/schemas/Ipv4Addr"
          minItems: 1
          type: array
        ipv6EndpointAddresses:
          items:
            $ref: "#/components/schemas/Ipv6Addr"
          minItems: 1
          type: array
        endpointFqdn:
          $ref: "#/components/schemas/Fqdn"
      type: object
    TwifInfo:
