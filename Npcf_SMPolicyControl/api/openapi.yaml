    RequestedRuleDataType:
      description: "Indicates the type of rule data requested by the PCF.  \nPossible\
        \ values are:\n- CH_ID: Indicates that the requested rule data is the charging\
        \ identifier.\n- MS_TIME_ZONE: Indicates that the requested access network\
        \ info type is the UE's timezone.\n- USER_LOC_INFO: Indicates that the requested\
        \ access network info type is the UE's location.\n- RES_RELEASE: Indicates\
        \ that the requested rule data is the result of the release of\nresource.\n\
        - SUCC_RES_ALLO: Indicates that the requested rule data is the successful\
        \ resource\nallocation.\n- EPS_FALLBACK: Indicates that the requested rule\
        \ data is the report of QoS flow rejection\ndue to EPS fallback.\n"
      enum:
      - CH_ID
      - MS_TIME_ZONE
      - USER_LOC_INFO
      - RES_RELEASE
      - SUCC_RES_ALLO
      - EPS_FALLBACK
      type: string
    RuleStatus:
      description: "Indicates the status of PCC or session rule.  \nPossible values\
        \ are\n- ACTIVE: Indicates that the PCC rule(s) are successfully installed\
        \ (for those provisioned \nfrom PCF) or activated (for those pre-defined in\
        \ SMF), or the session rule(s) are \nsuccessfully installed \n- INACTIVE:\
        \ Indicates that the PCC rule(s) are removed (for those provisioned from PCF)\
        \ or \ninactive (for those pre-defined in SMF) or the session rule(s) are\
        \ removed.\n"
      enum:
      - ACTIVE
      - INACTIVE
      type: string
    FailureCode:
      description: "Indicates the reason of the PCC rule failure.  \nPossible values\
        \ are\n- UNK_RULE_ID: Indicates that the pre-provisioned PCC rule could not\
        \ be successfully\nactivated because the PCC rule identifier is unknown to\
        \ the SMF.\n- RA_GR_ERR: Indicate that the PCC rule could not be successfully\
        \ installed or enforced\nbecause the Rating Group specified within the Charging\
        \ Data policy decision which the PCC\nrule refers to is unknown or, invalid.\n\
        - SER_ID_ERR: Indicate that the PCC rule could not be successfully installed\
        \ or enforced\nbecause the Service Identifier specified within the Charging\
        \ Data policy decision which the\nPCC rule refers to is invalid, unknown,\
        \ or not applicable to the service being charged.\n- NF_MAL: Indicate that\
        \ the PCC rule could not be successfully installed (for those\nprovisioned\
        \ from the PCF) or activated (for those pre-defined in SMF) or enforced (for\
        \ those\nalready successfully installed) due to SMF/UPF malfunction.\n- RES_LIM:\
        \ Indicate that the PCC rule could not be successfully installed (for those\n\
        provisioned from PCF) or activated (for those pre-defined in SMF) or enforced\
        \ (for those\nalready successfully installed) due to a limitation of resources\
        \ at the SMF/UPF.\n- MAX_NR_QoS_FLOW: Indicate that the PCC rule could not\
        \ be successfully installed (for those\nprovisioned from PCF) or activated\
        \ (for those pre-defined in SMF) or enforced (for those\nalready successfully\
        \ installed) due to the fact that the maximum number of QoS flows has\nbeen\
        \ reached for the PDU session.\n- MISS_FLOW_INFO: Indicate that the PCC rule\
        \ could not be successfully installed or enforced\nbecause neither the \"\
        flowInfos\" attribute nor the \"appId\" attribute is specified within the\n\
        PccRule data structure by the PCF during the first install request of the\
        \ PCC rule.\n- RES_ALLO_FAIL: Indicate that the PCC rule could not be successfully\
        \ installed or\nmaintained since the QoS flow establishment/modification failed,\
        \ or the QoS flow was\nreleased.\n- UNSUCC_QOS_VAL: indicate that the QoS\
        \ validation has failed or when Guaranteed Bandwidth >\nMax-Requested-Bandwidth.\n\
        - INCOR_FLOW_INFO: Indicate that the PCC rule could not be successfully installed\
        \ or\nmodified at the SMF because the provided flow information is not supported\
        \ by the network\n (e.g. the provided IP address(es) or Ipv6 prefix(es) do\
        \ not correspond to an IP version\napplicable for the PDU session).\n- PS_TO_CS_HAN:\
        \ Indicate that the PCC rule could not be maintained because of PS to CS\n\
        handover.\n- APP_ID_ERR: Indicate that the rule could not be successfully\
        \ installed or enforced because\nthe Application Identifier is invalid, unknown,\
        \ or not applicable to the application\nrequired for detection.\n- NO_QOS_FLOW_BOUND:\
        \ Indicate that there is no QoS flow which the SMF can bind the PCC\nrule(s)\
        \ to.\n- FILTER_RES: Indicate that the Flow Information within the \"flowInfos\"\
        \ attribute cannot be \nhandled by the SMF because any of the restrictions\
        \ defined in clause 5.4.2 of 3GPP TS 29.212 \nwas not met.\n- MISS_REDI_SER_ADDR:\
        \ Indicate that the PCC rule could not be successfully installed or\nenforced\
        \ at the SMF because there is no valid Redirect Server Address within the\
        \ Traffic\nControl Data policy decision which the PCC rule refers to provided\
        \ by the PCF and no \npreconfigured redirection address for this PCC rule\
        \ at the SMF.\n- CM_END_USER_SER_DENIED: Indicate that the charging system\
        \ denied the service request due\nto service restrictions (e.g. terminate\
        \ rating group) or limitations related to the\nend-user, for example the end-user's\
        \ account could not cover the requested service.\n- CM_CREDIT_CON_NOT_APP:\
        \ Indicate that the charging system determined that the service can\nbe granted\
        \ to the end user but no further credit control is needed for the service\
        \ (e.g.\nservice is free of charge or is treated for offline charging).\n\
        \  - CM_AUTH_REJ: Indicate that the charging system denied the service request\
        \ in order to\nterminate the service for which credit is requested.\n- CM_USER_UNK:\
        \ Indicate that the specified end user could not be found in the charging\n\
        system.\n- CM_RAT_FAILED: Indicate that the charging system cannot rate the\
        \ service request due to\ninsufficient rating input, incorrect AVP combination\
        \ or due to an attribute or an attribute\nvalue that is not recognized or\
        \ supported in the rating.\n- UE_STA_SUSP: Indicates that the UE is in suspend\
        \ state.\n- UNKNOWN_REF_ID: Indicates that the PCC rule could not be successfully\
        \ installed/modified\nbecause the referenced identifier to a Policy Decision\
        \ Data or to a Condition Data is\nunknown to the SMF.\n- INCORRECT_COND_DATA:\
        \ Indicates that the PCC rule could not be successfully\ninstalled/modified\
        \ because the referenced Condition data are incorrect.\n- REF_ID_COLLISION:\
        \ Indicates that PCC rule could not be successfully installed/modified\nbecause\
        \ the same Policy Decision is referenced by a session rule (e.g. the session\
        \ rule and         the PCC rule refer to the same Usage Monitoring decision\
        \ data).\n- TRAFFIC_STEERING_ERROR: Indicates that enforcement of the steering\
        \ of traffic to the\nN6-LAN or 5G-LAN failed; or the dynamic PCC rule could\
        \ not be successfully installed or\nmodified at the NF service consumer because\
        \ there are invalid traffic steering policy\nidentifier(s) within the provided\
        \ Traffic Control Data policy decision to which the PCC\nrule refers.\n- DNAI_STEERING_ERROR:\
        \ Indicates that the enforcement of the steering of traffic to the\nindicated\
        \ DNAI failed; or the dynamic PCC rule could not be successfully installed\
        \ or\nmodified at the NF service consumer because there is invalid route information\
        \ for a DNAI(s)\n (e.g. routing profile id is not configured) within the provided\
        \ Traffic Control Data policy\ndecision to which the PCC rule refers.\n- AN_GW_FAILED:\
        \ This value is used to indicate that the AN-Gateway has failed and that the\n\
        PCF should refrain from sending policy decisions to the SMF until it is informed\
        \ that the\nS-GW has been recovered. This value shall not be used if the SM\
        \ Policy association\nmodification procedure is initiated for PCC rule removal\
        \ only.\n- MAX_NR_PACKET_FILTERS_EXCEEDED: This value is used to indicate\
        \ that the PCC rule could not\nbe successfully installed, modified or enforced\
        \ at the NF service consumer because the\nnumber of supported packet filters\
        \ for signalled QoS rules for the PDU session has been\nreached.\n- PACKET_FILTER_TFT_ALLOCATION_EXCEEDED:\
        \ This value is used to indicate that the PCC rule is\nremoved at 5GS to EPS\
        \ mobility because TFT allocation was not possible since the number of\nactive\
        \ packet filters in the EPC bearer is exceeded.\n- MUTE_CHG_NOT_ALLOWED: Indicates\
        \ that the PCC rule could not be successfully modified\nbecause the mute condition\
        \ for application detection report cannot be changed. Applicable\nwhen the\
        \ functionality introduced with the ADC feature applies.\n"
      enum:
      - UNK_RULE_ID
      - RA_GR_ERR
      - SER_ID_ERR
      - NF_MAL
      - RES_LIM
      - MAX_NR_QoS_FLOW
      - MISS_FLOW_INFO
      - RES_ALLO_FAIL
      - UNSUCC_QOS_VAL
      - INCOR_FLOW_INFO
      - PS_TO_CS_HAN
      - APP_ID_ERR
      - NO_QOS_FLOW_BOUND
      - FILTER_RES
      - MISS_REDI_SER_ADDR
      - CM_END_USER_SER_DENIED
      - CM_CREDIT_CON_NOT_APP
      - CM_AUTH_REJ
      - CM_USER_UNK
      - CM_RAT_FAILED
      - UE_STA_SUSP
      - UNKNOWN_REF_ID
      - INCORRECT_COND_DATA
      - REF_ID_COLLISION
      - TRAFFIC_STEERING_ERROR
      - DNAI_STEERING_ERROR
      - AN_GW_FAILE
      - MAX_NR_PACKET_FILTERS_EXCEEDED
      - PACKET_FILTER_TFT_ALLOCATION_EXCEEDED
      - MUTE_CHG_NOT_ALLOWED
      - UE_TEMPORARILY_UNAVAILABLE
      type: string
    AfSigProtocol:
      description: "Indicates the protocol used for signalling between the UE and\
        \ the AF.  \nPossible values are\n- NO_INFORMATION: Indicate that no information\
        \ about the AF signalling protocol is being\nprovided.\n- SIP: Indicate that\
        \ the signalling protocol is Session Initiation Protocol.\n"
      enum:
      - NO_INFORMATION
      - SIP
      nullable: true
      type: string
    RuleOperation:
      description: "Indicates a UE initiated resource operation that causes a request\
        \ for PCC rules.  \nPossible values are\n- CREATE_PCC_RULE: Indicates to create\
        \ a new PCC rule to reserve the resource requested by\nthe UE. \n- DELETE_PCC_RULE:\
        \ Indicates to delete a PCC rule corresponding to reserve the resource\nrequested\
        \ by the UE.\n- MODIFY_PCC_RULE_AND_ADD_PACKET_FILTERS: Indicates to modify\
        \ the PCC rule by adding new\npacket filter(s).\n- MODIFY_PCC_RULE_AND_REPLACE_PACKET_FILTERS:\
        \ Indicates to modify the PCC rule by replacing\nthe existing packet filter(s).\n\
        - MODIFY_PCC_RULE_AND_DELETE_PACKET_FILTERS: Indicates to modify the PCC rule\
        \ by deleting\nthe existing packet filter(s).\n- MODIFY_PCC_RULE_WITHOUT_MODIFY_PACKET_FILTERS:\
        \ Indicates to modify the PCC rule by\nmodifying the QoS of the PCC rule.\n"
      enum:
      - CREATE_PCC_RULE
      - DELETE_PCC_RULE
      - MODIFY_PCC_RULE_AND_ADD_PACKET_FILTERS
      - MODIFY_PCC_RULE_AND_REPLACE_PACKET_FILTERS
      - MODIFY_PCC_RULE_AND_DELETE_PACKET_FILTERS
      - MODIFY_PCC_RULE_WITHOUT_MODIFY_PACKET_FILTERS
      type: string
    RedirectAddressType:
      description: "Indicates the redirect address type.  \nPossible values are\n\
        - IPV4_ADDR: Indicates that the address type is in the form of \"dotted-decimal\"\
        \ IPv4\naddress.\n- IPV6_ADDR: Indicates that the address type is in the form\
        \ of IPv6 address.\n- URL: Indicates that the address type is in the form\
        \ of Uniform Resource Locator.\n- SIP_URI: Indicates that the address type\
        \ is in the form of SIP Uniform Resource\nIdentifier.\n"
      enum:
      - IPV4_ADDR
      - IPV6_ADDR
      - URL
      - SIP_URI
      type: string
    QosFlowUsage:
      description: "Indicates a QoS flow usage information.  \nPossible values are\n\
        - GENERAL: Indicate no specific QoS flow usage information is available.\n\
        - IMS_SIG: Indicate that the QoS flow is used for IMS signalling only.\n"
      enum:
      - GENERAL
      - IMS_SIG
      type: string
    FailureCause:
      description: Indicates the cause of the failure in a Partial Success Report.
