    Fqdn:
      description: Fully Qualified Domain Name
      maxLength: 253
      minLength: 4
      pattern: "^([0-9A-Za-z]([-0-9A-Za-z]{0,61}[0-9A-Za-z])?\\.)+[A-Za-z]{2,63}\\\
        .?$"
      type: string
    PlmnId:
      description: |
        When PlmnId needs to be converted to string (e.g. when used in maps as key), the string  shall be composed of three digits "mcc" followed by "-" and two or three digits "mnc".
      example:
        mnc: null
        mcc: null
      properties:
        mcc:
          $ref: "#/components/schemas/Mcc"
        mnc:
          $ref: "#/components/schemas/Mnc"
      required:
      - mcc
      - mnc
      type: object
    Mcc:
      description: "Mobile Country Code part of the PLMN, comprising 3 digits, as\
        \ defined in clause 9.3.3.5 of 3GPP TS 38.413. \n"
      pattern: "^\\d{3}$"
      type: string
    Mnc:
      description: "Mobile Network Code part of the PLMN, comprising 2 or 3 digits,\
        \ as defined in  clause 9.3.3.5 of 3GPP TS 38.413. \n"
      pattern: "^\\d{2,3}$"
      type: string
    Uri:
      description: String providing an URI formatted according to RFC 3986.
      type: string
    Snssai:
      description: |
        When Snssai needs to be converted to string (e.g. when used in maps as key), the string shall be composed of one to three digits "sst" optionally followed by "-" and 6 hexadecimal digits "sd".
      example:
        sd: sd
        sst: 153
      properties:
        sst:
          description: "Unsigned integer, within the range 0 to 255, representing\
            \ the Slice/Service Type.  It indicates the expected Network Slice behaviour\
            \ in terms of features and services. Values 0 to 127 correspond to the\
            \ standardized SST range. Values 128 to 255 correspond  to the Operator-specific\
            \ range. See clause 28.4.2 of 3GPP TS 23.003. Standardized values are\
            \ defined in clause 5.15.2.2 of 3GPP TS 23.501. \n"
          maximum: 255
          minimum: 0
          type: integer
        sd:
          description: |
            3-octet string, representing the Slice Differentiator, in hexadecimal representation. Each character in the string shall take a value of "0" to "9", "a" to "f" or "A" to "F" and shall represent 4 bits. The most significant character representing the 4 most significant bits of the SD shall appear first in the string, and the character representing the 4 least significant bit of the SD shall appear last in the string. This is an optional parameter that complements the Slice/Service type(s) to allow to  differentiate amongst multiple Network Slices of the same Slice/Service type. This IE shall be absent if no SD value is associated with the SST.
          pattern: "^[A-Fa-f0-9]{6}$"
          type: string
      required:
      - sst
      type: object
    PlmnSnssai:
      description: List of network slices (S-NSSAIs) for a given PLMN ID
      example:
        nid: null
        plmnId:
          mnc: null
          mcc: null
        sNssaiList:
        - sd: sd
          sst: 153
        - sd: sd
          sst: 153
      properties:
        plmnId:
          $ref: "#/components/schemas/PlmnId"
        sNssaiList:
          items:
            $ref: "#/components/schemas/Snssai"
          minItems: 1
          type: array
        nid:
          $ref: "#/components/schemas/Nid"
      required:
      - plmnId
      - sNssaiList
      type: object
    Dnn:
      description: |
        String representing a Data Network as defined in clause 9A of 3GPP TS 23.003;  it shall contain either a DNN Network Identifier, or a full DNN with both the Network  Identifier and Operator Identifier, as specified in 3GPP TS 23.003 clause 9.1.1 and 9.1.2. It shall be coded as string in which the labels are separated by dots  (e.g. "Label1.Label2.Label3").
      type: string
    IpIndex:
      anyOf:
      - type: integer
      - type: string
      description: Represents the IP Index to be sent from UDM to the SMF (its value
        can be either an integer or a string)
    Tai:
      description: Contains the tracking area identity as described in 3GPP 23.003
      example:
        tac: null
        nid: null
        plmnId:
          mnc: null
          mcc: null
      properties:
        plmnId:
          $ref: "#/components/schemas/PlmnId"
        tac:
          $ref: "#/components/schemas/Tac"
        nid:
          $ref: "#/components/schemas/Nid"
      required:
      - plmnId
      - tac
      type: object
    Tac:
      description: "2 or 3-octet string identifying a tracking area code as specified\
        \ in clause 9.3.3.10  of 3GPP TS 38.413, in hexadecimal representation. Each\
        \ character in the string shall  take a value of \"0\" to \"9\", \"a\" to\
        \ \"f\" or \"A\" to \"F\" and shall represent 4 bits. The most significant\
        \ character representing the 4 most significant bits of the TAC shall  appear\
        \ first in the string, and the character representing the 4 least significant\
        \ bit  of the TAC shall appear last in the string. \n"
      pattern: "(^[A-Fa-f0-9]{4}$)|(^[A-Fa-f0-9]{6}$)"
      type: string
    Nid:
      description: "This represents the Network Identifier, which together with a\
        \ PLMN ID is used to identify an SNPN (see 3GPP TS 23.003 and 3GPP TS 23.501\
        \ clause 5.30.2.1). \n"
      pattern: "^[A-Fa-f0-9]{11}$"
      type: string
    AmfRegionId:
      description: |
        String identifying the AMF Set ID (10 bits) as specified in clause 2.10.1 of 3GPP TS 23.003.  It is encoded as a string of 3 hexadecimal characters where the first character is limited to  values 0 to 3 (i.e. 10 bits)
      pattern: "^[A-Fa-f0-9]{2}$"
      type: string
    AmfSetId:
      description: |
        String identifying the AMF Set ID (10 bits) as specified in clause 2.10.1 of 3GPP TS 23.003.  It is encoded as a string of 3 hexadecimal characters where the first character is limited to  values 0 to 3 (i.e. 10 bits).
      pattern: "^[0-3][A-Fa-f0-9]{2}$"
      type: string
    Guami:
      description: "Globally Unique AMF Identifier constructed out of PLMN, Network\
        \ and AMF identity."
      example:
        plmnId:
          mnc: null
          nid: null
          mcc: null
        amfId: null
      properties:
        plmnId:
          $ref: "#/components/schemas/PlmnIdNid"
        amfId:
          $ref: "#/components/schemas/AmfId"
      required:
      - amfId
      - plmnId
      type: object
    PlmnIdNid:
      description: |
        Contains the serving core network operator PLMN ID and, for an SNPN, the NID that together with the PLMN ID identifies the SNPN.
      example:
        mnc: null
        nid: null
        mcc: null
      properties:
        mcc:
          $ref: "#/components/schemas/Mcc"
        mnc:
          $ref: "#/components/schemas/Mnc"
        nid:
          $ref: "#/components/schemas/Nid"
      required:
      - mcc
      - mnc
      type: object
    AmfId:
      description: "String identifying the AMF ID composed of AMF Region ID (8 bits),\
        \ AMF Set ID (10 bits) and AMF  Pointer (6 bits) as specified in clause 2.10.1\
        \ of 3GPP TS 23.003. It is encoded as a string of  6 hexadecimal characters\
        \ (i.e., 24 bits). \n"
      pattern: "^[A-Fa-f0-9]{6}$"
      type: string
    Supi:
      description: "String identifying a Supi that shall contain either an IMSI, a\
        \ network specific identifier,\na Global Cable Identifier (GCI) or a Global\
        \ Line Identifier (GLI) as specified in clause \n2.2A of 3GPP TS 23.003. It\
        \ shall be formatted as follows\n - for an IMSI \"imsi-<imsi>\", where <imsi>\
        \ shall be formatted according to clause 2.2\n   of 3GPP TS 23.003 that describes\
        \ an IMSI.\n - for a network specific identifier \"nai-<nai>, where <nai>\
        \ shall be formatted\n   according to clause 28.7.2 of 3GPP TS 23.003 that\
        \ describes an NAI.\n - for a GCI \"gci-<gci>\", where <gci> shall be formatted\
        \ according to clause 28.15.2\n   of 3GPP TS 23.003.\n - for a GLI \"gli-<gli>\"\
        , where <gli> shall be formatted according to clause 28.16.2 of\n   3GPP TS\
        \ 23.003.To enable that the value is used as part of an URI, the string shall\n\
        \   only contain characters allowed according to the \"lower-with-hyphen\"\
        \ naming convention\n   defined in 3GPP TS 29.501.\n"
      pattern: "^(imsi-[0-9]{5,15}|nai-.+|gci-.+|gli-.+|.+)$"
      type: string
    Ipv4Addr:
      description: |
        String identifying a IPv4 address formatted in the 'dotted decimal' notation as defined in RFC 1166.
      example: 198.51.100.1
      pattern: "^(([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])\\.){3}([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])$"
      type: string
    Ipv6Prefix:
      description: |
        String identifying an IPv6 address prefix formatted according to clause 4 of RFC 5952. IPv6Prefix data type may contain an individual /128 IPv6 address.
      example: 2001:db8:abcd:12::0/64
      pattern: "^(((:|(0?|([1-9a-f][0-9a-f]{0,3}))):)((0?|([1-9a-f][0-9a-f]{0,3})):){0,6}(:|(0?|([1-9a-f][0-9a-f]{0,3})))(\\\
        /(([0-9])|([0-9]{2})|(1[0-1][0-9])|(12[0-8])))|((([^:]+:){7}([^:]+))|((([^:]+:)*[^:]+)?::(([^:]+:)*[^:]+)?))(\\\
        /.+))$"
      type: string
    IpAddr:
      description: Contains an IP adresse.
      example:
        ipv6Addr: 2001:db8:85a3::8a2e:370:7334
        ipv4Addr: 198.51.100.1
        ipv6Prefix: 2001:db8:abcd:12::0/64
      nullable: true
      oneOf: []
      properties:
        ipv4Addr:
          $ref: "#/components/schemas/Ipv4Addr"
        ipv6Addr:
          $ref: "#/components/schemas/Ipv6Addr"
        ipv6Prefix:
          $ref: "#/components/schemas/Ipv6Prefix"
      type: object
    Ipv6Addr:
      description: |
        String identifying an IPv6 address formatted according to clause 4 of RFC5952. The mixed IPv4 IPv6 notation according to clause 5 of RFC5952 shall not be used.
      example: 2001:db8:85a3::8a2e:370:7334
      pattern: "^(((:|(0?|([1-9a-f][0-9a-f]{0,3}))):)((0?|([1-9a-f][0-9a-f]{0,3})):){0,6}(:|(0?|([1-9a-f][0-9a-f]{0,3}))))|((([^:]+:){7}([^:]+))|((([^:]+:)*[^:]+)?::(([^:]+:)*[^:]+)?)))$"
      type: string
    Gpsi:
      description: "String identifying a Gpsi shall contain either an External Id\
        \ or an MSISDN.  It shall be formatted as follows -External Identifier= \"\
        extid-'extid', where 'extid'  shall be formatted according to clause 19.7.2\
        \ of 3GPP TS 23.003 that describes an  External Identifier. \n"
      pattern: "^(msisdn-[0-9]{5,15}|extid-[^@]+@[^@]+|.+)$"
      type: string
    ExtGroupId:
      pattern: "^extgroupid-[^@]+@[^@]+$"
      type: string
    GroupId:
      description: "String identifying a group of devices network internal globally\
        \ unique ID which identifies a set of IMSIs, as specified in clause 19.9 of\
        \ 3GPP TS 23.003. \n"
      pattern: "^[A-Fa-f0-9]{8}-[0-9]{3}-[0-9]{2,3}-([A-Fa-f0-9][A-Fa-f0-9]){1,10}$"
      type: string
    PfdData:
      description: List of Application IDs and/or AF IDs managed by a given NEF Instance
      example:
        appIds:
        - appIds
        - appIds
        afIds:
        - afIds
        - afIds
      properties:
        appIds:
          items:
            type: string
          minItems: 1
          type: array
        afIds:
          items:
            type: string
          minItems: 1
          type: array
      type: object
    DataSetId:
      description: Types of data sets and subsets stored in UDR
      enum:
      - SUBSCRIPTION
      - POLICY
      - EXPOSURE
      - APPLICATION
      - A_PFD
      - A_AFTI
      - A_AFQOS
      - A_IPTV
      - A_BDT
      - A_SPD
      - A_EASD
      - A_AMI
      - P_UE
      - P_SCD
      - P_BDT
      - P_PLMNUE
      - P_NSSCD
      - P_PDTQ
      - P_MBSCD
      - P_GROUP
      type: string
    NfGroupId:
      description: Identifier of a group of NFs.
      type: string
    Dnai:
      description: "DNAI (Data network access identifier), see clause 5.6.7 of 3GPP\
        \ TS 23.501."
      type: string
    PduSessionType:
      description: "PduSessionType indicates the type of a PDU session. It shall comply\
        \ with the provisions defined in table 5.4.3.3-1. \n"
      enum:
      - IPV4
      - IPV6
      - IPV4V6
      - UNSTRUCTURED
      - ETHERNET
      type: string
    EventId:
      description: "Represents the analytics type.  \nPossible values are:\n- LOAD_LEVEL_INFORMATION:\
        \ Represent the analytics of load level information of corresponding\n  network\
        \ slice.\n- NETWORK_PERFORMANCE: Represent the analytics of network performance\
        \ information.\n- NF_LOAD: Indicates that the event subscribed is NF Load.\n\
        - SERVICE_EXPERIENCE: Represent the analytics of service experience information\
        \ of the\n  specific applications.\n- UE_MOBILITY: Represent the analytics\
        \ of UE mobility.\n- UE_COMMUNICATION: Represent the analytics of UE communication.\n\
        - QOS_SUSTAINABILITY: Represent the analytics of QoS sustainability information\
        \ in the\n  certain area.\n- ABNORMAL_BEHAVIOUR: Indicates that the event\
        \ subscribed is abnormal behaviour information.\n- USER_DATA_CONGESTION: Represent\
        \ the analytics of the user data congestion in the certain\n  area.\n- NSI_LOAD_LEVEL:\
        \ Represent the analytics of Network Slice and the optionally associated\n\
        \  Network Slice Instance.\n- SM_CONGESTION: Represent the analytics of Session\
        \ Management congestion control experience\n  information for specific DNN\
        \ and/or S-NSSAI.\n- DISPERSION: Represents the analytics of dispersion.\n\
        - RED_TRANS_EXP: Represents the analytics of Redundant Transmission Experience.\n\
        - WLAN_PERFORMANCE: Represents the analytics of WLAN performance.\n- DN_PERFORMANCE:\
        \ Represents the analytics of DN performance.\n- PFD_DETERMINATION: Represents\
        \ the analytics of PFD Determination information for known application identifier(s).\n\
        - PDU_SESSION_TRAFFIC: Represents the analytics of PDU Session traffic.\n\
        - E2E_DATA_VOL_TRANS_TIME: Represents the analytics of E2E data volume transfer\
        \ time.\n- MOVEMENT_BEHAVIOUR: Represents the analytics of the Movement Behaviour\
        \ information.\n- LOC_ACCURACY: Represents the analytics of location accuracy.\n\
        - RELATIVE_PROXIMITY: Represents the analytics of Relative Proximity information.\n"
      enum:
      - LOAD_LEVEL_INFORMATION
      - NETWORK_PERFORMANCE
      - NF_LOAD
      - SERVICE_EXPERIENCE
      - UE_MOBILITY
      - UE_COMMUNICATION
      - QOS_SUSTAINABILITY
      - ABNORMAL_BEHAVIOUR
      - USER_DATA_CONGESTION
      - NSI_LOAD_LEVEL
      - SM_CONGESTION
      - DISPERSION
      - RED_TRANS_EXP
      - WLAN_PERFORMANCE
      - DN_PERFORMANCE
      - PFD_DETERMINATION
      - PDU_SESSION_TRAFFIC
      - E2E_DATA_VOL_TRANS_TIME
      - MOVEMENT_BEHAVIOUR
      - LOC_ACCURACY
      - RELATIVE_PROXIMITY
      type: string
    NwdafEvent:
      description: "Describes the NWDAF Events.  \nPossible values are:\n- SLICE_LOAD_LEVEL:\
        \ Indicates that the event subscribed is load level information of Network\n\
        \  Slice.\n- NETWORK_PERFORMANCE: Indicates that the event subscribed is network\
        \ performance\n  information.\n- NF_LOAD: Indicates that the event subscribed\
        \ is load level and status of one or several\n  Network Functions.\n- SERVICE_EXPERIENCE:\
        \ Indicates that the event subscribed is service experience.\n- UE_MOBILITY:\
        \ Indicates that the event subscribed is UE mobility information.\n- UE_COMMUNICATION:\
        \ Indicates that the event subscribed is UE communication information.\n-\
        \ QOS_SUSTAINABILITY: Indicates that the event subscribed is QoS sustainability.\n\
        - ABNORMAL_BEHAVIOUR: Indicates that the event subscribed is abnormal behaviour.\n\
        - USER_DATA_CONGESTION: Indicates that the event subscribed is user data congestion\n\
        \  information.\n- NSI_LOAD_LEVEL: Indicates that the event subscribed is\
        \ load level information of Network\n  Slice and the optionally associated\
        \ Network Slice Instance.\n- DN_PERFORMANCE: Indicates that the event subscribed\
        \ is DN performance information.\n- DISPERSION: Indicates that the event subscribed\
        \ is dispersion information.\n- RED_TRANS_EXP: Indicates that the event subscribed\
        \ is redundant transmission experience.\n- WLAN_PERFORMANCE: Indicates that\
        \ the event subscribed is WLAN performance.\n- SM_CONGESTION: Indicates the\
        \ Session Management Congestion Control Experience information\n  for specific\
        \ DNN and/or S-NSSAI.\n- PFD_DETERMINATION: Indicates that the event subscribed\
        \ is the PFD Determination nformation\n  for known application identifier(s).\n\
        - PDU_SESSION_TRAFFIC: Indicates that the event subscribed is the PDU Session\
        \ traffic\n  information.\n- E2E_DATA_VOL_TRANS_TIME: Indicates that the event\
        \ subscribed is of E2E data volume \n  transfer time.\n- MOVEMENT_BEHAVIOUR:\
        \ Indicates that the event subscribed is the Movement Behaviour\n  information.\n\
        - LOC_ACCURACY: Indicates that the event subscribed is of location accuracy.\n\
        - RELATIVE_PROXIMITY: Indicates that the event subscribed is the Relative\
        \ Proximity\n  information.\n"
      enum:
      - SLICE_LOAD_LEVEL
      - NETWORK_PERFORMANCE
      - NF_LOAD
      - SERVICE_EXPERIENCE
      - UE_MOBILITY
      - UE_COMMUNICATION
      - QOS_SUSTAINABILITY
      - ABNORMAL_BEHAVIOUR
      - USER_DATA_CONGESTION
      - NSI_LOAD_LEVEL
      - DN_PERFORMANCE
      - DISPERSION
      - RED_TRANS_EXP
      - WLAN_PERFORMANCE
      - SM_CONGESTION
      - PFD_DETERMINATION
