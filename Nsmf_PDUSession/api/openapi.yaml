    PsaIndication:
      description: |
        Indication of whether a PSA is inserted or removed. Possible values are
          - PSA_INSERTED
          - PSA_REMOVED
          - PSA_INSERTED_ONLY
          - PSA_REMOVED_ONLY
      enum:
      - PSA_INSERTED
      - PSA_REMOVED
      - PSA_INSERTED_ONLY
      - PSA_REMOVED_ONLY
      type: string
    N4MessageType:
      description: |
        N4 Message Type. Possible values are
          - PFCP_SES_EST_REQ
          - PFCP_SES_EST_RSP
          - PFCP_SES_MOD_REQ
          - PFCP_SES_MOD_RSP
          - PFCP_SES_DEL_REQ
          - PFCP_SES_DEL_RSP
          - PFCP_SES_REP_REQ
          - PFCP_SES_REP_RSP
