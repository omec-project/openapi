        ipv6EndpointAddresses:
          items:
            $ref: "#/components/schemas/Ipv6Addr"
          minItems: 1
          type: array
        endpointFqdn:
          $ref: "#/components/schemas/Fqdn"
      type: object
    Dnai:
      description: "DNAI (Data network access identifier), see clause 5.6.7 of 3GPP\
        \ TS 23.501."
      type: string
    ServerAddressingInfo:
      anyOf: []
      description: Contains addressing information (IP addresses and/or FQDNs) of
        a server.
      nullable: true
      properties:
        ipv4Addresses:
          items:
            $ref: "#/components/schemas/Ipv4Addr"
          minItems: 1
          type: array
        ipv6Addresses:
          items:
            $ref: "#/components/schemas/Ipv6Addr"
          minItems: 1
          type: array
        fqdnList:
          items:
            $ref: "#/components/schemas/Fqdn"
          minItems: 1
          type: array
      type: object
    PcfUeCallbackInfo:
      description: |
        Contains the PCF for the UE information necessary for the PCF for the PDU session to send  SM Policy Association Establishment and Termination events.
      example:
        callbackUri: null
        bindingInfo: bindingInfo
      nullable: true
      properties:
        callbackUri:
          $ref: "#/components/schemas/Uri"
        bindingInfo:
          type: string
      required:
      - callbackUri
      type: object
    SatelliteBackhaulCategory:
      description: Indicates the satellite backhaul used.
      enum:
      - GEO
      - MEO
      - LEO
      - OTHER_SAT
      - DYNAMIC_GEO
      - DYNAMIC_MEO
      - DYNAMIC_LEO
      - DYNAMIC_OTHER_SAT
      - NON_SATELLITE
      type: string
    GeoSatelliteId:
      description: |
        A string carrying the GEO Satellite ID.
      type: string
    DurationSec:
      description: indicating a time in seconds.
      type: integer
    NgApCause:
      description: Represents the NGAP cause.
      example:
        value: null
        group: null
      properties:
        group:
          $ref: "#/components/schemas/Uinteger"
        value:
          $ref: "#/components/schemas/Uinteger"
      required:
      - group
      - value
      type: object
    fiveGMmCause:
      $ref: "#/components/schemas/Uinteger"
    MoExpDataCounter:
      description: Contain the MO Exception Data Counter.
      example:
        timeStamp: null
        counter: 9
      properties:
        counter:
          description: |
            Unsigned integer identifying the MO Exception Data Counter, as specified in clause 5.31.14.3 of 3GPP TS 23.501.
          type: integer
        timeStamp:
          $ref: "#/components/schemas/DateTime"
      required:
      - counter
      type: object
    RoamingChargingProfile:
      example:
        partialRecordMethod: DEFAULT
        triggers:
        - timeLimit: null
          tariffTimeChange: null
          volumeLimit64: null
          maxNumberOfccc: null
          volumeLimit: null
