        description: Contains the information for the creation the resource.
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppSessionContext"
          description: Successful creation of the resource
          headers:
            Location:
              description: |
                Contains the URI of the created individual application session context resource, according to the structure {apiRoot}/npcf-policyauthorization/v1/app-sessions/{appSessionId} or the URI of the created events subscription sub-resource, according to the structure {apiRoot}/npcf-policyauthorization/v1/app-sessions/{appSessionId} /events-subscription
              explode: false
              required: true
              schema:
                type: string
              style: simple
        "303":
          description: |
            See Other. The result of the HTTP POST request would be equivalent to the existing Application Session Context.
          headers:
            Location:
              description: |
                Contains the URI of the existing individual Application Session Context resource.
              explode: false
              required: true
