    PduSessionType:
      description: "PduSessionType indicates the type of a PDU session. It shall comply\
        \ with the provisions defined in table 5.4.3.3-1. \n"
      enum:
      - IPV4
      - IPV6
      - IPV4V6
      - UNSTRUCTURED
      - ETHERNET
      type: string
    Ambr:
      description: Contains the maximum aggregated uplink and downlink bit rates.
      example:
        uplink: null
        downlink: null
      properties:
        uplink:
          $ref: "#/components/schemas/BitRate"
        downlink:
          $ref: "#/components/schemas/BitRate"
      required:
      - downlink
      - uplink
      type: object
    BitRate:
      description: |
        String representing a bit rate; the prefixes follow the standard symbols from The International System of Units, and represent x1000 multipliers, with the exception that prefix "K" is used to represent the standard symbol "k".
      pattern: ^\d+(\.\d+)? (bps|Kbps|Mbps|Gbps|Tbps)$
      type: string
    Ipv6Prefix:
      description: |
        String identifying an IPv6 address prefix formatted according to clause 4 of RFC 5952. IPv6Prefix data type may contain an individual /128 IPv6 address.
      example: 2001:db8:abcd:12::0/64
      pattern: "^(((:|(0?|([1-9a-f][0-9a-f]{0,3}))):)((0?|([1-9a-f][0-9a-f]{0,3})):){0,6}(:|(0?|([1-9a-f][0-9a-f]{0,3})))(\\\
        /(([0-9])|([0-9]{2})|(1[0-1][0-9])|(12[0-8])))|((([^:]+:){7}([^:]+))|((([^:]+:)*[^:]+)?::(([^:]+:)*[^:]+)?))(\\\
        /.+))$"
      type: string
    UpSecurity:
      description: Contains Userplain security information.
      example:
        upIntegr: REQUIRED
        upConfid: REQUIRED
      properties:
        upIntegr:
          $ref: "#/components/schemas/UpIntegrity"
        upConfid:
          $ref: "#/components/schemas/UpConfidentiality"
      required:
      - upConfid
      - upIntegr
      type: object
    UpIntegrity:
      description: "indicates whether UP integrity protection is required, preferred\
        \ or not needed for all the traffic on the PDU Session. It shall comply with\
        \ the provisions defined in  table 5.4.3.4-1. \n"
      enum:
      - REQUIRED
      - PREFERRED
      - NOT_NEEDED
      type: string
    UpConfidentiality:
      description: |
        indicates whether UP confidentiality protection is required, preferred or not needed for all the traffic on the PDU Session. It shall comply with the provisions defined in table 5.4.3.5-1.
      enum:
      - REQUIRED
      - PREFERRED
      - NOT_NEEDED
      type: string
    IpIndex:
      description: |
        Represents information that identifies which IP pool or external server is used to allocate the IP address.
      type: integer
    SecondaryRatUsageReport:
      description: Secondary RAT Usage Report to report usage data for a secondary
        RAT for QoS flows.
      example:
        qosFlowsUsageData:
        - downlinkVolume: null
          startTimeStamp: null
          qfi: null
          endTimeStamp: null
          uplinkVolume: null
        - downlinkVolume: null
          startTimeStamp: null
          qfi: null
          endTimeStamp: null
          uplinkVolume: null
        secondaryRatType: NR
      properties:
        secondaryRatType:
          $ref: "#/components/schemas/RatType"
        qosFlowsUsageData:
          items:
            $ref: "#/components/schemas/QosFlowUsageReport"
          minItems: 1
          type: array
      required:
      - qosFlowsUsageData
      - secondaryRatType
      type: object
    Arp:
      description: Contains Allocation and Retention Priority information.
      example:
        priorityLevel: null
        preemptCap: NOT_PREEMPT
        preemptVuln: NOT_PREEMPTABLE
      properties:
        priorityLevel:
          $ref: "#/components/schemas/ArpPriorityLevel"
        preemptCap:
          $ref: "#/components/schemas/PreemptionCapability"
        preemptVuln:
          $ref: "#/components/schemas/PreemptionVulnerability"
      required:
      - preemptCap
      - preemptVuln
      - priorityLevel
      type: object
    ArpPriorityLevel:
      description: "nullable true shall not be used for this attribute. Unsigned integer\
        \ indicating the ARP Priority Level (see clause 5.7.2.2 of 3GPP TS 23.501,\
        \ within the range 1 to 15.Values are ordered in decreasing order of priority,\
        \ i.e. with 1 as the highest priority and 15 as the lowest priority. \n"
      maximum: 15
      minimum: 1
      nullable: true
      type: integer
    PreemptionCapability:
      description: |
        The enumeration PreemptionCapability indicates the pre-emption capability of a request on other QoS flows. See clause 5.7.2.2 of 3GPP TS 23.501. It shall comply with the provisions defined in table 5.5.3.1-1.
      enum:
      - NOT_PREEMPT
      - MAY_PREEMPT
      type: string
    PreemptionVulnerability:
      description: |
        The enumeration PreemptionVulnerability indicates the pre-emption vulnerability of the QoS flow to pre-emption from other QoS flows. See clause 5.7.2.2 of 3GPP TS 23.501. It shall comply with the provisions defined in table 5.5.3.2-1
      enum:
      - NOT_PREEMPTABLE
      - PREEMPTABLE
      type: string
    fiveQi:
      description: |
        Unsigned integer representing a 5G QoS Identifier (see clause 5.7.2.1 of 3GPP TS 23.501, within the range 0 to 255.
      maximum: 255
      minimum: 0
      type: integer
    NonDynamic5Qi:
      description: |
        It indicates the QoS Characteristics for a standardized or pre-configured 5QI for downlink and uplink.
      example:
        extMaxDataBurstVol: null
        priorityLevel: null
        maxDataBurstVol: null
        cnPacketDelayBudgetDl: null
        cnPacketDelayBudgetUl: null
        averWindow: null
      minProperties: 0
      properties:
        priorityLevel:
          $ref: "#/components/schemas/fiveQiPriorityLevel"
        averWindow:
          $ref: "#/components/schemas/AverWindow"
        maxDataBurstVol:
          $ref: "#/components/schemas/MaxDataBurstVol"
        extMaxDataBurstVol:
          $ref: "#/components/schemas/ExtMaxDataBurstVol"
        cnPacketDelayBudgetDl:
          $ref: "#/components/schemas/ExtPacketDelBudget"
        cnPacketDelayBudgetUl:
          $ref: "#/components/schemas/ExtPacketDelBudget"
      type: object
    fiveQiPriorityLevel:
      description: "Unsigned integer indicating the 5QI Priority Level (see clauses\
        \ 5.7.3.3 and 5.7.4 of 3GPP TS 23.501, within the range 1 to 127.Values are\
        \ ordered in decreasing order of priority,  i.e. with 1 as the highest priority\
        \ and 127 as the lowest priority. \n"
      maximum: 127
      minimum: 1
      type: integer
    AverWindow:
      default: 2000
      description: "Unsigned integer indicating Averaging Window (see clause 5.7.3.6\
        \ and 5.7.4 of 3GPP TS 23.501), expressed in milliseconds. \n"
      maximum: 4095
      minimum: 1
      type: integer
    MaxDataBurstVol:
      description: "Unsigned integer indicating Maximum Data Burst Volume (see clauses\
        \ 5.7.3.7 and 5.7.4 of 3GPP TS 23.501), expressed in Bytes. \n"
      maximum: 4095
      minimum: 1
      type: integer
    ExtMaxDataBurstVol:
      description: "Unsigned integer indicating Maximum Data Burst Volume (see clauses\
        \ 5.7.3.7 and 5.7.4 of 3GPP TS 23.501), expressed in Bytes. \n"
      maximum: 2000000
      minimum: 4096
      type: integer
    ExtPacketDelBudget:
      description: |
        Unsigned integer indicating Packet Delay Budget (see clauses 5.7.3.4 and 5.7.4 of 3GPP TS 23.501 [8])), expressed in 0.01 milliseconds.
      minimum: 1
      type: integer
    Dynamic5Qi:
      description: |
        It indicates the QoS Characteristics for a Non-standardised or not pre-configured 5QI for downlink and uplink.
      example:
        extMaxDataBurstVol: null
        priorityLevel: null
        extPacketDelBudget: null
        maxDataBurstVol: null
        packetErrRate: null
        cnPacketDelayBudgetDl: null
        cnPacketDelayBudgetUl: null
        averWindow: null
        resourceType: NON_GBR
        packetDelayBudget: null
      properties:
        resourceType:
          $ref: "#/components/schemas/QosResourceType"
        priorityLevel:
          $ref: "#/components/schemas/fiveQiPriorityLevel"
        packetDelayBudget:
          $ref: "#/components/schemas/PacketDelBudget"
        packetErrRate:
          $ref: "#/components/schemas/PacketErrRate"
        averWindow:
          $ref: "#/components/schemas/AverWindow"
        maxDataBurstVol:
          $ref: "#/components/schemas/MaxDataBurstVol"
        extMaxDataBurstVol:
          $ref: "#/components/schemas/ExtMaxDataBurstVol"
        extPacketDelBudget:
          $ref: "#/components/schemas/ExtPacketDelBudget"
        cnPacketDelayBudgetDl:
          $ref: "#/components/schemas/ExtPacketDelBudget"
        cnPacketDelayBudgetUl:
          $ref: "#/components/schemas/ExtPacketDelBudget"
      required:
      - packetDelayBudget
      - packetErrRate
      - priorityLevel
      - resourceType
      type: object
    QosResourceType:
      description: "The enumeration QosResourceType indicates whether a QoS Flow is\
        \ non-GBR, delay critical GBR, or non-delay critical GBR (see clauses 5.7.3.4\
        \ and 5.7.3.5 of 3GPP TS 23.501). It shall comply with the provisions defined\
        \ in table 5.5.3.6-1. \n"
      enum:
      - NON_GBR
      - NON_CRITICAL_GBR
      - CRITICAL_GBR
      type: string
    PacketDelBudget:
      description: |
        Unsigned integer indicating Packet Delay Budget (see clauses 5.7.3.4 and 5.7.4 of 3GPP TS 23.501), expressed in milliseconds.
      minimum: 1
      type: integer
    PacketErrRate:
      description: |
        String representing Packet Error Rate (see clause 5.7.3.5 and 5.7.4 of 3GPP TS 23.501, expressed as a "scalar x 10-k" where the scalar and the exponent k are each encoded as one decimal digit.
      pattern: "^([0-9]E-[0-9])$"
      type: string
    ReflectiveQoSAttribute:
      description: "The enumeration ReflectiveQosAttribute indicates whether certain\
        \ traffic of the QoS flow may be subject to Reflective QoS (see clause 5.7.2.3\
        \ of 3GPP TS 23.501). It shall comply with the provisions defined in table\
        \ 5.5.3.3-1. \n"
      enum:
      - RQOS
      - NO_RQOS
      type: string
    AdditionalQosFlowInfo:
      description: |
        The enumeration AdditionalQosFlowInfo provides additional QoS flow information (see clause  9.3.1.12 3GPP TS 38.413 [11]). It shall comply with the provisions defined in table 5.5.3.12-1.
      enum:
      - MORE_LIKELY
      nullable: true
      type: string
    PduSetQosPara:
      description: Represents the PDU Set level QoS parameters.
      example:
        pduSetDelayBudget: null
        pduSetHandlingInfo: ALL_PDUS_NEEDED
        pduSetErrRate: null
      properties:
        pduSetDelayBudget:
          $ref: "#/components/schemas/ExtPacketDelBudget"
        pduSetErrRate:
          $ref: "#/components/schemas/PacketErrRate"
        pduSetHandlingInfo:
          $ref: "#/components/schemas/PduSetHandlingInfo"
      type: object
    PduSetHandlingInfo:
      description: |
        Possible values are:
        - "ALL_PDUS_NEEDED": All PDUs of the PDU Set are needed
        - "ALL_PDUS_NOT_NEEDED": All PDUs of the PDU Set are not needed
      enum:
      - ALL_PDUS_NEEDED
      - ALL_PDUS_NOT_NEEDED
      type: string
    NotificationControl:
      description: "The enumeration NotificationControl indicates whether notifications\
        \ are requested from the RAN when the GFBR can no longer  (or again) be fulfilled\
        \ for a QoS Flow during the lifetime of the QoS Flow (see clause 5.7.2.4 of\
        \ 3GPP TS 23.501). It shall comply with the provisions defined in table 5.5.3.5-1.\
        \ \n"
      enum:
      - REQUESTED
      - NOT_REQUESTED
      type: string
    PacketLossRate:
      description: |
        Unsigned integer indicating Packet Loss Rate (see clauses 5.7.2.8 and 5.7.4 of 3GPP TS 23.501), expressed in tenth of percent.
      maximum: 1000
      minimum: 0
      type: integer
    OffloadIdentifier:
      description: |
        Offload identifier uniquely identifying a VPLMN offloading policy information instance
      pattern: "^[0-9]{3}-[0-9]{2,3}-[A-Fa-f0-9]{8}(-v[0-9]{1,2}){0,1}$"
      type: string
    ChargingInformation:
      description: Contains the addresses of the charging functions.
      example:
        primaryChfSetId: null
        secondaryChfInstanceId: null
        secondaryChfSetId: null
        secondaryChfAddress: null
        primaryChfAddress: null
        primaryChfInstanceId: null
      properties:
        primaryChfAddress:
          $ref: "#/components/schemas/Uri"
        secondaryChfAddress:
          $ref: "#/components/schemas/Uri"
        primaryChfSetId:
          $ref: "#/components/schemas/NfSetId"
        primaryChfInstanceId:
          $ref: "#/components/schemas/NfInstanceId"
        secondaryChfSetId:
          $ref: "#/components/schemas/NfSetId"
        secondaryChfInstanceId:
          $ref: "#/components/schemas/NfInstanceId"
      required:
      - primaryChfAddress
      type: object
    VplmnOffloadingInfo:
      description: VPLMN Specific Offloading Information
      example:
        ipv4AddrMasks:
        - 198.51.0.0/16
        - 198.51.0.0/16
        ipv6AddressRanges:
        - start: 2001:db8:85a3::8a2e:370:7334
          end: 2001:db8:85a3::8a2e:370:7334
        - start: 2001:db8:85a3::8a2e:370:7334
          end: 2001:db8:85a3::8a2e:370:7334
        ipv6PrefixRanges:
        - start: 2001:db8:abcd:12::0/64
          end: 2001:db8:abcd:12::0/64
        - start: 2001:db8:abcd:12::0/64
          end: 2001:db8:abcd:12::0/64
        fqdnPatterns:
        - regex: regex
          stringMatchingRule:
            stringMatchingConditions:
            - matchingString: matchingString
              matchingOperator: FULL_MATCH
            - matchingString: matchingString
              matchingOperator: FULL_MATCH
        - regex: regex
          stringMatchingRule:
            stringMatchingConditions:
            - matchingString: matchingString
