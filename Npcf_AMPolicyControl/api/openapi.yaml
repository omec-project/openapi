          $ref: "#/components/schemas/Snssai"
        status:
          $ref: "#/components/schemas/SnssaiStatus"
        altSnssai:
          $ref: "#/components/schemas/Snssai"
        nsReplTerminInd:
          $ref: "#/components/schemas/TerminationIndication"
        plmnId:
          $ref: "#/components/schemas/PlmnId"
        mitigationInfo:
          $ref: "#/components/schemas/MitigationInfo"
      required:
      - snssai
      type: object
    SnssaiStatus:
      description: Indicates the S-NSSAI availability.
      enum:
      - AVAILABLE
      - UNAVAILABLE
      type: string
    TerminationIndication:
      description: Indicates the termination of Network Slice Replacement.
      enum:
      - NEW_UES_TERMINATION
      - ALL_UES_TERMINATION
      type: string
    MitigationInfo:
      example:
        percValueNumUes: 59
        newUesInd: true
      properties:
        percValueNumUes:
          maximum: 100
          minimum: 0
          type: integer
        newUesInd:
          type: boolean
      type: object
    UintegerRm:
      description: |
        Unsigned Integer, i.e. only value 0 and integers above 0 are permissible with the OpenAPI 'nullable: true' property.
      minimum: 0
      nullable: true
      type: integer
    ClockQualityDetailLevel:
      description: Indicates the Clock Quality Detail Level.
      enum:
      - CLOCK_QUALITY_METRICS
      - ACCEPT_INDICATION
      type: string
    ClockQualityAcceptanceCriterion:
      description: Contains a Clock Quality Acceptance Criterion.
      example:
        clockQuality:
          traceabilityToGnss: true
          clockAccuracyValue: 8108492
          traceabilityToUtc: true
          clockAccuracyIndex: clockAccuracyIndex
          frequencyStability: null
        synchronizationState:
        - LOCKED
        - LOCKED
        parentTimeSource:
        - SYNC_E
        - SYNC_E
      properties:
        synchronizationState:
          items:
            $ref: "#/components/schemas/SynchronizationState"
          minItems: 1
          type: array
        clockQuality:
          $ref: "#/components/schemas/ClockQuality"
        parentTimeSource:
          items:
            $ref: "#/components/schemas/TimeSource"
          minItems: 1
          type: array
      type: object
    SynchronizationState:
      description: Indicates the Synchronization State.
      enum:
      - LOCKED
      - HOLDOVER
      - FREERUN
      type: string
    ClockQuality:
      description: Contains Clock Quality.
      example:
        traceabilityToGnss: true
        clockAccuracyValue: 8108492
        traceabilityToUtc: true
        clockAccuracyIndex: clockAccuracyIndex
        frequencyStability: null
      properties:
        traceabilityToGnss:
          type: boolean
        traceabilityToUtc:
          type: boolean
        frequencyStability:
          $ref: "#/components/schemas/Uint16"
        clockAccuracyIndex:
          pattern: "^[A-Fa-f0-9]{2}$"
          type: string
        clockAccuracyValue:
          maximum: 40000000
          minimum: 1
          type: integer
      type: object
    Uint16:
      description: |
        Integer where the allowed values correspond to the value range of an unsigned 16-bit integer.
      maximum: 65535
      minimum: 0
      type: integer
    TimeSource:
      description: Indicates the Time Source.
      enum:
      - SYNC_E
      - PTP
      - GNSS
      - ATOMIC_CLOCK
      - TERRESTRIAL_RADIO
      - SERIAL_TIME_CODE
      - NTP
      - HAND_SET
      - OTHER
      type: string
    SliceMbr:
      description: MBR related to slice
      example:
        uplink: null
        downlink: null
      properties:
        uplink:
          $ref: "#/components/schemas/BitRate"
        downlink:
          $ref: "#/components/schemas/BitRate"
      required:
      - downlink
      - uplink
      type: object
    DurationSecRm:
      description: "indicating a time in seconds with OpenAPI defined 'nullable: true'\
        \ property."
      nullable: true
      type: integer
    AccessTokenErr:
      description: Error returned in the access token response message
      properties:
        error:
          enum:
          - invalid_request
          - invalid_client
          - invalid_grant
          - unauthorized_client
          - unsupported_grant_type
          - invalid_scope
          type: string
        error_description:
          type: string
        error_uri:
          type: string
      required:
      - error
      type: object
    AccessTokenReq:
      description: Contains information related to the access token request
      properties:
        grant_type:
          enum:
          - client_credentials
          type: string
        nfInstanceId:
          $ref: "#/components/schemas/NfInstanceId"
        nfType:
          $ref: "#/components/schemas/NFType"
        targetNfType:
          $ref: "#/components/schemas/NFType"
        scope:
          pattern: "^([a-zA-Z0-9_:-]+)( [a-zA-Z0-9_:-]+)*$"
          type: string
        targetNfInstanceId:
          $ref: "#/components/schemas/NfInstanceId"
        requesterPlmn:
          $ref: "#/components/schemas/PlmnId"
        requesterPlmnList:
          items:
            $ref: "#/components/schemas/PlmnId"
          minItems: 2
          type: array
        requesterSnssaiList:
          items:
            $ref: "#/components/schemas/Snssai"
          minItems: 1
          type: array
        requesterFqdn:
          $ref: "#/components/schemas/Fqdn"
        requesterSnpnList:
          items:
            $ref: "#/components/schemas/PlmnIdNid"
          minItems: 1
          type: array
        targetPlmn:
          $ref: "#/components/schemas/PlmnId"
        targetSnpn:
          $ref: "#/components/schemas/PlmnIdNid"
        targetSnssaiList:
          items:
            $ref: "#/components/schemas/Snssai"
          minItems: 1
          type: array
        targetNsiList:
          items:
            type: string
          minItems: 1
          type: array
        targetNfSetId:
          $ref: "#/components/schemas/NfSetId"
        targetNfServiceSetId:
          $ref: "#/components/schemas/NfServiceSetId"
        hnrfAccessTokenUri:
          $ref: "#/components/schemas/Uri"
        sourceNfInstanceId:
          $ref: "#/components/schemas/NfInstanceId"
      required:
      - grant_type
      - nfInstanceId
      - scope
      type: object
    NoProfileMatchInfo:
      description: Provides the reason for not finding NF matching the search criteria
      properties:
        reason:
          $ref: "#/components/schemas/NoProfileMatchReason"
        queryParamCombinationList:
          items:
            $ref: "#/components/schemas/QueryParamCombination"
          minItems: 1
          type: array
      required:
      - reason
      type: object
    NoProfileMatchReason:
      description: No Profile Match Reason
      enum:
      - REQUESTER_PLMN_NOT_ALLOWED
      - TARGET_NF_SUSPENDED
      - TARGET_NF_UNDISCOVERABLE
      - QUERY_PARAMS_COMBINATION_NO_MATCH
      - TARGET_NF_TYPE_NOT_SUPPORTED
      - UNSPECIFIED
      type: string
    QueryParamCombination:
      description: Contains a list of Query Parameters
      properties:
        queryParams:
          items:
            $ref: "#/components/schemas/QueryParameter"
          minItems: 1
          type: array
      required:
      - queryParams
      type: object
    QueryParameter:
      description: Contains the name and value of a query parameter
      properties:
        name:
          type: string
        value:
          type: string
      required:
      - name
      - value
      type: object
    NfSetId:
      description: "NF Set Identifier (see clause 28.12 of 3GPP TS 23.003), formatted\
        \ as the following string \"set<Set ID>.<nftype>set.5gc.mnc<MNC>.mcc<MCC>\"\
        , or  \"set<SetID>.<NFType>set.5gc.nid<NID>.mnc<MNC>.mcc<MCC>\" with  <MCC>\
        \ encoded as defined in clause 5.4.2 (\"Mcc\" data type definition)  <MNC>\
        \ encoding the Mobile Network Code part of the PLMN, comprising 3 digits.\
        \ \n  If there are only 2 significant digits in the MNC, one \"0\" digit shall\
        \ be inserted \n  at the left side to fill the 3 digits coding of MNC.  Pattern:\
        \ '^[0-9]{3}$'\n<NFType> encoded as a value defined in Table 6.1.6.3.3-1 of\
        \ 3GPP TS 29.510 but \n  with lower case characters <Set ID> encoded as a\
        \ string of characters consisting of \n  alphabetic characters (A-Z and a-z),\
        \ digits (0-9) and/or the hyphen (-) and that \n  shall end with either an\
        \ alphabetic character or a digit. \n"
      type: string
    NfInstanceId:
      description: "String uniquely identifying a NF instance. The format of the NF\
        \ Instance ID shall be a  Universally Unique Identifier (UUID) version 4,\
        \ as described in IETF RFC 4122. \n"
      format: uuid
      type: string
    NwdafEvent:
      description: "Describes the NWDAF Events.  \nPossible values are:\n- SLICE_LOAD_LEVEL:\
        \ Indicates that the event subscribed is load level information of Network\n\
        \  Slice.\n- NETWORK_PERFORMANCE: Indicates that the event subscribed is network\
        \ performance\n  information.\n- NF_LOAD: Indicates that the event subscribed\
        \ is load level and status of one or several\n  Network Functions.\n- SERVICE_EXPERIENCE:\
        \ Indicates that the event subscribed is service experience.\n- UE_MOBILITY:\
        \ Indicates that the event subscribed is UE mobility information.\n- UE_COMMUNICATION:\
        \ Indicates that the event subscribed is UE communication information.\n-\
        \ QOS_SUSTAINABILITY: Indicates that the event subscribed is QoS sustainability.\n\
        - ABNORMAL_BEHAVIOUR: Indicates that the event subscribed is abnormal behaviour.\n\
        - USER_DATA_CONGESTION: Indicates that the event subscribed is user data congestion\n\
        \  information.\n- NSI_LOAD_LEVEL: Indicates that the event subscribed is\
        \ load level information of Network\n  Slice and the optionally associated\
        \ Network Slice Instance.\n- DN_PERFORMANCE: Indicates that the event subscribed\
        \ is DN performance information.\n- DISPERSION: Indicates that the event subscribed\
        \ is dispersion information.\n- RED_TRANS_EXP: Indicates that the event subscribed\
        \ is redundant transmission experience.\n- WLAN_PERFORMANCE: Indicates that\
        \ the event subscribed is WLAN performance.\n- SM_CONGESTION: Indicates the\
        \ Session Management Congestion Control Experience information\n  for specific\
        \ DNN and/or S-NSSAI.\n- PFD_DETERMINATION: Indicates that the event subscribed\
        \ is the PFD Determination nformation\n  for known application identifier(s).\n\
        - PDU_SESSION_TRAFFIC: Indicates that the event subscribed is the PDU Session\
        \ traffic\n  information.\n- E2E_DATA_VOL_TRANS_TIME: Indicates that the event\
        \ subscribed is of E2E data volume \n  transfer time.\n- MOVEMENT_BEHAVIOUR:\
        \ Indicates that the event subscribed is the Movement Behaviour\n  information.\n\
        - LOC_ACCURACY: Indicates that the event subscribed is of location accuracy.\n\
        - RELATIVE_PROXIMITY: Indicates that the event subscribed is the Relative\
        \ Proximity\n  information.\n"
      enum:
      - SLICE_LOAD_LEVEL
      - NETWORK_PERFORMANCE
      - NF_LOAD
      - SERVICE_EXPERIENCE
      - UE_MOBILITY
      - UE_COMMUNICATION
      - QOS_SUSTAINABILITY
      - ABNORMAL_BEHAVIOUR
      - USER_DATA_CONGESTION
      - NSI_LOAD_LEVEL
      - DN_PERFORMANCE
      - DISPERSION
      - RED_TRANS_EXP
      - WLAN_PERFORMANCE
      - SM_CONGESTION
      - PFD_DETERMINATION
      - PDU_SESSION_TRAFFIC
      - E2E_DATA_VOL_TRANS_TIME
      - MOVEMENT_BEHAVIOUR
      - NUM_OF_UE
      - MOV_UE_RATIO
      - AVR_SPEED
      - SPEED_THRESHOLD
      - MOV_UE_DIRECTION
      - LOC_ACCURACY
      - RELATIVE_PROXIMITY
      type: string
    NFType:
      description: NF types known to NRF
      enum:
      - NRF
      - UDM
      - AMF
      - SMF
      - AUSF
      - NEF
      - PCF
      - SMSF
      - NSSF
      - UDR
      - LMF
      - GMLC
      - 5G_EIR
      - SEPP
      - UPF
      - N3IWF
      - AF
      - UDSF
      - BSF
      - CHF
      - NWDAF
      - PCSCF
      - CBCF
      - HSS
      - UCMF
      - SOR_AF
      - SPAF
      - MME
      - SCSAS
      - SCEF
      - SCP
      - NSSAAF
      - ICSCF
      - SCSCF
      - DRA
      - IMS_AS
      - AANF
      - 5G_DDNMF
      - NSACF
      - MFAF
      - EASDF
      - DCCF
      - MB_SMF
      - TSCTSF
      - ADRF
      - GBA_BSF
      - CEF
      - MB_UPF
      - NSWOF
      - PKMF
      - MNPF
      - SMS_GMSC
      - SMS_IWMSC
      - MBSF
      - MBSTF
      - PANF
      - IP_SM_GW
      - SMS_ROUTER
      - DCSF
      - MRF
      - MRFP
      - MF
      - SLPKMF
      - RH
      type: string
    NfServiceSetId:
      description: "NF Service Set Identifier (see clause 28.12 of 3GPP TS 23.003)\
        \ formatted as the following  string \"set<Set ID>.sn<Service Name>.nfi<NF\
        \ Instance ID>.5gc.mnc<MNC>.mcc<MCC>\", or  \"set<SetID>.sn<ServiceName>.nfi<NFInstanceID>.5gc.nid<NID>.mnc<MNC>.mcc<MCC>\"\
        \ with  <MCC> encoded as defined in clause 5.4.2 (\"Mcc\" data type definition)\
        \   <MNC> encoding the Mobile Network Code part of the PLMN, comprising 3\
        \ digits. \n  If there are only 2 significant digits in the MNC, one \"0\"\
        \ digit shall be inserted \n  at the left side to fill the 3 digits coding\
        \ of MNC.  Pattern: '^[0-9]{3}$'\n<NID> encoded as defined in clause\_5.4.2\
        \ (\"Nid\" data type definition)  <NFInstanceId> encoded as defined in clause\
        \ 5.3.2  <ServiceName> encoded as defined in 3GPP TS 29.510  <Set ID> encoded\
        \ as a string of characters consisting of alphabetic \n  characters (A-Z and\
        \ a-z), digits (0-9) and/or the hyphen (-) and that shall end \n  with either\
        \ an alphabetic character or a digit.\n"
      type: string
  securitySchemes:
    oAuth2ClientCredentials:
      flows:
        clientCredentials:
          scopes:
            npcf-am-policy-control: Access to the Npcf_AMPolicyControl API
          tokenUrl: "{nrfApiRoot}/oauth2/token"
      type: oauth2
