    Qfi:
      description: "Unsigned integer identifying a QoS flow, within the range 0 to\
        \ 63."
      maximum: 63
      minimum: 0
      type: integer
    Int64:
      description: string with format 'int64' as defined in OpenAPI.
      format: int64
      type: integer
    VolumeTimedReport:
      description: Contains Usage data information.
      example:
        downlinkVolume: null
        startTimeStamp: null
        endTimeStamp: null
        uplinkVolume: null
      properties:
