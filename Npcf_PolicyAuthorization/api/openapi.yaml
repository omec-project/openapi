      type: string
    SponsoringStatus:
      description: Indicates whether sponsored data connectivity is enabled or disabled/not
        enabled.
      enum:
      - SPONSOR_DISABLED
      - SPONSOR_ENABLED
      type: string
    AfEventPcf:
      description: Represents an event to notify to the AF.
      enum:
      - ACCESS_TYPE_CHANGE
      - ANI_REPORT
      - APP_DETECTION
      - CHARGING_CORRELATION
      - EPS_FALLBACK
      - EXTRA_UE_ADDR
      - FAILED_QOS_UPDATE
      - FAILED_RESOURCES_ALLOCATION
      - OUT_OF_CREDIT
      - PDU_SESSION_STATUS
      - PLMN_CHG
      - QOS_MONITORING
      - QOS_NOTIF
      - RAN_NAS_CAUSE
      - REALLOCATION_OF_CREDIT
      - SAT_CATEGORY_CHG
      - SUCCESSFUL_QOS_UPDATE
      - SUCCESSFUL_RESOURCES_ALLOCATION
      - TSN_BRIDGE_INFO
      - UP_PATH_CHG_FAILURE
      - USAGE_REPORT
      - UE_TEMPORARILY_UNAVAILABLE
      - BAT_OFFSET_INFO
      - URSP_ENF_INFO
      - PACK_DEL_VAR
      - L4S_SUPP
      - RT_DELAY_TWO_QOS_FLOWS
      type: string
    AfNotifMethod:
      description: Represents the notification methods that can be subscribed for
        an event.
      enum:
      - EVENT_DETECTION
      - ONE_TIME
      - PERIODIC
      type: string
    QosNotifType:
      description: Indicates the notification type for QoS Notification Control.
      enum:
      - GUARANTEED
      - NOT_GUARANTEED
      type: string
    TerminationCause:
      description: |
        Indicates the cause behind requesting the deletion of the Individual Application Session Context resource.
      enum:
      - ALL_SDF_DEACTIVATION
      - PDU_SESSION_TERMINATION
      - PS_TO_CS_HO
      - INSUFFICIENT_SERVER_RESOURCES
      - INSUFFICIENT_QOS_FLOW_RESOURCES
      - SPONSORED_DATA_CONNECTIVITY_DISALLOWED
      type: string
    MediaComponentResourcesStatus:
      description: Indicates whether the media component is active or inactive.
      enum:
      - ACTIVE
      - INACTIVE
      type: string
    FlowUsage:
      description: Describes the flow usage of the flows described by a media subcomponent.
      enum:
      - NO_INFO
      - RTCP
      - AF_SIGNALLING
      type: string
    FlowStatus:
      description: Describes whether the IP flow(s) are enabled or disabled.
      enum:
      - ENABLED-UPLINK
      - ENABLED-DOWNLINK
      - ENABLED
      - DISABLED
      - REMOVED
      type: string
    RequiredAccessInfo:
      description: Indicates the access network information required for an AF session.
      enum:
      - USER_LOCATION
      - UE_TIME_ZONE
      type: string
    SipForkingIndication:
      description: |
        Indicates whether several SIP dialogues are related to an "Individual Application Session Context" resource.
      enum:
      - SINGLE_DIALOGUE
      - SEVERAL_DIALOGUES
      type: string
    AfRequestedData:
      description: Represents the information that the AF requested to be exposed.
      enum:
      - UE_IDENTITY
      type: string
    ServiceInfoStatus:
      description: Represents the preliminary or final service information status.
      enum:
      - FINAL
      - PRELIMINARY
      type: string
    PreemptionControlInformation:
      description: Represents Pre-emption control information.
      enum:
      - MOST_RECENT
      - LEAST_RECENT
      - HIGHEST_BW
      type: string
    PrioritySharingIndicator:
      description: Represents the Priority sharing indicator.
      enum:
      - ENABLED
      - DISABLED
      type: string
    PreemptionControlInformationRm:
      description: |
        This data type is defined in the same way as the PreemptionControlInformation data type, but with the OpenAPI nullable property set to true.
      enum:
      - MOST_RECENT
      - LEAST_RECENT
      - HIGHEST_BW
      - null
      type: string
      x-enum-descriptions:
      - ""
      - ""
      - ""
      - JSON's null value.
    AppDetectionNotifType:
      description: Indicates the notification type for Application Detection Control.
      enum:
      - APP_START
      - APP_STOP
      type: string
    PduSessionStatusPcf:
      description: Indicates whether the PDU session is established or terminated.
      enum:
      - ESTABLISHED
      - TERMINATED
      type: string
    UplinkDownlinkSupport:
      description: |
        Represents whether an indication or capability is supported for the UL, the DL or both, UL and DL.
      enum:
      - UL
      - DL
      - UL_DL
      type: string
    L4sNotifType:
      description: Indicates the notification type for ECN marking for L4S support
        in 5GS.
      enum:
      - AVAILABLE
      - NOT_AVAILABLE
      type: string
    ProblemDetails:
      description: Provides additional information in an error response.
      properties:
        type:
          $ref: "#/components/schemas/Uri"
        title:
          type: string
        status:
          type: integer
        detail:
          description: A human-readable explanation specific to this occurrence of
            the problem.
          type: string
        instance:
          $ref: "#/components/schemas/Uri"
        cause:
          description: |
            A machine-readable application error cause specific to this occurrence of the problem.  This IE should be present and provide application-related error information, if available.
          type: string
        invalidParams:
          items:
            $ref: "#/components/schemas/InvalidParam"
          minItems: 1
          type: array
        supportedFeatures:
          $ref: "#/components/schemas/SupportedFeatures"
        accessTokenError:
          $ref: "#/components/schemas/AccessTokenErr"
        accessTokenRequest:
          $ref: "#/components/schemas/AccessTokenReq"
        nrfId:
          $ref: "#/components/schemas/Fqdn"
        supportedApiVersions:
          items:
            type: string
          minItems: 1
          type: array
        noProfileMatchInfo:
          $ref: "#/components/schemas/NoProfileMatchInfo"
      type: object
    Uri:
      description: String providing an URI formatted according to RFC 3986.
      type: string
    InvalidParam:
      description: It contains an invalid parameter and a related description.
      properties:
        param:
          description: |
            If the invalid parameter is an attribute in a JSON body, this IE shall contain the  attribute's name and shall be encoded as a JSON Pointer. If the invalid parameter is  an HTTP header, this IE shall be formatted as the concatenation of the string "header "  plus the name of such header. If the invalid parameter is a query parameter, this IE  shall be formatted as the concatenation of the string "query " plus the name of such  query parameter. If the invalid parameter is a variable part in the path of a resource  URI, this IE shall contain the name of the variable, including the symbols "{" and "}"  used in OpenAPI specification as the notation to represent variable path segments.
          type: string
        reason:
          description: |
            A human-readable reason, e.g. "must be a positive integer". In cases involving failed  operations in a PATCH request, the reason string should identify the operation that  failed using the operation's array index to assist in correlation of the invalid  parameter with the failed operation, e.g." Replacement value invalid for attribute  (failed operation index= 4)"
          type: string
      required:
      - param
      type: object
    SupportedFeatures:
      description: |
        A string used to indicate the features supported by an API that is used as defined in clause  6.6 in 3GPP TS 29.500. The string shall contain a bitmask indicating supported features in  hexadecimal representation Each character in the string shall take a value of "0" to "9",  "a" to "f" or "A" to "F" and shall represent the support of 4 features as described in  table 5.2.2-3. The most significant character representing the highest-numbered features shall  appear first in the string, and the character representing features 1 to 4 shall appear last  in the string. The list of features and their numbering (starting with 1) are defined  separately for each API. If the string contains a lower number of characters than there are  defined features for an API, all features that would be represented by characters that are not  present in the string are not supported.
      pattern: "^[A-Fa-f0-9]*$"
      type: string
    Fqdn:
      description: Fully Qualified Domain Name
      maxLength: 253
      minLength: 4
      pattern: "^([0-9A-Za-z]([-0-9A-Za-z]{0,61}[0-9A-Za-z])?\\.)+[A-Za-z]{2,63}\\\
        .?$"
      type: string
    RedirectResponse:
      description: |
        The response shall include a Location header field containing a different URI  (pointing to a different URI of an other service instance), or the same URI if a request  is redirected to the same target resource via a different SCP.
      example:
        targetSepp: null
        cause: cause
        targetScp: null
      properties:
        cause:
          type: string
        targetScp:
          $ref: "#/components/schemas/Uri"
        targetSepp:
          $ref: "#/components/schemas/Uri"
      type: object
    ApplicationChargingId:
      description: |
        Application provided charging identifier allowing correlation of charging information.
      type: string
    BdtReferenceId:
      description: string identifying a BDT Reference ID as defined in clause 5.3.3
        of 3GPP TS 29.154.
      type: string
    Dnn:
      description: |
        String representing a Data Network as defined in clause 9A of 3GPP TS 23.003;  it shall contain either a DNN Network Identifier, or a full DNN with both the Network  Identifier and Operator Identifier, as specified in 3GPP TS 23.003 clause 9.1.1 and 9.1.2. It shall be coded as string in which the labels are separated by dots  (e.g. "Label1.Label2.Label3").
      type: string
    DurationSec:
      description: indicating a time in seconds.
      type: integer
    Snssai:
      description: |
        When Snssai needs to be converted to string (e.g. when used in maps as key), the string shall be composed of one to three digits "sst" optionally followed by "-" and 6 hexadecimal digits "sd".
      example:
        sd: sd
        sst: 92
      properties:
        sst:
          description: "Unsigned integer, within the range 0 to 255, representing\
            \ the Slice/Service Type.  It indicates the expected Network Slice behaviour\
            \ in terms of features and services. Values 0 to 127 correspond to the\
            \ standardized SST range. Values 128 to 255 correspond  to the Operator-specific\
            \ range. See clause 28.4.2 of 3GPP TS 23.003. Standardized values are\
            \ defined in clause 5.15.2.2 of 3GPP TS 23.501. \n"
          maximum: 255
          minimum: 0
          type: integer
        sd:
          description: |
            3-octet string, representing the Slice Differentiator, in hexadecimal representation. Each character in the string shall take a value of "0" to "9", "a" to "f" or "A" to "F" and shall represent 4 bits. The most significant character representing the 4 most significant bits of the SD shall appear first in the string, and the character representing the 4 least significant bit of the SD shall appear last in the string. This is an optional parameter that complements the Slice/Service type(s) to allow to  differentiate amongst multiple Network Slices of the same Slice/Service type. This IE shall be absent if no SD value is associated with the SST.
          pattern: "^[A-Fa-f0-9]{6}$"
          type: string
      required:
      - sst
      type: object
    Supi:
      description: "String identifying a Supi that shall contain either an IMSI, a\
        \ network specific identifier,\na Global Cable Identifier (GCI) or a Global\
        \ Line Identifier (GLI) as specified in clause \n2.2A of 3GPP TS 23.003. It\
        \ shall be formatted as follows\n - for an IMSI \"imsi-<imsi>\", where <imsi>\
        \ shall be formatted according to clause 2.2\n   of 3GPP TS 23.003 that describes\
        \ an IMSI.\n - for a network specific identifier \"nai-<nai>, where <nai>\
        \ shall be formatted\n   according to clause 28.7.2 of 3GPP TS 23.003 that\
        \ describes an NAI.\n - for a GCI \"gci-<gci>\", where <gci> shall be formatted\
        \ according to clause 28.15.2\n   of 3GPP TS 23.003.\n - for a GLI \"gli-<gli>\"\
        , where <gli> shall be formatted according to clause 28.16.2 of\n   3GPP TS\
        \ 23.003.To enable that the value is used as part of an URI, the string shall\n\
        \   only contain characters allowed according to the \"lower-with-hyphen\"\
        \ naming convention\n   defined in 3GPP TS 29.501.\n"
      pattern: "^(imsi-[0-9]{5,15}|nai-.+|gci-.+|gli-.+|.+)$"
      type: string
    Gpsi:
      description: "String identifying a Gpsi shall contain either an External Id\
        \ or an MSISDN.  It shall be formatted as follows -External Identifier= \"\
        extid-'extid', where 'extid'  shall be formatted according to clause 19.7.2\
        \ of 3GPP TS 23.003 that describes an  External Identifier. \n"
      pattern: "^(msisdn-[0-9]{5,15}|extid-[^@]+@[^@]+|.+)$"
      type: string
    Ipv4Addr:
      description: |
        String identifying a IPv4 address formatted in the 'dotted decimal' notation as defined in RFC 1166.
      example: 198.51.100.1
      pattern: "^(([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])\\.){3}([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])$"
      type: string
    Ipv6Addr:
      description: |
        String identifying an IPv6 address formatted according to clause 4 of RFC5952. The mixed IPv4 IPv6 notation according to clause 5 of RFC5952 shall not be used.
      example: 2001:db8:85a3::8a2e:370:7334
      pattern: "^(((:|(0?|([1-9a-f][0-9a-f]{0,3}))):)((0?|([1-9a-f][0-9a-f]{0,3})):){0,6}(:|(0?|([1-9a-f][0-9a-f]{0,3}))))|((([^:]+:){7}([^:]+))|((([^:]+:)*[^:]+)?::(([^:]+:)*[^:]+)?)))$"
      type: string
    MacAddr48:
      description: |
        String identifying a MAC address formatted in the hexadecimal notation according to clause 1.1 and clause 2.1 of RFC 7042.
      pattern: "^([0-9a-fA-F]{2})((-[0-9a-fA-F]{2}){5})$"
      type: string
    BridgeManagementContainer:
      description: Contains the UMIC.
      example:
        bridgeManCont: null
      properties:
        bridgeManCont:
          $ref: "#/components/schemas/Bytes"
      required:
      - bridgeManCont
      type: object
    PortManagementContainer:
      description: Contains the port management information container for a port.
      example:
        portNum: null
        portManCont: null
      properties:
        portManCont:
          $ref: "#/components/schemas/Bytes"
        portNum:
          $ref: "#/components/schemas/TsnPortNumber"
      required:
      - portManCont
      - portNum
      type: object
    TsnPortNumber:
      $ref: "#/components/schemas/Uinteger"
    Uinteger:
      description: "Unsigned Integer, i.e. only value 0 and integers above 0 are permissible."
      minimum: 0
      type: integer
    DurationSecRm:
      description: "indicating a time in seconds with OpenAPI defined 'nullable: true'\
        \ property."
      nullable: true
      type: integer
    RequestedQosMonitoringParameter:
      description: Indicates the requested QoS monitoring parameters to be measured.
      enum:
      - DOWNLINK
      - UPLINK
      - ROUND_TRIP
      - DOWNLINK_DATA_RATE
      - UPLINK_DATA_RATE
      - DOWNLINK_CONGESTION
      - UPLINK_CONGESTION
      type: string
    UsageThreshold:
      description: Represents a usage threshold.
      example:
        duration: null
        totalVolume: null
        downlinkVolume: null
        uplinkVolume: null
      properties:
        duration:
          $ref: "#/components/schemas/DurationSec_1"
        totalVolume:
          $ref: "#/components/schemas/Volume"
        downlinkVolume:
          $ref: "#/components/schemas/Volume"
        uplinkVolume:
          $ref: "#/components/schemas/Volume"
      type: object
    DurationSec_1:
      description: Unsigned integer identifying a period of time in units of seconds.
      minimum: 0
      type: integer
    Volume:
      description: Unsigned integer identifying a volume in units of bytes.
      format: int64
      minimum: 0
      type: integer
    AverWindow:
      default: 2000
      description: "Unsigned integer indicating Averaging Window (see clause 5.7.3.6\
        \ and 5.7.4 of 3GPP TS 23.501), expressed in milliseconds. \n"
      maximum: 4095
      minimum: 1
      type: integer
    UsageThresholdRm:
      description: |
        Represents the same as the UsageThreshold data type but with the nullable:true property.
      nullable: true
      properties:
        duration:
          $ref: "#/components/schemas/DurationSecRm_1"
        totalVolume:
          $ref: "#/components/schemas/VolumeRm"
        downlinkVolume:
          $ref: "#/components/schemas/VolumeRm"
        uplinkVolume:
          $ref: "#/components/schemas/VolumeRm"
      type: object
    DurationSecRm_1:
      description: |
        Unsigned integer identifying a period of time in units of seconds with "nullable=true" property.
      minimum: 0
      nullable: true
      type: integer
    VolumeRm:
      description: |
        Unsigned integer identifying a volume in units of bytes with "nullable=true" property.
      format: int64
      minimum: 0
      nullable: true
      type: integer
    AverWindowRm:
      default: 2000
      description: |
        This data type is defined in the same way as the 'AverWindow' data type, but with the OpenAPI 'nullable: true' property.
      maximum: 4095
      minimum: 1
      nullable: true
      type: integer
    Float:
      description: string with format 'float' as defined in OpenAPI.
      format: float
      type: number
    BitRate:
      description: |
        String representing a bit rate; the prefixes follow the standard symbols from The International System of Units, and represent x1000 multipliers, with the exception that prefix "K" is used to represent the standard symbol "k".
      pattern: ^\d+(\.\d+)? (bps|Kbps|Mbps|Gbps|Tbps)$
      type: string
    PacketLossRateRm:
      description: |
        This data type is defined in the same way as the 'PacketLossRate' data type, but with the OpenAPI 'nullable: true' property.
      maximum: 1000
      minimum: 0
      nullable: true
      type: integer
    PreemptionCapability:
      description: |
        The enumeration PreemptionCapability indicates the pre-emption capability of a request on other QoS flows. See clause 5.7.2.2 of 3GPP TS 23.501. It shall comply with the provisions defined in table 5.5.3.1-1.
      enum:
      - NOT_PREEMPT
      - MAY_PREEMPT
      type: string
    PreemptionVulnerability:
      description: |
        The enumeration PreemptionVulnerability indicates the pre-emption vulnerability of the QoS flow to pre-emption from other QoS flows. See clause 5.7.2.2 of 3GPP TS 23.501. It shall comply with the provisions defined in table 5.5.3.2-1
      enum:
      - NOT_PREEMPTABLE
      - PREEMPTABLE
      type: string
    Uint32:
      description: |
        Integer where the allowed values correspond to the value range of an unsigned 32-bit integer.
      maximum: 4294967295
      minimum: 0
      type: integer
    PduSetQosPara:
      description: Represents the PDU Set level QoS parameters.
      example:
        pduSetDelayBudget: null
        pduSetHandlingInfo: ALL_PDUS_NEEDED
        pduSetErrRate: null
      properties:
        pduSetDelayBudget:
          $ref: "#/components/schemas/ExtPacketDelBudget"
        pduSetErrRate:
          $ref: "#/components/schemas/PacketErrRate"
        pduSetHandlingInfo:
          $ref: "#/components/schemas/PduSetHandlingInfo"
      type: object
    ExtPacketDelBudget:
      description: |
        Unsigned integer indicating Packet Delay Budget (see clauses 5.7.3.4 and 5.7.4 of 3GPP TS 23.501 [8])), expressed in 0.01 milliseconds.
      minimum: 1
      type: integer
    PacketErrRate:
      description: |
        String representing Packet Error Rate (see clause 5.7.3.5 and 5.7.4 of 3GPP TS 23.501, expressed as a "scalar x 10-k" where the scalar and the exponent k are each encoded as one decimal digit.
      pattern: "^([0-9]E-[0-9])$"
      type: string
    PduSetHandlingInfo:
      description: |
        Possible values are:
        - "ALL_PDUS_NEEDED": All PDUs of the PDU Set are needed
        - "ALL_PDUS_NOT_NEEDED": All PDUs of the PDU Set are not needed
      enum:
      - ALL_PDUS_NEEDED
      - ALL_PDUS_NOT_NEEDED
      type: string
    ProtocolDescription:
      description: ProtocolDescription contains information to derive PDU set information.
      example:
        rtpPayloadInfoList:
        - rtpPayloadTypeList:
          - 118
          - 118
          rtpPayloadFormat: H264
        - rtpPayloadTypeList:
          - 118
          - 118
          rtpPayloadFormat: H264
        rtpHeaderExtInfo:
          rtpHeaderExtType: PDU_SET_MARKING
          pduSetSizeActive: true
          rtpHeaderExtId: 180
          longFormat: true
        transportProto: RTP
      properties:
        transportProto:
          $ref: "#/components/schemas/MediaTransportProto"
        rtpHeaderExtInfo:
          $ref: "#/components/schemas/RtpHeaderExtInfo"
        rtpPayloadInfoList:
          items:
            $ref: "#/components/schemas/RtpPayloadInfo"
          minItems: 1
          type: array
      type: object
    MediaTransportProto:
      description: |
        The enumeration MediaTransportProto indicates the transport protocol used for a media flow.
      enum:
      - RTP
      - SRTP
      type: string
    RtpHeaderExtInfo:
      description: RTP Header Extension information
      example:
        rtpHeaderExtType: PDU_SET_MARKING
        pduSetSizeActive: true
        rtpHeaderExtId: 180
        longFormat: true
      properties:
        rtpHeaderExtType:
          $ref: "#/components/schemas/RtpHeaderExtType"
        rtpHeaderExtId:
          maximum: 255
          minimum: 1
          type: integer
        longFormat:
          type: boolean
        pduSetSizeActive:
          type: boolean
      type: object
    RtpHeaderExtType:
      description: "The enumeration indicates the type of Rtp Header Extension type\
        \ \n"
      enum:
      - PDU_SET_MARKING
      type: string
    RtpPayloadInfo:
      description: RtpPayloadInfo contains Rtp payload type and format.
      example:
        rtpPayloadTypeList:
        - 118
        - 118
        rtpPayloadFormat: H264
      properties:
        rtpPayloadTypeList:
          items:
            maximum: 127
            minimum: 1
            type: integer
          minItems: 1
          type: array
        rtpPayloadFormat:
          $ref: "#/components/schemas/RtpPayloadFormat"
      type: object
    RtpPayloadFormat:
      description: "The enumeration RtpPayloadFormat indicates the RTP Payload format\
        \ \n"
      enum:
      - H264
      - H265
      type: string
    FloatRm:
      description: |
        string with format 'float' as defined in OpenAPI with the OpenAPI defined 'nullable: true' property.
      format: float
      nullable: true
      type: number
    BitRateRm:
      description: |
        This data type is defined in the same way as the 'BitRate' data type, but with the OpenAPI 'nullable: true' property.
      nullable: true
      pattern: ^\d+(\.\d+)? (bps|Kbps|Mbps|Gbps|Tbps)$
      type: string
    PreemptionCapabilityRm:
      description: |
        This enumeration is defined in the same way as the 'PreemptionCapability' enumeration, but with the OpenAPI 'nullable: true' property.
      enum:
      - NOT_PREEMPT
      - MAY_PREEMPT
      - null
      type: string
      x-enum-descriptions:
      - ""
      - ""
      - JSON's null value.
    NullValue:
      description: JSON's null value.
      enum:
      - null
      type: string
    PreemptionVulnerabilityRm:
      description: "This enumeration is defined in the same way as the 'PreemptionVulnerability'\
        \ enumeration, but with the OpenAPI 'nullable: true' property.\" \n"
      enum:
      - NOT_PREEMPTABLE
      - PREEMPTABLE
      - null
      type: string
      x-enum-descriptions:
      - ""
      - ""
      - JSON's null value.
    Uint32Rm:
      description: |
        Integer where the allowed values correspond to the value range of an unsigned 32-bit integer with the OpenAPI 'nullable: true' property.
      format: int32
      maximum: 4294967295
      minimum: 0
      nullable: true
      type: integer
    PduSetQosParaRm:
      allOf:
      - $ref: "#/components/schemas/PduSetQosPara"
      nullable: true
    AfSigProtocol:
      description: "Indicates the protocol used for signalling between the UE and\
        \ the AF.  \nPossible values are\n- NO_INFORMATION: Indicate that no information\
        \ about the AF signalling protocol is being\nprovided.\n- SIP: Indicate that\
        \ the signalling protocol is Session Initiation Protocol.\n"
      enum:
      - NO_INFORMATION
      - SIP
      nullable: true
      type: string
    AccessType:
      description: Indicates whether the access is  via 3GPP or via non-3GPP.
      enum:
      - 3GPP_ACCESS
      - NON_3GPP_ACCESS
      type: string
    AdditionalAccessInfo:
      description: |
        Indicates the combination of additional Access Type and RAT Type for a MA PDU session.
      example:
        accessType: null
        ratType: NR
      properties:
        accessType:
          $ref: "#/components/schemas/AccessType"
        ratType:
          $ref: "#/components/schemas/RatType"
      required:
      - accessType
      type: object
    AccNetChargingAddress:
      anyOf: []
      description: Describes the network entity within the access network performing
        charging
      example:
        anChargIpv6Addr: 2001:db8:85a3::8a2e:370:7334
        anChargIpv4Addr: 198.51.100.1
      nullable: true
      properties:
        anChargIpv4Addr:
          $ref: "#/components/schemas/Ipv4Addr"
        anChargIpv6Addr:
          $ref: "#/components/schemas/Ipv6Addr"
      type: object
    NetLocAccessSupport:
      description: "Indicates the access network support of the report of the requested\
        \ access network\ninformation.  \nPossible values are\n- ANR_NOT_SUPPORTED:\
        \ Indicates that the access network does not support the report of access\n\
        network information.\n- TZR_NOT_SUPPORTED: Indicates that the access network\
        \ does not support the report of UE\ntime zone.\n- LOC_NOT_SUPPORTED: Indicates\
        \ that the access network does not support the report of UE\nLocation (or\
        \ PLMN Id).\n"
      enum:
      - ANR_NOT_SUPPORTED
      - TZR_NOT_SUPPORTED
      - LOC_NOT_SUPPORTED
      type: string
    PlmnIdNid:
      description: |
        Contains the serving core network operator PLMN ID and, for an SNPN, the NID that together with the PLMN ID identifies the SNPN.
      example:
        mnc: null
        nid: null
        mcc: null
      properties:
        mcc:
          $ref: "#/components/schemas/Mcc"
        mnc:
          $ref: "#/components/schemas/Mnc"
        nid:
          $ref: "#/components/schemas/Nid"
      required:
      - mcc
      - mnc
      type: object
    Mcc:
      description: "Mobile Country Code part of the PLMN, comprising 3 digits, as\
        \ defined in clause 9.3.3.5 of 3GPP TS 38.413. \n"
      pattern: "^\\d{3}$"
      type: string
    Mnc:
      description: "Mobile Network Code part of the PLMN, comprising 2 or 3 digits,\
        \ as defined in  clause 9.3.3.5 of 3GPP TS 38.413. \n"
      pattern: "^\\d{2,3}$"
      type: string
    Nid:
      description: "This represents the Network Identifier, which together with a\
        \ PLMN ID is used to identify an SNPN (see 3GPP TS 23.003 and 3GPP TS 23.501\
        \ clause 5.30.2.1). \n"
      pattern: "^[A-Fa-f0-9]{11}$"
      type: string
    QosNotificationControlInfo:
      description: Contains the QoS Notification Control Information.
      example:
        notifType: GUARANTEED
        contVer: null
        altQosParamId: altQosParamId
        altQosNotSuppInd: true
        refPccRuleIds:
        - refPccRuleIds
        - refPccRuleIds
      properties:
        refPccRuleIds:
          description: |
            An array of PCC rule id references to the PCC rules associated with the QoS notification control info.
          items:
            type: string
          minItems: 1
          type: array
        notifType:
          $ref: "#/components/schemas/QosNotifType"
        contVer:
          $ref: "#/components/schemas/ContentVersion"
        altQosParamId:
          description: |
            Indicates the alternative QoS parameter set the NG-RAN can guarantee. When it is omitted and the notifType attribute is set to NOT_GUAARANTEED it indicates that the lowest priority alternative QoS profile could not be fulfilled.
          type: string
        altQosNotSuppInd:
          description: |
            When present and set to true it indicates that the Alternative QoS profiles are not supported by NG-RAN.
          type: boolean
      required:
      - notifType
      - refPccRuleIds
      type: object
    RanNasRelCause:
      description: Contains the RAN/NAS release cause.
      example:
        ngApCause:
          value: null
          group: null
        "5gMmCause": null
        "5gSmCause": null
        epsCause: null
      properties:
        ngApCause:
          $ref: "#/components/schemas/NgApCause"
        "5gMmCause":
