      - AUTH_REJECTED
      - USER_UNKNOWN
      - RATING_FAILED
      type: string
    SessionRuleFailureCode:
      description: "Indicates the reason of the session rule failure.  \nPossible\
        \ values are\n- NF_MAL: Indicates that the PCC rule could not be successfully\
        \ installed (for those\nprovisioned from the PCF) or activated (for those\
        \ pre-defined in SMF) or enforced (for those\nalready successfully installed)\
        \ due to SMF/UPF malfunction.\n- RES_LIM: Indicates that the PCC rule could\
        \ not be successfully installed (for those\nprovisioned from PCF) or activated\
        \ (for those pre-defined in SMF) or enforced (for those\nalready successfully\
        \ installed) due to a limitation of resources at the SMF/UPF.\n- SESSION_RESOURCE_ALLOCATION_FAILURE:\
        \ Indicates the session rule could not be successfully\nenforced due to failure\
        \ during the allocation of resources for the PDU session in the UE,\nRAN or\
        \ AMF.\n- UNSUCC_QOS_VAL: indicates that the QoS validation has failed.\n\
        - INCORRECT_UM: The usage monitoring data of the enforced session rule is\
        \ not the same for\nall the provisioned session rule(s).\n- UE_STA_SUSP: Indicates\
        \ that the UE is in suspend state.\n- UNKNOWN_REF_ID: Indicates that the session\
        \ rule could not be successfully \ninstalled/modified because the referenced\
        \ identifier to a Policy Decision Data or to a\nCondition Data is unknown\
        \ to the SMF.\n- INCORRECT_COND_DATA: Indicates that the session rule could\
        \ not be successfully\ninstalled/modified because the referenced Condition\
        \ data are incorrect.\n- REF_ID_COLLISION: Indicates that the session rule\
        \ could not be successfully\ninstalled/modified because the same Policy Decision\
        \ is referenced by a PCC rule (e.g. the\nsession rule and the PCC rule refer\
        \ to the same Usage Monitoring decision data).\n- AN_GW_FAILED: Indicates\
        \ that the AN-Gateway has failed and that the PCF should refrain\nfrom sending\
        \ policy decisions to the SMF until it is informed that the S-GW has been\n\
        recovered. This value shall not be used if the SM Policy association modification\
        \ procedure\nis initiated for session rule removal only.\n- DEFAULT_QOS_MODIFICATION_FAILURE:\
        \ Indicates that the enforcement of the default QoS\nmodification failed.\
        \ The SMF shall use this value to indicate to the PCF that the default\nQoS\
        \ modification has failed.\n- SESSION_AMBR_MODIFICATION_FAILURE: Indicates\
        \ that the enforcement of the session-AMBR\nmodification failed. The SMF shall\
        \ use this value to indicate to the PCF that the\nsession-AMBR modification\
        \ has failed.\n"
      enum:
      - NF_MAL
      - RES_LIM
      - SESSION_RESOURCE_ALLOCATION_FAILURE
      - UNSUCC_QOS_VAL
      - INCORRECT_UM
      - UE_STA_SUSP
      - UNKNOWN_REF_ID
      - INCORRECT_COND_DATA
      - REF_ID_COLLISION
      - AN_GW_FAILED
      - DEFAULT_QOS_MODIFICATION_FAILURE
      - SESSION_AMBR_MODIFICATION_FAILURE
