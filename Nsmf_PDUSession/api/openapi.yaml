            Indicates the address of the redirect server. If "redirectAddressType" attribute indicates the IPV4_ADDR, the encoding is the same as the Ipv4Addr data type defined in 3GPP TS 29.571.If "redirectAddressType" attribute indicates the IPV6_ADDR, the encoding is the same as the Ipv6Addr data type defined in 3GPP TS 29.571.If "redirectAddressType" attribute indicates the URL or SIP_URI, the encoding is the same as the Uri data type defined in 3GPP TS 29.571.
          type: string
      type: object
    RedirectAddressType:
      description: "Indicates the redirect address type.  \nPossible values are\n\
        - IPV4_ADDR: Indicates that the address type is in the form of \"dotted-decimal\"\
        \ IPv4\naddress.\n- IPV6_ADDR: Indicates that the address type is in the form\
        \ of IPv6 address.\n- URL: Indicates that the address type is in the form\
        \ of Uniform Resource Locator.\n- SIP_URI: Indicates that the address type\
        \ is in the form of SIP Uniform Resource\nIdentifier.\n"
      enum:
      - IPV4_ADDR
      - IPV6_ADDR
      - URL
      - SIP_URI
      type: string
