            nid: null
            plmnId:
              mnc: null
              mcc: null
          ignoreTai: false
          ueLocationTimestamp: null
          geodeticInformation: geodeticInformation
          ecgi:
            eutraCellId: null
            nid: null
            plmnId:
              mnc: null
              mcc: null
        nrLocation:
          ignoreNcgi: false
          geographicalInformation: geographicalInformation
          globalGnbId:
            eNbId: null
            wagfId: null
            tngfId: null
            gNbId:
              bitLength: 28
              gNBValue: gNBValue
            nid: null
            plmnId:
              mnc: null
              mcc: null
            n3IwfId: null
            ngeNbId: SMacroNGeNB-34B89
          ageOfLocationInformation: 4803
          ncgi:
            nid: null
            plmnId:
