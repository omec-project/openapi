    ApplicationDescriptor:
      description: string with format 'bytes' as defined in OpenAPI
      format: byte
      type: string
    UePolicyContainer:
      description: string with format 'bytes' as defined in OpenAPI
      format: byte
      type: string
    UrspEnforcementInfo:
      description: string with format 'bytes' as defined in OpenAPI
      format: byte
      type: string
    FlowDirection:
      description: "Indicates the direction of the service data flow.  \nPossible\
        \ values are:\n- DOWNLINK: The corresponding filter applies for traffic to\
        \ the UE.\n- UPLINK: The corresponding filter applies for traffic from the\
        \ UE.\n- BIDIRECTIONAL: The corresponding filter applies for traffic both\
        \ to and from the UE.\n- UNSPECIFIED: The corresponding filter applies for\
        \ traffic to the UE (downlink), but has no\nspecific direction declared. The\
        \ service data flow detection shall apply the filter for\nuplink traffic as\
        \ if the filter was bidirectional. The PCF shall not use the value\nUNSPECIFIED\
        \ in filters created by the network in NW-initiated procedures. The PCF shall\
        \ only\ninclude the value UNSPECIFIED in filters in UE-initiated procedures\
        \ if the same value is\nreceived from the SMF.\n"
      enum:
      - DOWNLINK
      - UPLINK
      - BIDIRECTIONAL
      - UNSPECIFIED
      type: string
    FlowDirectionRm:
      description: |
        This data type is defined in the same way as the "FlowDirection" data type, with the only  difference that it allows null value.
      enum:
      - DOWNLINK
      - UPLINK
      - BIDIRECTIONAL
      - UNSPECIFIED
      - null
      type: string
      x-enum-descriptions:
      - ""
      - ""
      - ""
      - ""
      - JSON's null value.
    ReportingLevel:
      description: "Indicates the reporting level.  \nPossible values are:\n- SER_ID_LEVEL:\
        \ Indicates that the usage shall be reported on service id and rating group\n\
        combination level.\n- RAT_GR_LEVEL: Indicates that the usage shall be reported\
        \ on rating group level.\n- SPON_CON_LEVEL: Indicates that the usage shall\
        \ be reported on sponsor identity and rating\ngroup combination level.\n"
      enum:
      - SER_ID_LEVEL
      - RAT_GR_LEVEL
      - SPON_CON_LEVEL
      nullable: true
      type: string
    MeteringMethod:
      description: "Indicates the metering method.  \nPossible values are:\n- DURATION:\
        \ Indicates that the duration of the service data flow traffic shall be metered.\n\
        - VOLUME: Indicates that volume of the service data flow traffic shall be\
        \ metered.\n- DURATION_VOLUME: Indicates that the duration and the volume\
        \ of the service data flow\ntraffic shall be metered.\n- EVENT: Indicates\
        \ that events of the service data flow traffic shall be metered.\n"
      enum:
      - DURATION
      - VOLUME
      - DURATION_VOLUME
      - EVENT
      nullable: true
      type: string
    PolicyControlRequestTrigger:
      description: "Indicates the policy control request trigger(s).  \nPossible values\
        \ are:\n- PLMN_CH: PLMN Change\n- RES_MO_RE: A request for resource modification\
        \ has been received by the SMF. The SMF\nalways reports to the PCF.\n- AC_TY_CH:\
        \ Access Type Change.\n- UE_IP_CH: UE IP address change. The SMF always reports\
        \ to the PCF.\n- UE_MAC_CH: A new UE MAC address is detected or a used UE\
        \ MAC address is inactive for a\nspecific period.\n- AN_CH_COR: Access Network\
        \ Charging Correlation Information\n- US_RE: The PDU Session or the Monitoring\
        \ key specific resources consumed by a UE either\nreached the threshold or\
        \ needs to be reported for other reasons.\n- APP_STA: The start of application\
        \ traffic has been detected.\n- APP_STO: The stop of application traffic has\
        \ been detected.\n- AN_INFO: Access Network Information report.\n- CM_SES_FAIL:\
        \ Credit management session failure.\n- PS_DA_OFF: The SMF reports when the\
        \ 3GPP PS Data Off status changes. The SMF always\nreports to the PCF.\n-\
        \ DEF_QOS_CH: Default QoS Change. The SMF always reports to the PCF.\n- SE_AMBR_CH:\
        \ Session-AMBR Change. The SMF always reports to the PCF.\n- QOS_NOTIF: The\
        \ SMF notify the PCF when receiving notification from RAN that QoS targets\
        \ of\nthe QoS Flow cannot be guranteed or gurateed again.\n- NO_CREDIT: Out\
        \ of credit.\n- REALLO_OF_CREDIT: Reallocation of credit.\n- PRA_CH: Change\
        \ of UE presence in Presence Reporting Area.\n- SAREA_CH: Location Change\
        \ with respect to the Serving Area.\n- SCNN_CH: Location Change with respect\
        \ to the Serving CN node.\n- RE_TIMEOUT: Indicates the SMF generated the request\
        \ because there has been a PCC\nrevalidation timeout.\n- RES_RELEASE: Indicate\
        \ that the SMF can inform the PCF of the outcome of the release of\nresources\
        \ for those rules that require so.\n- SUCC_RES_ALLO: Indicates that the requested\
        \ rule data is the successful resource\nallocation.\n- RAI_CH: Location Change\
        \ with respect to the RAI of GERAN and UTRAN.\n- RAT_TY_CH: RAT Type Change.\n\
        - REF_QOS_IND_CH: Reflective QoS indication Change\n- NUM_OF_PACKET_FILTER:\
        \ Indicates that the SMF shall report the number of supported packet \nfilter\
        \ for signalled QoS rules.\n- UE_STATUS_RESUME: Indicates that the UE's status\
        \ is resumed.\n- UE_TZ_CH: UE Time Zone Change.\n- AUTH_PROF_CH: The DN-AAA\
        \ authorization profile index has changed.\n- QOS_MONITORING: Indicate that\
        \ the SMF notifies the PCF of the QoS Monitoring information.\n- SCELL_CH:\
        \ Location Change with respect to the Serving Cell.\n- USER_LOCATION_CH: Indicate\
        \ that user location has been changed, applicable to serving area\nchange\
        \ and serving cell change.\n- EPS_FALLBACK: EPS Fallback report is enabled\
        \ in the SMF.\n- MA_PDU: UE Indicates that the SMF notifies the PCF of the\
        \ MA PDU session request.\n- TSN_BRIDGE_INFO: TSC user plane node information\
        \ available.\n- 5G_RG_JOIN: The 5G-RG has joined to an IP Multicast Group.\n\
        - 5G_RG_LEAVE: The 5G-RG has left an IP Multicast Group.\n- DDN_FAILURE: Event\
        \ subscription for DDN Failure event received.\n- DDN_DELIVERY_STATUS: Event\
        \ subscription for DDN Delivery Status received.\n- GROUP_ID_LIST_CHG: UE\
        \ Internal Group Identifier(s) has changed: the SMF reports that UDM\nprovided\
        \ list of group Ids has changed.\n- DDN_FAILURE_CANCELLATION: The event subscription\
        \ for DDN Failure event is cancelled.\n- DDN_DELIVERY_STATUS_CANCELLATION:\
        \ The event subscription for DDD STATUS is cancelled.\n- VPLMN_QOS_CH: Change\
        \ of the QoS supported in the VPLMN.\n- SUCC_QOS_UPDATE: Indicates that the\
        \ requested MPS Action is successful.\n- SAT_CATEGORY_CHG: Indicates that\
        \ the SMF has detected a change between different satellite\nbackhaul categories,\
        \ or between a satellite backhaul and a non-satellite backhaul.\n- PCF_UE_NOTIF_IND:\
        \ Indicates the SMF has detected the AMF forwarded the PCF for the UE\nindication\
        \ to receive/stop receiving notifications of SM Policy association\nestablished/terminated\
        \ events.\n- NWDAF_DATA_CHG: Indicates that the NWDAF instance IDs used for\
        \ the PDU session and/or\nassociated Analytics IDs used for the PDU session\
        \ and available in the SMF have changed.\n- UE_POL_CONT_IND: Indicates that\
        \ a UE policy container is received from the UE\nin EPC over a PDN connection.\n\
        - URSP_ENFORCEMENT_INFO: Indicates a report of URSP rule enforcement information.\n\
        - HR_SBO_IND_CHG: Indicates the HR-SBO support indication has changed.\n-\
        \ L4S_SUPP: Indicates whether ECN marking for L4S is not available or available\
