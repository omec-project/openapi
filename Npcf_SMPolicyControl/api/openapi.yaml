      properties:
        accNetChId:
          $ref: "#/components/schemas/AccNetChId"
        chargEntityAddr:
          $ref: "#/components/schemas/AccNetChargingAddress"
        gpsi:
          description: "String identifying a Gpsi shall contain either an External\
            \ Id or an MSISDN.  It shall be formatted as follows -External Identifier=\
            \ \"extid-'extid', where 'extid'  shall be formatted according to clause\
            \ 19.7.2 of 3GPP TS 23.003 that describes an  External Identifier. \n"
          pattern: "^(msisdn-[0-9]{5,15}|extid-[^@]+@[^@]+|.+)$"
          type: string
        supi:
          description: "String identifying a Supi that shall contain either an IMSI,\
            \ a network specific identifier,\na Global Cable Identifier (GCI) or a\
            \ Global Line Identifier (GLI) as specified in clause \n2.2A of 3GPP TS\
            \ 23.003. It shall be formatted as follows\n - for an IMSI \"imsi-<imsi>\"\
            , where <imsi> shall be formatted according to clause 2.2\n   of 3GPP\
            \ TS 23.003 that describes an IMSI.\n - for a network specific identifier\
            \ \"nai-<nai>, where <nai> shall be formatted\n   according to clause\
            \ 28.7.2 of 3GPP TS 23.003 that describes an NAI.\n - for a GCI \"gci-<gci>\"\
            , where <gci> shall be formatted according to clause 28.15.2\n   of 3GPP\
            \ TS 23.003.\n - for a GLI \"gli-<gli>\", where <gli> shall be formatted\
            \ according to clause 28.16.2 of\n   3GPP TS 23.003.To enable that the\
            \ value is used as part of an URI, the string shall\n   only contain characters\
            \ allowed according to the \"lower-with-hyphen\" naming convention\n \
            \  defined in 3GPP TS 29.501.\n"
          pattern: "^(imsi-[0-9]{5,15}|nai-.+|gci-.+|gli-.+|.+)$"
          type: string
        invalidSupi:
          description: |
            When this attribute is included and set to true, it indicates that the supi attribute contains an invalid value.This attribute shall be present if the SUPI is not available in the SMF or the SUPI is unauthenticated. When present it shall be set to true for an invalid SUPI and false (default) for a valid SUPI.
          type: boolean
        interGrpIds:
          items:
            $ref: "#/components/schemas/GroupId"
          minItems: 1
          type: array
        pduSessionId:
          description: "Unsigned integer identifying a PDU session, within the range\
            \ 0 to 255, as specified in  clause 11.2.3.1b, bits 1 to 8, of 3GPP TS\
            \ 24.007. If the PDU Session ID is allocated by the  Core Network for\
            \ UEs not supporting N1 mode, reserved range 64 to 95 is used. PDU Session\
            \ ID  within the reserved range is only visible in the Core Network. \n"
          maximum: 255
          minimum: 0
          type: integer
        pduSessionType:
          $ref: "#/components/schemas/PduSessionType"
        chargingcharacteristics:
          type: string
        dnn:
          description: |
            String representing a Data Network as defined in clause 9A of 3GPP TS 23.003;  it shall contain either a DNN Network Identifier, or a full DNN with both the Network  Identifier and Operator Identifier, as specified in 3GPP TS 23.003 clause 9.1.1 and 9.1.2. It shall be coded as string in which the labels are separated by dots  (e.g. "Label1.Label2.Label3").
          type: string
        dnnSelMode:
          $ref: "#/components/schemas/DnnSelectionMode"
        notificationUri:
          description: String providing an URI formatted according to RFC 3986.
          type: string
        accessType:
          $ref: "#/components/schemas/AccessType"
        ratType:
          $ref: "#/components/schemas/RatType"
        addAccessInfo:
          $ref: "#/components/schemas/AdditionalAccessInfo"
        servingNetwork:
          $ref: "#/components/schemas/PlmnIdNid"
        userLocationInfo:
          $ref: "#/components/schemas/UserLocation"
        ueTimeZone:
          description: "String with format \"time-numoffset\" optionally appended\
            \ by \"daylightSavingTime\", where \n- \"time-numoffset\" shall represent\
            \ the time zone adjusted for daylight saving time and be\n   encoded as\
            \ time-numoffset as defined in clause\_5.6 of IETF RFC 3339; \n- \"daylightSavingTime\"\
            \ shall represent the adjustment that has been made and shall be\n   encoded\
            \ as \"+1\" or \"+2\" for a +1 or +2 hours adjustment. \n\nThe example\
            \ is for 8 hours behind UTC, +1 hour adjustment for Daylight Saving Time.\n"
          example: -08:00+1
          type: string
        pei:
          description: "String representing a Permanent Equipment Identifier that\
            \ may contain - an IMEI or IMEISV, as  specified in clause 6.2 of 3GPP\
            \ TS 23.003; a MAC address for a 5G-RG or FN-RG via  wireline  access,\
            \ with an indication that this address cannot be trusted for regulatory\
            \ purpose if this  address cannot be used as an Equipment Identifier of\
            \ the FN-RG, as specified in clause 4.7.7  of 3GPP TS23.316. Examples\
            \ are imei-012345678901234 or imeisv-0123456789012345. \n"
          pattern: "^(imei-[0-9]{15}|imeisv-[0-9]{16}|mac((-[0-9a-fA-F]{2}){6})(-untrusted)?|eui((-[0-9a-fA-F]{2}){8})|.+)$"
          type: string
        ipv4Address:
          description: |
            String identifying a IPv4 address formatted in the 'dotted decimal' notation as defined in RFC 1166.
          example: 198.51.100.1
          pattern: "^(([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])\\.){3}([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])$"
          type: string
        ipv6AddressPrefix:
          description: |
            String identifying an IPv6 address prefix formatted according to clause 4 of RFC 5952. IPv6Prefix data type may contain an individual /128 IPv6 address.
          example: 2001:db8:abcd:12::0/64
          pattern: "^(((:|(0?|([1-9a-f][0-9a-f]{0,3}))):)((0?|([1-9a-f][0-9a-f]{0,3})):){0,6}(:|(0?|([1-9a-f][0-9a-f]{0,3})))(\\\
            /(([0-9])|([0-9]{2})|(1[0-1][0-9])|(12[0-8])))|((([^:]+:){7}([^:]+))|((([^:]+:)*[^:]+)?::(([^:]+:)*[^:]+)?))(\\\
            /.+))$"
          type: string
        ipDomain:
          description: Indicates the IPv4 address domain
          type: string
        subsSessAmbr:
          $ref: "#/components/schemas/Ambr"
        authProfIndex:
          description: Indicates the DN-AAA authorization profile index
          type: string
        subsDefQos:
          $ref: "#/components/schemas/SubscribedDefaultQos"
        vplmnQos:
          $ref: "#/components/schemas/VplmnQos"
        numOfPackFilter:
          description: Contains the number of supported packet filter for signalled
