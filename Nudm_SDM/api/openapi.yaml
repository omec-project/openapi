openapi: 3.0.0
info:
  description: "Nudm Subscriber Data Management Service.  \n© 2024, 3GPP Organizational\
    \ Partners (ARIB, ATIS, CCSA, ETSI, TSDSI, TTA, TTC).  \nAll rights reserved.\n"
  title: Nudm_SDM
  version: 2.3.0-alpha.6
externalDocs:
  description: "3GPP TS 29.503 Unified Data Management Services, version 18.5.0"
  url: https://www.3gpp.org/ftp/Specs/archive/29_series/29.503/
servers:
- url: "{apiRoot}/nudm-sdm/v2"
  variables:
    apiRoot:
      default: https://example.com
      description: apiRoot as defined in clause 4.4 of 3GPP TS 29.501.
security:
- oAuth2ClientCredentials:
  - nudm-sdm
- {}
paths:
  /{supi}:
    get:
      operationId: GetDataSets
      parameters:
      - description: Identifier of the UE
        explode: false
        in: path
        name: supi
        required: true
        schema:
          $ref: "#/components/schemas/Supi"
        style: simple
      - description: List of dataset names
        explode: false
        in: query
        name: dataset-names
        required: true
        schema:
          $ref: "#/components/schemas/DatasetNames"
        style: form
      - content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlmnIdNid"
        description: serving PLMN ID
        in: query
        name: plmn-id
        required: false
      - content:
          application/json:
            schema:
              items:
                $ref: "#/components/schemas/PlmnId"
              minItems: 1
              type: array
        description: List of PLMNs adjacent to the UE's serving PLMN
        in: query
        name: adjacent-plmns
        required: false
      - content:
          application/json:
            schema:
              $ref: "#/components/schemas/Snssai"
        in: query
        name: single-nssai
        required: false
      - explode: true
        in: query
        name: dnn
        required: false
        schema:
          $ref: "#/components/schemas/Dnn"
        style: form
      - description: User consent purpose
        explode: true
        in: query
        name: uc-purpose
        required: false
        schema:
          $ref: "#/components/schemas/UcPurpose"
        style: form
      - description: Indication whether Disaster Roaming service is applied or not
        explode: true
        in: query
        name: disaster-roaming-ind
        required: false
        schema:
          default: false
          type: boolean
        style: form
      - description: Supported Features
        explode: true
        in: query
        name: supported-features
        required: false
        schema:
          $ref: "#/components/schemas/SupportedFeatures"
        style: form
      - description: "Validator for conditional requests, as described in RFC 9110,\
          \ 3.2"
        explode: false
        in: header
        name: If-None-Match
        required: false
        schema:
          type: string
        style: simple
      - description: "Validator for conditional requests, as described in RFC 9110,\
          \ 3.3"
        explode: false
        in: header
        name: If-Modified-Since
        required: false
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionDataSets"
          description: Expected response to a valid request
          headers:
            Cache-Control:
              description: "Cache-Control containing max-age, as described in RFC\
                \ 9111, 5.2"
              explode: false
              schema:
                type: string
              style: simple
            ETag:
              description: "Entity Tag, containing a strong validator, as described\
                \ in RFC 9110, 2.3"
              explode: false
              schema:
                type: string
              style: simple
            Last-Modified:
              description: "Timestamp for last modification of the resource, as described\
                \ in RFC 9110, 2.2"
              explode: false
              schema:
                type: string
              style: simple
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          description: Bad request
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          description: Unauthorized
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          description: Forbidden
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          description: Not Found
        "406":
          description: 406 Not Acceptable
        "429":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          description: Too Many Requests
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          description: Internal Server Error
        "502":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          description: Bad Gateway
        "503":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          description: Service Unavailable
        default:
          description: Unexpected error
      security:
      - {}
      - oAuth2ClientCredentials:
        - nudm-sdm
      - oAuth2ClientCredentials:
        - nudm-sdm
        - nudm-sdm:multi-data-sets:read
      summary: retrieve multiple data sets
      tags:
      - Retrieval of multiple data sets
