    CkPrime:
      pattern: "^[A-Fa-f0-9]{32}$"
      type: string
    IkPrime:
      pattern: "^[A-Fa-f0-9]{32}$"
      type: string
    Kausf:
      pattern: "^[A-Fa-f0-9]{64}$"
      type: string
    Rand:
      pattern: "^[A-Fa-f0-9]{32}$"
      type: string
    Xres:
      pattern: "^[A-Fa-f0-9]{8,32}$"
      type: string
    XresStar:
      pattern: "^[A-Fa-f0-9]{32}$"
      type: string
    ServingNetworkName:
      pattern: "^(5G:mnc[0-9]{3}[.]mcc[0-9]{3}[.]3gppnetwork[.]org(:[A-F0-9]{11})?)|5G:NSWO$"
      type: string
    Success:
      type: boolean
    AuthenticatedInd:
      type: boolean
    ConfidentialityKey:
      pattern: "^[A-Fa-f0-9]{32}$"
      type: string
    IntegrityKey:
      pattern: "^[A-Fa-f0-9]{32}$"
      type: string
    Kasme:
      pattern: "^[A-Fa-f0-9]{64}$"
      type: string
    NumOfRequestedVectors:
      maximum: 5
      minimum: 1
      type: integer
    AuthType:
      description: Indicates the authentication method.
      enum:
      - 5G_AKA
      - EAP_AKA_PRIME
      - EAP_TLS
      - NONE
      - EAP_TTLS
      type: string
    AvType:
      description: Indicates the type of authentication vector.
      enum:
      - 5G_HE_AKA
      - EAP_AKA_PRIME
      type: string
    HssAuthType:
      description: Indicates the authentication method.
      enum:
      - EPS_AKA
      - EAP_AKA
      - EAP_AKA_PRIME
      - IMS_AKA
      - GBA_AKA
      - UMTS_AKA
      type: string
    HssAvType:
      description: Indicates a type of authentication vector.
      enum:
      - EPS_AKA
      - EAP_AKA
      - IMS_AKA
      - GBA_AKA
      - UMTS_AKA
      type: string
    HssAuthTypeInUri:
      description: Indicates a type of authentication method.
      enum:
      - eps-aka
      - eap-aka
      - eap-aka-prime
      - ims-aka
      - gba-aka
      type: string
    AccessNetworkId:
      description: |
        Indicates the contents of Access Network ID. Used in the derivation of authentication vectors in EAP-AKA.
      enum:
      - HRPD
      - WIMAX
      - WLAN
      - ETHERNET
      type: string
    NodeType:
      description: |
        Indicates Indicates the requesting node type.
      enum:
      - AUSF
      - VLR
      - SGSN
      - S_CSCF
      - BSF
      - GAN_AAA_SERVER
      - WLAN_AAA_SERVER
      - MME
      type: string
    GbaAuthType:
      description: Indicates the authentication method.
      enum:
      - DIGEST_AKAV1_MD5
      type: string
    SupiOrSuci:
      description: String identifying a SUPI or a SUCI.
      pattern: "^(imsi-[0-9]{5,15}|nai-.+|gli-.+|gci-.+|suci-(0-[0-9]{3}-[0-9]{2,3}|[1-7]-.+)-[0-9]{1,4}-(0-0-.*|[a-fA-F1-9]-([1-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])-[a-fA-F0-9]+)|.+)$"
      type: string
    ProblemDetails:
      description: Provides additional information in an error response.
      properties:
        type:
          $ref: "#/components/schemas/Uri"
        title:
          type: string
        status:
          type: integer
        detail:
          description: A human-readable explanation specific to this occurrence of
            the problem.
          type: string
        instance:
          $ref: "#/components/schemas/Uri"
        cause:
          description: |
            A machine-readable application error cause specific to this occurrence of the problem.  This IE should be present and provide application-related error information, if available.
          type: string
        invalidParams:
          items:
            $ref: "#/components/schemas/InvalidParam"
          minItems: 1
          type: array
        supportedFeatures:
          $ref: "#/components/schemas/SupportedFeatures"
        accessTokenError:
          $ref: "#/components/schemas/AccessTokenErr"
        accessTokenRequest:
          $ref: "#/components/schemas/AccessTokenReq"
        nrfId:
          $ref: "#/components/schemas/Fqdn"
        supportedApiVersions:
          items:
            type: string
          minItems: 1
          type: array
        noProfileMatchInfo:
          $ref: "#/components/schemas/NoProfileMatchInfo"
      type: object
    Uri:
      description: String providing an URI formatted according to RFC 3986.
      type: string
    InvalidParam:
      description: It contains an invalid parameter and a related description.
      properties:
        param:
          description: |
            If the invalid parameter is an attribute in a JSON body, this IE shall contain the  attribute's name and shall be encoded as a JSON Pointer. If the invalid parameter is  an HTTP header, this IE shall be formatted as the concatenation of the string "header "  plus the name of such header. If the invalid parameter is a query parameter, this IE  shall be formatted as the concatenation of the string "query " plus the name of such  query parameter. If the invalid parameter is a variable part in the path of a resource  URI, this IE shall contain the name of the variable, including the symbols "{" and "}"  used in OpenAPI specification as the notation to represent variable path segments.
          type: string
        reason:
          description: |
            A human-readable reason, e.g. "must be a positive integer". In cases involving failed  operations in a PATCH request, the reason string should identify the operation that  failed using the operation's array index to assist in correlation of the invalid  parameter with the failed operation, e.g." Replacement value invalid for attribute  (failed operation index= 4)"
          type: string
      required:
      - param
      type: object
    SupportedFeatures:
      description: |
        A string used to indicate the features supported by an API that is used as defined in clause  6.6 in 3GPP TS 29.500. The string shall contain a bitmask indicating supported features in  hexadecimal representation Each character in the string shall take a value of "0" to "9",  "a" to "f" or "A" to "F" and shall represent the support of 4 features as described in  table 5.2.2-3. The most significant character representing the highest-numbered features shall  appear first in the string, and the character representing features 1 to 4 shall appear last  in the string. The list of features and their numbering (starting with 1) are defined  separately for each API. If the string contains a lower number of characters than there are  defined features for an API, all features that would be represented by characters that are not  present in the string are not supported.
      pattern: "^[A-Fa-f0-9]*$"
      type: string
    Fqdn:
      description: Fully Qualified Domain Name
      maxLength: 253
      minLength: 4
      pattern: "^([0-9A-Za-z]([-0-9A-Za-z]{0,61}[0-9A-Za-z])?\\.)+[A-Za-z]{2,63}\\\
        .?$"
      type: string
    PlmnId:
      description: |
        When PlmnId needs to be converted to string (e.g. when used in maps as key), the string  shall be composed of three digits "mcc" followed by "-" and two or three digits "mnc".
      example:
        mnc: null
        mcc: null
      properties:
        mcc:
          $ref: "#/components/schemas/Mcc"
        mnc:
          $ref: "#/components/schemas/Mnc"
      required:
      - mcc
      - mnc
      type: object
    Mcc:
      description: "Mobile Country Code part of the PLMN, comprising 3 digits, as\
        \ defined in clause 9.3.3.5 of 3GPP TS 38.413. \n"
      pattern: "^\\d{3}$"
      type: string
    Mnc:
      description: "Mobile Network Code part of the PLMN, comprising 2 or 3 digits,\
        \ as defined in  clause 9.3.3.5 of 3GPP TS 38.413. \n"
      pattern: "^\\d{2,3}$"
      type: string
    Supi:
      description: "String identifying a Supi that shall contain either an IMSI, a\
        \ network specific identifier,\na Global Cable Identifier (GCI) or a Global\
        \ Line Identifier (GLI) as specified in clause \n2.2A of 3GPP TS 23.003. It\
        \ shall be formatted as follows\n - for an IMSI \"imsi-<imsi>\", where <imsi>\
        \ shall be formatted according to clause 2.2\n   of 3GPP TS 23.003 that describes\
        \ an IMSI.\n - for a network specific identifier \"nai-<nai>, where <nai>\
        \ shall be formatted\n   according to clause 28.7.2 of 3GPP TS 23.003 that\
        \ describes an NAI.\n - for a GCI \"gci-<gci>\", where <gci> shall be formatted\
        \ according to clause 28.15.2\n   of 3GPP TS 23.003.\n - for a GLI \"gli-<gli>\"\
        , where <gli> shall be formatted according to clause 28.16.2 of\n   3GPP TS\
        \ 23.003.To enable that the value is used as part of an URI, the string shall\n\
        \   only contain characters allowed according to the \"lower-with-hyphen\"\
        \ naming convention\n   defined in 3GPP TS 29.501.\n"
      pattern: "^(imsi-[0-9]{5,15}|nai-.+|gci-.+|gli-.+|.+)$"
      type: string
    DataRestorationNotification:
      description: Contains identities representing those UEs potentially affected
        by a data-loss event at the UDR
      example:
        recoveryTime: 2000-01-23T04:56:07.000+00:00
        resetIds:
        - resetIds
        - resetIds
        dnnList:
        - null
        - null
        lastReplicationTime: 2000-01-23T04:56:07.000+00:00
        plmnId:
          mnc: null
          mcc: null
        sNssaiList:
        - sd: sd
          sst: 20
        - sd: sd
          sst: 20
        udmGroupId: udmGroupId
        supiRanges:
        - start: start
          pattern: pattern
          end: end
        - start: start
          pattern: pattern
          end: end
        gpsiRanges:
        - start: start
          pattern: pattern
          end: end
        - start: start
          pattern: pattern
          end: end
      properties:
        lastReplicationTime:
          description: string with format 'date-time' as defined in OpenAPI.
          format: date-time
          type: string
        recoveryTime:
          description: string with format 'date-time' as defined in OpenAPI.
          format: date-time
          type: string
        plmnId:
          $ref: "#/components/schemas/PlmnId"
        supiRanges:
          items:
            $ref: "#/components/schemas/SupiRange"
          minItems: 1
          type: array
        gpsiRanges:
          items:
            $ref: "#/components/schemas/IdentityRange"
          minItems: 1
          type: array
        resetIds:
          items:
            type: string
          minItems: 1
          type: array
        sNssaiList:
          items:
            $ref: "#/components/schemas/Snssai"
          minItems: 1
          type: array
        dnnList:
          items:
            $ref: "#/components/schemas/Dnn"
          minItems: 1
          type: array
        udmGroupId:
          description: Identifier of a group of NFs.
          type: string
      type: object
    RedirectResponse:
      description: |
        The response shall include a Location header field containing a different URI  (pointing to a different URI of an other service instance), or the same URI if a request  is redirected to the same target resource via a different SCP.
      example:
        targetSepp: null
        cause: cause
        targetScp: null
      properties:
        cause:
          type: string
        targetScp:
          $ref: "#/components/schemas/Uri"
        targetSepp:
          $ref: "#/components/schemas/Uri"
      type: object
    NfInstanceId:
      description: "String uniquely identifying a NF instance. The format of the NF\
        \ Instance ID shall be a  Universally Unique Identifier (UUID) version 4,\
        \ as described in IETF RFC 4122. \n"
      format: uuid
      type: string
    CagId:
      description: String containing a Closed Access Group Identifier.
      pattern: "^[A-Fa-f0-9]{8}$"
      type: string
    ServerAddressingInfo:
      anyOf: []
      description: Contains addressing information (IP addresses and/or FQDNs) of
        a server.
      example:
        ipv4Addresses:
        - 198.51.100.1
        - 198.51.100.1
        ipv6Addresses:
        - 2001:db8:85a3::8a2e:370:7334
        - 2001:db8:85a3::8a2e:370:7334
        fqdnList:
        - null
        - null
      nullable: true
      properties:
        ipv4Addresses:
          items:
            $ref: "#/components/schemas/Ipv4Addr"
          minItems: 1
          type: array
        ipv6Addresses:
          items:
            $ref: "#/components/schemas/Ipv6Addr"
          minItems: 1
          type: array
        fqdnList:
          items:
            $ref: "#/components/schemas/Fqdn"
          minItems: 1
          type: array
      type: object
    Ipv4Addr:
      description: |
        String identifying a IPv4 address formatted in the 'dotted decimal' notation as defined in RFC 1166.
      example: 198.51.100.1
      pattern: "^(([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])\\.){3}([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])$"
      type: string
    Ipv6Addr:
      description: |
        String identifying an IPv6 address formatted according to clause 4 of RFC5952. The mixed IPv4 IPv6 notation according to clause 5 of RFC5952 shall not be used.
      example: 2001:db8:85a3::8a2e:370:7334
      pattern: "^(((:|(0?|([1-9a-f][0-9a-f]{0,3}))):)((0?|([1-9a-f][0-9a-f]{0,3})):){0,6}(:|(0?|([1-9a-f][0-9a-f]{0,3}))))|((([^:]+:){7}([^:]+))|((([^:]+:)*[^:]+)?::(([^:]+:)*[^:]+)?)))$"
      type: string
    DateTime:
      description: string with format 'date-time' as defined in OpenAPI.
      format: date-time
      type: string
    NfSetId:
      description: "NF Set Identifier (see clause 28.12 of 3GPP TS 23.003), formatted\
        \ as the following string \"set<Set ID>.<nftype>set.5gc.mnc<MNC>.mcc<MCC>\"\
        , or  \"set<SetID>.<NFType>set.5gc.nid<NID>.mnc<MNC>.mcc<MCC>\" with  <MCC>\
        \ encoded as defined in clause 5.4.2 (\"Mcc\" data type definition)  <MNC>\
        \ encoding the Mobile Network Code part of the PLMN, comprising 3 digits.\
        \ \n  If there are only 2 significant digits in the MNC, one \"0\" digit shall\
        \ be inserted \n  at the left side to fill the 3 digits coding of MNC.  Pattern:\
        \ '^[0-9]{3}$'\n<NFType> encoded as a value defined in Table 6.1.6.3.3-1 of\
        \ 3GPP TS 29.510 but \n  with lower case characters <Set ID> encoded as a\
        \ string of characters consisting of \n  alphabetic characters (A-Z and a-z),\
        \ digits (0-9) and/or the hyphen (-) and that \n  shall end with either an\
        \ alphabetic character or a digit. \n"
      type: string
    ResynchronizationInfo_1:
      description: Contains RAND and AUTS
      example:
        rand: null
        auts: null
      properties:
        rand:
          $ref: "#/components/schemas/Rand"
        auts:
          $ref: "#/components/schemas/Auts"
      required:
      - auts
      - rand
      type: object
    threeGAkaAv:
      description: "Contains RAND, XRES, AUTN, CK, and IK"
      example:
        rand: null
        xres: null
        ik: null
        autn: null
        ck: null
      properties:
        rand:
          $ref: "#/components/schemas/Rand"
        xres:
          $ref: "#/components/schemas/Xres"
        autn:
          $ref: "#/components/schemas/Autn"
        ck:
          $ref: "#/components/schemas/ConfidentialityKey"
        ik:
          $ref: "#/components/schemas/IntegrityKey"
      required:
      - autn
      - ck
      - ik
      - rand
      - xres
      type: object
    RelayServiceCode:
      description: |
        Relay Service Code to identify a connectivity service provided by the UE-to-Network relay or the UE-to-UE relay.
      maximum: 16777215
      minimum: 0
      type: integer
    AccessTokenErr:
      description: Error returned in the access token response message
      properties:
        error:
          enum:
          - invalid_request
          - invalid_client
          - invalid_grant
          - unauthorized_client
          - unsupported_grant_type
          - invalid_scope
          type: string
        error_description:
          type: string
        error_uri:
          type: string
      required:
      - error
      type: object
    AccessTokenReq:
      description: Contains information related to the access token request
      properties:
        grant_type:
          enum:
          - client_credentials
          type: string
        nfInstanceId:
          $ref: "#/components/schemas/NfInstanceId"
        nfType:
          $ref: "#/components/schemas/NFType"
        targetNfType:
          $ref: "#/components/schemas/NFType"
        scope:
          pattern: "^([a-zA-Z0-9_:-]+)( [a-zA-Z0-9_:-]+)*$"
          type: string
        targetNfInstanceId:
          $ref: "#/components/schemas/NfInstanceId"
        requesterPlmn:
          $ref: "#/components/schemas/PlmnId"
        requesterPlmnList:
          items:
            $ref: "#/components/schemas/PlmnId"
          minItems: 2
          type: array
        requesterSnssaiList:
          items:
            $ref: "#/components/schemas/Snssai"
          minItems: 1
          type: array
        requesterFqdn:
          $ref: "#/components/schemas/Fqdn"
        requesterSnpnList:
          items:
            $ref: "#/components/schemas/PlmnIdNid"
          minItems: 1
          type: array
        targetPlmn:
          $ref: "#/components/schemas/PlmnId"
        targetSnpn:
          $ref: "#/components/schemas/PlmnIdNid"
        targetSnssaiList:
          items:
            $ref: "#/components/schemas/Snssai"
          minItems: 1
          type: array
        targetNsiList:
          items:
            type: string
          minItems: 1
          type: array
        targetNfSetId:
          $ref: "#/components/schemas/NfSetId"
        targetNfServiceSetId:
          $ref: "#/components/schemas/NfServiceSetId"
        hnrfAccessTokenUri:
          $ref: "#/components/schemas/Uri"
        sourceNfInstanceId:
          $ref: "#/components/schemas/NfInstanceId"
      required:
      - grant_type
      - nfInstanceId
      - scope
      type: object
    NoProfileMatchInfo:
      description: Provides the reason for not finding NF matching the search criteria
      properties:
        reason:
          $ref: "#/components/schemas/NoProfileMatchReason"
        queryParamCombinationList:
          items:
            $ref: "#/components/schemas/QueryParamCombination"
          minItems: 1
          type: array
      required:
      - reason
      type: object
    NoProfileMatchReason:
      description: No Profile Match Reason
      enum:
      - REQUESTER_PLMN_NOT_ALLOWED
      - TARGET_NF_SUSPENDED
      - TARGET_NF_UNDISCOVERABLE
      - QUERY_PARAMS_COMBINATION_NO_MATCH
      - TARGET_NF_TYPE_NOT_SUPPORTED
      - UNSPECIFIED
      type: string
    QueryParamCombination:
      description: Contains a list of Query Parameters
      properties:
        queryParams:
          items:
            $ref: "#/components/schemas/QueryParameter"
          minItems: 1
          type: array
      required:
      - queryParams
      type: object
    QueryParameter:
      description: Contains the name and value of a query parameter
      properties:
        name:
          type: string
        value:
          type: string
      required:
      - name
      - value
      type: object
    SupiRange:
      description: |
        A range of SUPIs (subscriber identities), either based on a numeric range, or based on regular-expression matching
      example:
        start: start
        pattern: pattern
        end: end
      nullable: true
      oneOf: []
      properties:
        start:
          pattern: "^[0-9]+$"
          type: string
        end:
          pattern: "^[0-9]+$"
          type: string
        pattern:
          type: string
      type: object
    IdentityRange:
      description: |
        A range of GPSIs (subscriber identities), either based on a numeric range, or based on regular-expression matching
      example:
        start: start
        pattern: pattern
        end: end
      nullable: true
      oneOf: []
      properties:
        start:
          pattern: "^[0-9]+$"
          type: string
        end:
          pattern: "^[0-9]+$"
          type: string
        pattern:
          type: string
      type: object
    Snssai:
      description: |
        When Snssai needs to be converted to string (e.g. when used in maps as key), the string shall be composed of one to three digits "sst" optionally followed by "-" and 6 hexadecimal digits "sd".
      example:
        sd: sd
        sst: 20
      properties:
        sst:
          description: "Unsigned integer, within the range 0 to 255, representing\
            \ the Slice/Service Type.  It indicates the expected Network Slice behaviour\
            \ in terms of features and services. Values 0 to 127 correspond to the\
            \ standardized SST range. Values 128 to 255 correspond  to the Operator-specific\
            \ range. See clause 28.4.2 of 3GPP TS 23.003. Standardized values are\
            \ defined in clause 5.15.2.2 of 3GPP TS 23.501. \n"
          maximum: 255
          minimum: 0
          type: integer
        sd:
          description: |
            3-octet string, representing the Slice Differentiator, in hexadecimal representation. Each character in the string shall take a value of "0" to "9", "a" to "f" or "A" to "F" and shall represent 4 bits. The most significant character representing the 4 most significant bits of the SD shall appear first in the string, and the character representing the 4 least significant bit of the SD shall appear last in the string. This is an optional parameter that complements the Slice/Service type(s) to allow to  differentiate amongst multiple Network Slices of the same Slice/Service type. This IE shall be absent if no SD value is associated with the SST.
          pattern: "^[A-Fa-f0-9]{6}$"
          type: string
      required:
      - sst
      type: object
    Dnn:
      description: |
        String representing a Data Network as defined in clause 9A of 3GPP TS 23.003;  it shall contain either a DNN Network Identifier, or a full DNN with both the Network  Identifier and Operator Identifier, as specified in 3GPP TS 23.003 clause 9.1.1 and 9.1.2. It shall be coded as string in which the labels are separated by dots  (e.g. "Label1.Label2.Label3").
      type: string
    NfGroupId:
      description: Identifier of a group of NFs.
      type: string
    NFType:
      description: NF types known to NRF
      enum:
      - NRF
      - UDM
      - AMF
      - SMF
      - AUSF
      - NEF
      - PCF
      - SMSF
      - NSSF
      - UDR
      - LMF
      - GMLC
      - 5G_EIR
      - SEPP
      - UPF
      - N3IWF
      - AF
      - UDSF
      - BSF
      - CHF
      - NWDAF
      - PCSCF
      - CBCF
      - HSS
      - UCMF
      - SOR_AF
      - SPAF
      - MME
      - SCSAS
      - SCEF
      - SCP
      - NSSAAF
      - ICSCF
      - SCSCF
      - DRA
      - IMS_AS
      - AANF
      - 5G_DDNMF
      - NSACF
      - MFAF
      - EASDF
      - DCCF
      - MB_SMF
      - TSCTSF
      - ADRF
      - GBA_BSF
      - CEF
      - MB_UPF
      - NSWOF
      - PKMF
      - MNPF
      - SMS_GMSC
      - SMS_IWMSC
      - MBSF
      - MBSTF
      - PANF
      - IP_SM_GW
      - SMS_ROUTER
      - DCSF
      - MRF
      - MRFP
      - MF
      - SLPKMF
      - RH
      type: string
    PlmnIdNid:
      description: |
        Contains the serving core network operator PLMN ID and, for an SNPN, the NID that together with the PLMN ID identifies the SNPN.
      properties:
        mcc:
          $ref: "#/components/schemas/Mcc"
        mnc:
          $ref: "#/components/schemas/Mnc"
        nid:
          $ref: "#/components/schemas/Nid"
      required:
      - mcc
      - mnc
      type: object
    Nid:
      description: "This represents the Network Identifier, which together with a\
        \ PLMN ID is used to identify an SNPN (see 3GPP TS 23.003 and 3GPP TS 23.501\
        \ clause 5.30.2.1). \n"
      pattern: "^[A-Fa-f0-9]{11}$"
      type: string
    NfServiceSetId:
      description: "NF Service Set Identifier (see clause 28.12 of 3GPP TS 23.003)\
        \ formatted as the following  string \"set<Set ID>.sn<Service Name>.nfi<NF\
        \ Instance ID>.5gc.mnc<MNC>.mcc<MCC>\", or  \"set<SetID>.sn<ServiceName>.nfi<NFInstanceID>.5gc.nid<NID>.mnc<MNC>.mcc<MCC>\"\
        \ with  <MCC> encoded as defined in clause 5.4.2 (\"Mcc\" data type definition)\
        \   <MNC> encoding the Mobile Network Code part of the PLMN, comprising 3\
