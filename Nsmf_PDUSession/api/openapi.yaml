      - USER_LOCATION_CHANGE
      - RAT_CHANGE
      - SESSION_AMBR_CHANGE
      - UE_TIMEZONE_CHANGE
      - TARIFF_TIME_CHANGE
      - MAX_NUMBER_OF_CHANGES_IN_CHARGING_CONDITIONS
      - MANAGEMENT_INTERVENTION
      - CHANGE_OF_UE_PRESENCE_IN_PRESENCE_REPORTING_AREA
      - CHANGE_OF_3GPP_PS_DATA_OFF_STATUS
      - SERVING_NODE_CHANGE
      - REMOVAL_OF_UPF
      - ADDITION_OF_UPF
      - INSERTION_OF_ISMF
      - REMOVAL_OF_ISMF
      - CHANGE_OF_ISMF
      - START_OF_SERVICE_DATA_FLOW
      - ECGI_CHANGE
      - TAI_CHANGE
      - HANDOVER_CANCEL
      - HANDOVER_START
      - HANDOVER_COMPLETE
      - GFBR_GUARANTEED_STATUS_CHANGE
      - ADDITION_OF_ACCESS
      - REMOVAL_OF_ACCESS
      - START_OF_SDF_ADDITIONAL_ACCESS
      - REDUNDANT_TRANSMISSION_CHANGE
      - CGI_SAI_CHANGE
      - RAI_CHANGE
      - JOIN_MULTICAST
      - MBS_DELIVERY_METHOD_CHANGE
      - LEAVE_MULTICAST
      - VSMF_CHANGE
      - SNSSAI_REPLACEMENT
      - SIP_INVITE
      - SIP_RE-INVITE_OR_UPDATE
      - SIP_2XX_ACKNOWLEDGING
      - SIP_1XX_PROVISIONAL_RESPONSE
      - SIP_4XX_5XX_OR_6XX_RESPONSE
      - ANY_OTHER_SIP_MESSAGE            - SIP_BYE_MESSAGE
      - SIP_2XX_ACKNOWLEDGING_A_SIP_BYE
      - ABORTING_A_SIP_SESSION_SET-UP
      - SIP_3XX_FINAL_OR_REDIRECTION_RESPONSE
      - SIP_4XX_5XX_OR_6XX_FINAL_RESPONSE
      - ADDITION_OF_NG_RAN
      - REMOVAL_OF_NG_RAN
      - NSAC_THRESHOLD_INITIAL
      - NSAC_THRESHOLD_UPWARDS_REACHED
      - NSAC_THRESHOLD_UPWARDS_CROSSED
      - NSAC_THRESHOLD_DOWNWARDS_CROSSED
