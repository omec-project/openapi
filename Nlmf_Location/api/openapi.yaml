      type: string
    TimeWindow:
      description: Time Window.
      format: byte
      type: string
    RangingSlCapability:
      description: Ranging/Sidelink Positioning Positioning capabilities supported
        by the UE.
      format: byte
      type: string
    ExternalClientType:
      description: Indicates types of External Clients.
      enum:
      - EMERGENCY_SERVICES
      - VALUE_ADDED_SERVICES
      - PLMN_OPERATOR_SERVICES
      - LAWFUL_INTERCEPT_SERVICES
      - PLMN_OPERATOR_BROADCAST_SERVICES
      - PLMN_OPERATOR_OM
      - PLMN_OPERATOR_ANONYMOUS_STATISTICS
      - PLMN_OPERATOR_TARGET_MS_SERVICE_SUPPORT
      - SL_POS
      type: string
    SupportedGADShapes:
      description: Indicates supported GAD shapes.
      enum:
      - POINT
      - POINT_UNCERTAINTY_CIRCLE
      - POINT_UNCERTAINTY_ELLIPSE
      - POLYGON
      - POINT_ALTITUDE
      - POINT_ALTITUDE_UNCERTAINTY
      - ELLIPSOID_ARC
      - LOCAL_2D_POINT_UNCERTAINTY_ELLIPSE
      - LOCAL_3D_POINT_UNCERTAINTY_ELLIPSOID
      - DISTANCE_DIRECTION
      - RELATIVE_2D_LOCATION_UNCERTAINTY_ELLIPSE
      - RELATIVE_3D_LOCATION_UNCERTAINTY_ELLIPSOID
      type: string
    ResponseTime:
      description: Indicates acceptable delay of location request.
      enum:
      - LOW_DELAY
      - DELAY_TOLERANT
      - NO_DELAY
      type: string
    PositioningMethod:
      description: Indicates supported positioning methods.
      enum:
      - CELLID
      - ECID
      - OTDOA
      - BAROMETRIC_PRESSURE
      - WLAN
      - BLUETOOTH
      - MBS
      - MOTION_SENSOR
      - DL_TDOA
      - DL_AOD
      - MULTI-RTT
      - NR_ECID
      - UL_TDOA
      - UL_AOA
      - NETWORK_SPECIFIC
      - SL_TDOA
      - SL_TOA
      - SL_AoA
      - SL_RT
      type: string
    PositioningMode:
      description: Indicates supported modes used for positioning method.
      enum:
      - UE_BASED
      - UE_ASSISTED
      - CONVENTIONAL
      type: string
    GnssId:
      description: Global Navigation Satellite System (GNSS) ID.
      enum:
      - GPS
      - GALILEO
      - SBAS
      - MODERNIZED_GPS
      - QZSS
      - GLONASS
      - BDS
      - NAVIC
      type: string
    Usage:
      description: Indicates usage made of the location measurement.
      enum:
      - UNSUCCESS
      - SUCCESS_RESULTS_NOT_USED
      - SUCCESS_RESULTS_USED_TO_VERIFY_LOCATION
      - SUCCESS_RESULTS_USED_TO_GENERATE_LOCATION
      - SUCCESS_METHOD_NOT_DETERMINED
      type: string
    LcsPriority:
      description: Indicates priority of the LCS client.
      enum:
      - HIGHEST_PRIORITY
      - NORMAL_PRIORITY
      type: string
    VelocityRequested:
      description: Indicates velocity requirement.
      enum:
      - VELOCITY_IS_NOT_REQUESTED
      - VELOCITY_IS_REQUESTED
      type: string
    AccuracyFulfilmentIndicator:
      description: Indicates fulfilment of requested accuracy.
      enum:
      - REQUESTED_ACCURACY_FULFILLED
      - REQUESTED_ACCURACY_NOT_FULFILLED
      type: string
    VerticalDirection:
      description: Indicates direction of vertical speed.
      enum:
      - UPWARD
      - DOWNWARD
      type: string
    LdrType:
      description: Indicates LDR types.
      enum:
      - UE_AVAILABLE
      - PERIODIC
      - ENTERING_INTO_AREA
      - LEAVING_FROM_AREA
      - BEING_INSIDE_AREA
      - MOTION
      type: string
    ReportingAreaType:
      description: Indicates type of event reporting area.
      enum:
      - EPS_TRACKING_AREA_IDENTITY
      - E-UTRAN_CELL_GLOBAL_IDENTIFICATION
      - 5GS_TRACKING_AREA_IDENTITY
      - NR_CELL_GLOBAL_IDENTITY
      type: string
    OccurrenceInfo:
      description: Specifies occurrence of event reporting.
      enum:
      - ONE_TIME_EVENT
      - MULTIPLE_TIME_EVENT
      type: string
    ReportingAccessType:
      description: Specifies access types of event reporting.
      enum:
      - NR
      - EUTRA_CONNECTED_TO_5GC
      - NON_3GPP_CONNECTED_TO_5GC
      - NR_LEO
      - NR_MEO
      - NR_GEO
      - NR_OTHER_SAT
      - EUTRA_CONNECTED_TO_EPC
      type: string
    EventClass:
      description: Specifies event classes.
      enum:
      - SUPPLEMENTARY_SERVICES
      type: string
    ReportedEventType:
      description: Specifies type of event reporting.
      enum:
      - PERIODIC_EVENT
      - ENTERING_AREA_EVENT
      - LEAVING_AREA_EVENT
      - BEING_INSIDE_AREA_EVENT
      - MOTION_EVENT
      - MAXIMUM_INTERVAL_EXPIRATION_EVENT
      - LOCATION_CANCELLATION_EVENT
      - INTERMEDIATE_EVENT
      - DIRECT_REPORT_EVENT
      - CUMULATIVE_EVENT_REPORT
      type: string
    TerminationCauseLmf:
      description: Specifies causes of event reporting termination.
      enum:
      - TERMINATION_BY_UE
      - TERMINATION_BY_NETWORK
      - NORMAL_TERMINATION
      type: string
    LcsQosClass:
      description: Specifies LCS QoS class.
      enum:
      - BEST_EFFORT
      - ASSURED
      - MULTIPLE_QOS
      type: string
    UeLocationServiceInd:
      description: Specifies location service types requested by UE.
      enum:
      - LOCATION_ESTIMATE
      - LOCATION_ASSISTANCE_DATA
      type: string
    IndoorOutdoorInd:
      description: Specifies UE location indoor or outdoor.
      enum:
      - INDOOR
      - OUTDOOR
      type: string
    FixType:
      description: Specifies the positioning fix type.
      enum:
      - CARRIER_PHASE_FLOAT
      - CARRIER_PHASE_FIX
      type: string
    LosNlosMeasureInd:
      description: Specifies LOS measurement or NLOS measurement.
      enum:
      - LOS
      - NLOS
      type: string
    UpConnectionStatus:
      description: UP Connection Status.
      enum:
      - ESTABLISHED
      - RELEASED
      - MOVE
      type: string
    RangingSlResult:
      description: Specifies the type of result requested for ranging and sidelink
        positioning.
      enum:
      - ABSOLUTE_LOCATION
      - RELATIVE_LOCATION
      - RANGING_DIRECTION
      - RANGING
      - DIRECTION
      - VELOCITY
      - RELATIVE_VELOCITY
      type: string
    RelatedUEType:
      description: Specifies the different roles of UE for ranging and sidelink positioning
        service.
      enum:
      - LOCATED_UE
      - REFERENCE_UE
      type: string
    LcsUpConnectionInd:
      description: LCS UP Connection Indication.
      enum:
      - TERMINATION
      - SETUP
      type: string
    UeUpPositioningCapabilities:
      description: User plane positioning capabilities supported by the UE.
      enum:
      - LCS-UPP
      - SUPL
      type: string
    RedirectResponse:
      description: |
        The response shall include a Location header field containing a different URI (pointing to a different URI of an other service instance), or the same URI if a request is redirected to the same target resource via a different SCP.
      example:
        targetSepp: null
        cause: cause
        targetScp: null
      properties:
        cause:
          type: string
        targetScp:
          $ref: "#/components/schemas/Uri"
        targetSepp:
          $ref: "#/components/schemas/Uri"
      type: object
    Uri:
      description: String providing an URI formatted according to RFC 3986.
      type: string
    ProblemDetails:
      description: Provides additional information in an error response.
      properties:
        type:
          $ref: "#/components/schemas/Uri"
        title:
          type: string
        status:
          type: integer
        detail:
          description: A human-readable explanation specific to this occurrence of
            the problem.
          type: string
        instance:
          $ref: "#/components/schemas/Uri"
        cause:
          description: |
            A machine-readable application error cause specific to this occurrence of the problem. This IE should be present and provide application-related error information, if available.
          type: string
        invalidParams:
          items:
            $ref: "#/components/schemas/InvalidParam"
          minItems: 1
          type: array
        supportedFeatures:
          $ref: "#/components/schemas/SupportedFeatures"
        accessTokenError:
          $ref: "#/components/schemas/AccessTokenErr"
        accessTokenRequest:
          $ref: "#/components/schemas/AccessTokenReq"
        nrfId:
          $ref: "#/components/schemas/Fqdn"
        supportedApiVersions:
          items:
            type: string
          minItems: 1
          type: array
        noProfileMatchInfo:
          $ref: "#/components/schemas/NoProfileMatchInfo"
      type: object
    InvalidParam:
      description: It contains an invalid parameter and a related description.
      properties:
        param:
          description: |
            If the invalid parameter is an attribute in a JSON body, this IE shall contain the attribute's name and shall be encoded as a JSON Pointer. If the invalid parameter is an HTTP header, this IE shall be formatted as the concatenation of the string "header " plus the name of such header. If the invalid parameter is a query parameter, this IE shall be formatted as the concatenation of the string "query " plus the name of such query parameter. If the invalid parameter is a variable part in the path of a resource URI, this IE shall contain the name of the variable, including the symbols "{" and "}" used in OpenAPI specification as the notation to represent variable path segments.
          type: string
        reason:
          description: |
            A human-readable reason, e.g. "must be a positive integer". In cases involving failed operations in a PATCH request, the reason string should identify the operation that failed using the operation's array index to assist in correlation of the invalid parameter with the failed operation, e.g." Replacement value invalid for attribute (failed operation index= 4)"
          type: string
      required:
      - param
      type: object
    SupportedFeatures:
      description: |
        A string used to indicate the features supported by an API that is used as defined in clause 6.6 in 3GPP TS 29.500. The string shall contain a bitmask indicating supported features in hexadecimal representation Each character in the string shall take a value of "0" to "9", "a" to "f" or "A" to "F" and shall represent the support of 4 features as described in table 5.2.2-3. The most significant character representing the highest-numbered features shall  appear first in the string, and the character representing features 1 to 4 shall appear last  in the string. The list of features and their numbering (starting with 1) are defined  separately for each API. If the string contains a lower number of characters than there are  defined features for an API, all features that would be represented by characters that are not  present in the string are not supported.
      pattern: "^[A-Fa-f0-9]*$"
      type: string
    Fqdn:
      description: Fully Qualified Domain Name
      maxLength: 253
      minLength: 4
      pattern: "^([0-9A-Za-z]([-0-9A-Za-z]{0,61}[0-9A-Za-z])?\\.)+[A-Za-z]{2,63}\\\
        .?$"
      type: string
    NfInstanceId:
      description: |
        String uniquely identifying a NF instance. The format of the NF Instance ID shall be a Universally Unique Identifier (UUID) version 4, as described in IETF RFC 4122.
      format: uuid
      type: string
    Supi:
      description: |
        String identifying a Supi that shall contain either an IMSI, a network specific identifier,
        a Global Cable Identifier (GCI) or a Global Line Identifier (GLI) as specified in clause
        2.2A of 3GPP TS 23.003. It shall be formatted as follows
         - for an IMSI "imsi-<imsi>", where <imsi> shall be formatted according to clause 2.2
           of 3GPP TS 23.003 that describes an IMSI.
         - for a network specific identifier "nai-<nai>, where <nai> shall be formatted
           according to clause 28.7.2 of 3GPP TS 23.003 that describes an NAI.
         - for a GCI "gci-<gci>", where <gci> shall be formatted according to clause 28.15.2
           of 3GPP TS 23.003.
         - for a GLI "gli-<gli>", where <gli> shall be formatted according to clause 28.16.2 of
           3GPP TS 23.003.To enable that the value is used as part of an URI, the string shall
           only contain characters allowed according to the "lower-with-hyphen" naming convention
           defined in 3GPP TS 29.501.
      pattern: "^(imsi-[0-9]{5,15}|nai-.+|gci-.+|gli-.+|.+)$"
      type: string
    Pei:
      description: |
        String representing a Permanent Equipment Identifier that may contain - an IMEI or IMEISV, as  specified in clause 6.2 of 3GPP TS 23.003; a MAC address for a 5G-RG or FN-RG via wireline  access, with an indication that this address cannot be trusted for regulatory purpose if this  address cannot be used as an Equipment Identifier of the FN-RG, as specified in clause 4.7.7  of 3GPP TS23.316. Examples are imei-012345678901234 or imeisv-0123456789012345.
      pattern: "^(imei-[0-9]{15}|imeisv-[0-9]{16}|mac((-[0-9a-fA-F]{2}){6})(-untrusted)?|eui((-[0-9a-fA-F]{2}){8})|.+)$"
      type: string
    Gpsi:
      description: |
        String identifying a Gpsi shall contain either an External Id or an MSISDN. It shall be formatted as follows -External Identifier= "extid-'extid', where 'extid' shall be formatted according to clause 19.7.2 of 3GPP TS 23.003 that describes an External Identifier.
      pattern: "^(msisdn-[0-9]{5,15}|extid-[^@]+@[^@]+|.+)$"
      type: string
    Ecgi:
      description: "Contains the ECGI (E-UTRAN Cell Global Identity), as described\
        \ in 3GPP 23.003"
      example:
        eutraCellId: null
        nid: null
        plmnId:
          mnc: null
          mcc: null
      properties:
        plmnId:
          $ref: "#/components/schemas/PlmnId"
        eutraCellId:
          $ref: "#/components/schemas/EutraCellId"
        nid:
          $ref: "#/components/schemas/Nid"
      required:
      - eutraCellId
      - plmnId
      type: object
    PlmnId:
      description: |
        When PlmnId needs to be converted to string (e.g. when used in maps as key), the string shall be composed of three digits "mcc" followed by "-" and two or three digits "mnc".
      example:
        mnc: null
        mcc: null
      properties:
        mcc:
          $ref: "#/components/schemas/Mcc"
        mnc:
          $ref: "#/components/schemas/Mnc"
      required:
      - mcc
      - mnc
      type: object
    Mcc:
      description: |
        Mobile Country Code part of the PLMN, comprising 3 digits, as defined in clause 9.3.3.5 of 3GPP TS 38.413.
      pattern: "^\\d{3}$"
      type: string
    Mnc:
      description: |
        Mobile Network Code part of the PLMN, comprising 2 or 3 digits, as defined in clause 9.3.3.5 of 3GPP TS 38.413.
      pattern: "^\\d{2,3}$"
      type: string
    EutraCellId:
      description: |
        28-bit string identifying an E-UTRA Cell Id as specified in clause 9.3.1.9 of 3GPP TS 38.413, in hexadecimal representation. Each character in the string shall take a value of "0" to "9", "a" to "f" or "A" to "F" and shall represent 4 bits. The most significant character representing the 4 most significant bits of the Cell Id shall appear first in the string, and the character representing the 4 least significant bit of the Cell Id shall appear last in the string.
      pattern: "^[A-Fa-f0-9]{7}$"
      type: string
    Nid:
      description: |
        This represents the Network Identifier, which together with a PLMN ID is used to identify an SNPN (see 3GPP TS 23.003 and 3GPP TS 23.501 clause 5.30.2.1).
      pattern: "^[A-Fa-f0-9]{11}$"
      type: string
    Ncgi:
      description: "Contains the NCGI (NR Cell Global Identity), as described in 3GPP\
        \ 23.003"
      example:
        nid: null
        plmnId:
          mnc: null
          mcc: null
        nrCellId: null
      properties:
        plmnId:
          $ref: "#/components/schemas/PlmnId"
        nrCellId:
          $ref: "#/components/schemas/NrCellId"
        nid:
          $ref: "#/components/schemas/Nid"
      required:
      - nrCellId
      - plmnId
      type: object
    NrCellId:
      description: |
        36-bit string identifying an NR Cell Id as specified in clause 9.3.1.7 of 3GPP TS 38.413, in hexadecimal representation. Each character in the string shall take a value of "0" to "9",  "a" to "f" or "A" to "F" and shall represent 4 bits. The most significant character representing the 4 most significant bits of the Cell Id shall appear first in the string, and  the character representing the 4 least significant bit of the Cell Id shall appear last in the  string.
      pattern: "^[A-Fa-f0-9]{9}$"
      type: string
    LcsBroadcastAssistanceTypesData:
      example:
        locationAssistanceType: null
      properties:
        locationAssistanceType:
          $ref: "#/components/schemas/Binary"
      required:
      - locationAssistanceType
      type: object
    RefToBinaryData:
      description: This parameter provides information about the referenced binary
        body data.
      example:
        contentId: contentId
      properties:
        contentId:
          description: |
            This IE shall contain the value of the Content-ID header of the referenced binary body part.
          type: string
      required:
      - contentId
      type: object
    TnapId:
      description: Contain the TNAP Identifier see clause5.6.2 of 3GPP TS 23.501.
      example:
        bssId: bssId
        civicAddress: null
        ssId: ssId
      properties:
        ssId:
          description: |
            This IE shall be present if the UE is accessing the 5GC via a trusted WLAN access network.When present, it shall contain the SSID of the access point to which the UE is attached, that is received over NGAP,  see IEEE Std 802.11-2012.
          type: string
        bssId:
          description: |
            When present, it shall contain the BSSID of the access point to which the UE is attached, that is received over NGAP, see IEEE Std 802.11-2012.
          type: string
        civicAddress:
          $ref: "#/components/schemas/Bytes"
      type: object
    Bytes:
      description: string with format 'bytes' as defined in OpenAPI
      format: byte
      type: string
    TwapId:
      description: |
        Contain the TWAP Identifier as defined in clause 4.2.8.5.3 of 3GPP TS 23.501 or the WLAN location information as defined in clause 4.5.7.2.8 of 3GPP TS 23.402.
      example:
        bssId: bssId
        civicAddress: null
        ssId: ssId
      properties:
        ssId:
          description: |
            This IE shall contain the SSID of the access point to which the UE is attached, that is received over NGAP, see IEEE Std 802.11-2012.
          type: string
        bssId:
          description: |
            When present, it shall contain the BSSID of the access point to which the UE is attached, for trusted WLAN access, see IEEE Std 802.11-2012.
          type: string
        civicAddress:
          $ref: "#/components/schemas/Bytes"
      required:
      - ssId
      type: object
    DateTime:
      description: string with format 'date-time' as defined in OpenAPI.
      format: date-time
      type: string
    DurationSec:
      description: indicating a time in seconds.
      type: integer
    LpHapType:
      description: Type of Low Power and/or High Accuracy Positioning
      enum:
      - LOW_POW_HIGH_ACCU_POS
      type: string
    ReportingInd:
      description: |
        Indicates whether the UE is allowed to generate and send the event report inside or outside the event report allowed(expected) area
      enum:
      - INSIDE_REPORTING
      - OUTSIDE_REPORTING
      type: string
    IntegrityRequirements:
      description: integrity requirements.
      example:
        timeToAlert: null
        targetIntegrityRisk: null
        alertLimit:
          horizontalProtectionLevel: null
          verticalProtectionLevel: null
      properties:
        timeToAlert:
          $ref: "#/components/schemas/TimeToAlert"
        targetIntegrityRisk:
          $ref: "#/components/schemas/TargetIntegrityRisk"
        alertLimit:
          $ref: "#/components/schemas/AlertLimit"
      type: object
    TimeToAlert:
      description: Contains the time-to-alert
      maximum: 300
      minimum: 1
      type: integer
    TargetIntegrityRisk:
      description: Contains the target integrity risk
      maximum: 90
      minimum: 10
      type: integer
    AlertLimit:
      description: Alert Limit.
      example:
        horizontalProtectionLevel: null
        verticalProtectionLevel: null
      properties:
        horizontalProtectionLevel:
          $ref: "#/components/schemas/HorizontalProtectionLevel"
        verticalProtectionLevel:
          $ref: "#/components/schemas/VerticalProtectionLevel"
      required:
      - horizontalProtectionLevel
      type: object
    HorizontalProtectionLevel:
      description: Contains the Horizontal Protection Level
      maximum: 50000
      minimum: 0
      type: integer
    VerticalProtectionLevel:
      description: Contains the Vertical Protection Level
      maximum: 50000
      minimum: 0
      type: integer
    UpLocRepAddrAfRm:
      anyOf: []
      description: Represents the user plane addressing information.
      example:
        fqdn: null
        ipv6Addrs:
        - 2001:db8:85a3::8a2e:370:7334
        - 2001:db8:85a3::8a2e:370:7334
        ipv4Addrs:
        - 198.51.100.1
        - 198.51.100.1
      nullable: true
      properties:
        ipv4Addrs:
          items:
            $ref: "#/components/schemas/Ipv4Addr"
          minItems: 1
          type: array
        ipv6Addrs:
          items:
            $ref: "#/components/schemas/Ipv6Addr"
          minItems: 1
          type: array
        fqdn:
          $ref: "#/components/schemas/Fqdn"
      type: object
    UpCumEvtRptCriteria:
      description: Criteria for sending cumulative events reports over control plane
      example:
        evtRptCountCriteria: 5
        evtRptTimeCriteria: 1
      properties:
        evtRptTimeCriteria:
          type: integer
        evtRptCountCriteria:
          type: integer
      type: object
    ApplicationlayerId:
      description: |
        String identifying an UE with application layer ID. The format of the application layer ID parameter is same as the Application layer ID defined in clause 11.3.4 of 3GPP TS 24.554.
      type: string
    Float:
      description: string with format 'float' as defined in OpenAPI.
      format: float
      type: number
    Tai:
      description: Contains the tracking area identity as described in 3GPP 23.003
      example:
        tac: null
        nid: null
        plmnId:
          mnc: null
          mcc: null
      properties:
        plmnId:
          $ref: "#/components/schemas/PlmnId"
        tac:
          $ref: "#/components/schemas/Tac"
        nid:
          $ref: "#/components/schemas/Nid"
      required:
      - plmnId
      - tac
      type: object
    Tac:
      description: |
        2 or 3-octet string identifying a tracking area code as specified in clause 9.3.3.10 of 3GPP TS 38.413, in hexadecimal representation. Each character in the string shall take a value of "0" to "9", "a" to "f" or "A" to "F" and shall represent 4 bits. The most significant character representing the 4 most significant bits of the TAC shall appear first in the string, and the character representing the 4 least significant bit of the TAC shall appear last in the string.
      pattern: "(^[A-Fa-f0-9]{4}$)|(^[A-Fa-f0-9]{6}$)"
      type: string
    Guami:
      description: "Globally Unique AMF Identifier constructed out of PLMN, Network\
        \ and AMF identity."
      example:
        plmnId:
          mnc: null
          nid: null
          mcc: null
        amfId: null
      properties:
        plmnId:
          $ref: "#/components/schemas/PlmnIdNid"
        amfId:
          $ref: "#/components/schemas/AmfId"
      required:
      - amfId
      - plmnId
      type: object
    PlmnIdNid:
      description: |
        Contains the serving core network operator PLMN ID and, for an SNPN, the NID that together with the PLMN ID identifies the SNPN.
      example:
        mnc: null
        nid: null
        mcc: null
      properties:
        mcc:
          $ref: "#/components/schemas/Mcc"
        mnc:
          $ref: "#/components/schemas/Mnc"
        nid:
          $ref: "#/components/schemas/Nid"
      required:
      - mcc
      - mnc
      type: object
    AmfId:
      description: |
        String identifying the AMF ID composed of AMF Region ID (8 bits), AMF Set ID (10 bits) and AMF  Pointer (6 bits) as specified in clause 2.10.1 of 3GPP TS 23.003. It is encoded as a string of  6 hexadecimal characters (i.e., 24 bits).
      pattern: "^[A-Fa-f0-9]{6}$"
      type: string
    AccessType:
      description: Indicates whether the access is  via 3GPP or via non-3GPP.
      enum:
      - 3GPP_ACCESS
      - NON_3GPP_ACCESS
      type: string
    CmState:
      description: Describes the connection management state of a UE
      enum:
      - IDLE
      - CONNECTED
      type: string
    AccessTokenErr:
      description: Error returned in the access token response message
      properties:
        error:
          enum:
          - invalid_request
          - invalid_client
          - invalid_grant
          - unauthorized_client
          - unsupported_grant_type
          - invalid_scope
          type: string
        error_description:
          type: string
        error_uri:
          type: string
      required:
      - error
      type: object
    AccessTokenReq:
      description: Contains information related to the access token request
      properties:
        grant_type:
          enum:
          - client_credentials
          type: string
        nfInstanceId:
          $ref: "#/components/schemas/NfInstanceId"
        nfType:
          $ref: "#/components/schemas/NFType"
        targetNfType:
          $ref: "#/components/schemas/NFType"
        scope:
          pattern: "^([a-zA-Z0-9_:-]+)( [a-zA-Z0-9_:-]+)*$"
          type: string
        targetNfInstanceId:
          $ref: "#/components/schemas/NfInstanceId"
        requesterPlmn:
          $ref: "#/components/schemas/PlmnId"
        requesterPlmnList:
          items:
            $ref: "#/components/schemas/PlmnId"
          minItems: 2
          type: array
        requesterSnssaiList:
          items:
            $ref: "#/components/schemas/Snssai"
          minItems: 1
          type: array
        requesterFqdn:
          $ref: "#/components/schemas/Fqdn"
        requesterSnpnList:
          items:
            $ref: "#/components/schemas/PlmnIdNid"
          minItems: 1
          type: array
        targetPlmn:
          $ref: "#/components/schemas/PlmnId"
        targetSnpn:
          $ref: "#/components/schemas/PlmnIdNid"
        targetSnssaiList:
          items:
            $ref: "#/components/schemas/Snssai"
          minItems: 1
          type: array
        targetNsiList:
          items:
            type: string
          minItems: 1
          type: array
        targetNfSetId:
          $ref: "#/components/schemas/NfSetId"
        targetNfServiceSetId:
          $ref: "#/components/schemas/NfServiceSetId"
        hnrfAccessTokenUri:
          $ref: "#/components/schemas/Uri"
        sourceNfInstanceId:
          $ref: "#/components/schemas/NfInstanceId"
      required:
      - grant_type
      - nfInstanceId
      - scope
      type: object
    NoProfileMatchInfo:
      description: Provides the reason for not finding NF matching the search criteria
      properties:
        reason:
          $ref: "#/components/schemas/NoProfileMatchReason"
        queryParamCombinationList:
          items:
            $ref: "#/components/schemas/QueryParamCombination"
          minItems: 1
          type: array
      required:
      - reason
      type: object
    NoProfileMatchReason:
      description: No Profile Match Reason
      enum:
      - REQUESTER_PLMN_NOT_ALLOWED
      - TARGET_NF_SUSPENDED
      - TARGET_NF_UNDISCOVERABLE
      - QUERY_PARAMS_COMBINATION_NO_MATCH
      - TARGET_NF_TYPE_NOT_SUPPORTED
      - UNSPECIFIED
      type: string
    QueryParamCombination:
      description: Contains a list of Query Parameters
      properties:
        queryParams:
          items:
            $ref: "#/components/schemas/QueryParameter"
          minItems: 1
          type: array
      required:
      - queryParams
      type: object
    QueryParameter:
      description: Contains the name and value of a query parameter
      properties:
        name:
          type: string
        value:
          type: string
      required:
      - name
      - value
      type: object
    Binary:
      description: string with format 'binary' as defined in OpenAPI.
      format: binary
      type: string
    Ipv4Addr:
      description: |
        String identifying a IPv4 address formatted in the 'dotted decimal' notation as defined in RFC 1166.
      example: 198.51.100.1
      pattern: "^(([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])\\.){3}([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])$"
      type: string
    Ipv6Addr:
      description: |
        String identifying an IPv6 address formatted according to clause 4 of RFC5952. The mixed IPv4 IPv6 notation according to clause 5 of RFC5952 shall not be used.
      example: 2001:db8:85a3::8a2e:370:7334
      pattern: "^(((:|(0?|([1-9a-f][0-9a-f]{0,3}))):)((0?|([1-9a-f][0-9a-f]{0,3})):){0,6}(:|(0?|([1-9a-f][0-9a-f]{0,3}))))|((([^:]+:){7}([^:]+))|((([^:]+:)*[^:]+)?::(([^:]+:)*[^:]+)?)))$"
      type: string
    NFType:
      description: NF types known to NRF
      enum:
      - NRF
      - UDM
      - AMF
      - SMF
      - AUSF
      - NEF
      - PCF
      - SMSF
      - NSSF
      - UDR
      - LMF
      - GMLC
      - 5G_EIR
      - SEPP
      - UPF
      - N3IWF
      - AF
      - UDSF
      - BSF
      - CHF
      - NWDAF
      - PCSCF
      - CBCF
      - HSS
      - UCMF
      - SOR_AF
      - SPAF
      - MME
      - SCSAS
      - SCEF
      - SCP
      - NSSAAF
      - ICSCF
      - SCSCF
      - DRA
      - IMS_AS
      - AANF
      - 5G_DDNMF
      - NSACF
      - MFAF
      - EASDF
      - DCCF
      - MB_SMF
      - TSCTSF
      - ADRF
      - GBA_BSF
      - CEF
      - MB_UPF
      - NSWOF
      - PKMF
      - MNPF
      - SMS_GMSC
      - SMS_IWMSC
      - MBSF
      - MBSTF
      - PANF
      - IP_SM_GW
      - SMS_ROUTER
      - DCSF
      - MRF
      - MRFP
      - MF
      - SLPKMF
      - RH
      type: string
    Snssai:
      description: |
        When Snssai needs to be converted to string (e.g. when used in maps as key), the string shall be composed of one to three digits "sst" optionally followed by "-" and 6 hexadecimal digits "sd".
      properties:
        sst:
          description: |
            Unsigned integer, within the range 0 to 255, representing the Slice/Service Type. It indicates the expected Network Slice behaviour in terms of features and services. Values 0 to 127 correspond to the standardized SST range. Values 128 to 255 correspond to the Operator-specific range. See clause 28.4.2 of 3GPP TS 23.003. Standardized values are defined in clause 5.15.2.2 of 3GPP TS 23.501.
          maximum: 255
          minimum: 0
          type: integer
        sd:
          description: |
            3-octet string, representing the Slice Differentiator, in hexadecimal representation. Each character in the string shall take a value of "0" to "9", "a" to "f" or "A" to "F" and shall represent 4 bits. The most significant character representing the 4 most significant bits of the SD shall appear first in the string, and the character representing the 4 least significant bit of the SD shall appear last in the string. This is an optional parameter that complements the Slice/Service type(s) to allow to differentiate amongst multiple Network Slices of the same Slice/Service type. This IE shall be absent if no SD value is associated with the SST.
          pattern: "^[A-Fa-f0-9]{6}$"
          type: string
      required:
      - sst
      type: object
    NfSetId:
      description: |
        NF Set Identifier (see clause 28.12 of 3GPP TS 23.003), formatted as the following string "set<Set ID>.<nftype>set.5gc.mnc<MNC>.mcc<MCC>", or "set<SetID>.<NFType>set.5gc.nid<NID>.mnc<MNC>.mcc<MCC>" with <MCC> encoded as defined in clause 5.4.2 ("Mcc" data type definition) <MNC> encoding the Mobile Network Code part of the PLMN, comprising 3 digits.
          If there are only 2 significant digits in the MNC, one "0" digit shall be inserted
          at the left side to fill the 3 digits coding of MNC.  Pattern: '^[0-9]{3}$'
        <NFType> encoded as a value defined in Table 6.1.6.3.3-1 of 3GPP TS 29.510 but
          with lower case characters <Set ID> encoded as a string of characters consisting of
          alphabetic characters (A-Z and a-z), digits (0-9) and/or the hyphen (-) and that
          shall end with either an alphabetic character or a digit.
      type: string
    NfServiceSetId:
      description: |
        NF Service Set Identifier (see clause 28.12 of 3GPP TS 23.003) formatted as the following string "set<Set ID>.sn<Service Name>.nfi<NF Instance ID>.5gc.mnc<MNC>.mcc<MCC>", or "set<SetID>.sn<ServiceName>.nfi<NFInstanceID>.5gc.nid<NID>.mnc<MNC>.mcc<MCC>" with <MCC> encoded as defined in clause 5.4.2 ("Mcc" data type definition) <MNC> encoding the Mobile Network Code part of the PLMN, comprising 3 digits.
          If there are only 2 significant digits in the MNC, one "0" digit shall be inserted
          at the left side to fill the 3 digits coding of MNC.  Pattern: '^[0-9]{3}$'
        <NID> encoded as defined in clause 5.4.2 ("Nid" data type definition) <NFInstanceId> encoded as defined in clause 5.3.2 <ServiceName> encoded as defined in 3GPP TS 29.510 <Set ID> encoded as a string of characters consisting of alphabetic
          characters (A-Z and a-z), digits (0-9) and/or the hyphen (-) and that shall end
          with either an alphabetic character or a digit.
      type: string
    DetermineLocation_request:
      properties:
        jsonData:
          $ref: "#/components/schemas/InputData"
        binaryDataLppMessage:
          format: binary
          type: string
          x-multipart-content-type: application/vnd.3gpp.lpp
          x-multipart-ref: "{binaryDataLppMessage}"
        binaryDataLppMessageExt1:
          format: binary
          type: string
          x-multipart-content-type: application/vnd.3gpp.lpp
          x-multipart-ref: "{binaryDataLppMessageExt1}"
        binaryDataLppMessageExt2:
          format: binary
          type: string
          x-multipart-content-type: application/vnd.3gpp.lpp
          x-multipart-ref: "{binaryDataLppMessageExt2}"
      type: object
