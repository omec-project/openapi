    NotifyItem:
      description: Indicates changes on a resource.
      example:
        resourceId: null
        changes:
        - op: ADD
          path: path
          newValue: ""
          from: from
          origValue: ""
        - op: ADD
          path: path
          newValue: ""
          from: from
          origValue: ""
      properties:
        resourceId:
          $ref: "#/components/schemas/Uri"
        changes:
          items:
            $ref: "#/components/schemas/ChangeItem"
          minItems: 1
          type: array
      required:
      - changes
      - resourceId
      type: object
    ChangeItem:
      description: It contains data which need to be changed.
      example:
        op: ADD
        path: path
        newValue: ""
        from: from
        origValue: ""
      properties:
        op:
          $ref: "#/components/schemas/ChangeType"
        path:
          description: |
            contains a JSON pointer value (as defined in IETF RFC 6901) that references a target  location within the resource on which the change has been applied.
          type: string
        from:
          description: |
            indicates the path of the source JSON element (according to JSON Pointer syntax)  being moved or copied to the location indicated by the "path" attribute. It shall  be present if the "op" attribute is of value "MOVE".
          type: string
        origValue: {}
        newValue: {}
      required:
      - op
      - path
      type: object
    ChangeType:
      description: Indicates the type of change to be performed.
      enum:
      - ADD
      - MOVE
      - REMOVE
      - REPLACE
      type: string
    SorMac:
      description: MAC value for protecting SOR procedure (SoR-MAC-IAUSF and SoR-XMAC-IUE).
      pattern: "^[A-Fa-f0-9]{32}$"
      type: string
    UpuMac:
      description: MAC value for protecting UPU procedure (UPU-MAC-IAUSF and UPU-MAC-IUE).
      pattern: "^[A-Fa-f0-9]{32}$"
      type: string
    AckInd:
      description: Contains indication whether the acknowledgement from UE is needed.
      type: boolean
    CounterSor:
      description: CounterSoR.
      pattern: "^[A-Fa-f0-9]{4}$"
      type: string
    UpuData:
      description: "Contains UE parameters update data set (e.g., the updated Routing\
        \ ID Data or the Default configured NSSAI or the disaster roaming parameters)."
      example:
        routingId: null
        defaultConfNssai:
        - sd: sd
          sst: 20
        - sd: sd
          sst: 20
        drei: true
        secPacket: null
        aol: true
      properties:
        secPacket:
          $ref: "#/components/schemas/SecuredPacket_1"
        defaultConfNssai:
          items:
            $ref: "#/components/schemas/Snssai"
          minItems: 1
          type: array
        routingId:
          $ref: "#/components/schemas/RoutingId"
        drei:
          type: boolean
        aol:
          type: boolean
      type: object
    UpuAckInd:
      description: Contains the indication of whether the acknowledgement from UE
        is needed.
      type: boolean
    CounterUpu:
      description: CounterUPU.
      pattern: "^[A-Fa-f0-9]{4}$"
      type: string
    SteeringInfo:
      description: Contains a combination of one PLMN identity and zero or more access
        technologies.
      example:
        plmnId:
          mnc: null
          mcc: null
        accessTechList:
        - NR
        - NR
      properties:
        plmnId:
          $ref: "#/components/schemas/PlmnId"
        accessTechList:
          items:
            $ref: "#/components/schemas/AccessTech"
          minItems: 1
          type: array
      required:
      - plmnId
      type: object
