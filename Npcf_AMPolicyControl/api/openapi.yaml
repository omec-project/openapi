        plmnId:
          $ref: "#/components/schemas/PlmnId"
        lac:
          pattern: "^[A-Fa-f0-9]{4}$"
          type: string
        cellId:
          pattern: "^[A-Fa-f0-9]{4}$"
          type: string
      required:
      - cellId
      - lac
      - plmnId
      type: object
    ServiceAreaId:
      description: "Contains a Service Area Identifier as defined in 3GPP TS 23.003,\
        \ clause 12.5."
      example:
        sac: sac
        plmnId:
          mnc: null
          mcc: null
        lac: lac
      properties:
        plmnId:
          $ref: "#/components/schemas/PlmnId"
        lac:
          description: Location Area Code.
          pattern: "^[A-Fa-f0-9]{4}$"
          type: string
        sac:
          description: Service Area Code.
          pattern: "^[A-Fa-f0-9]{4}$"
          type: string
      required:
      - lac
      - plmnId
      - sac
      type: object
    LocationAreaId:
      description: "Contains a Location area identification as defined in 3GPP TS\
        \ 23.003, clause 4.1."
      example:
        plmnId:
          mnc: null
          mcc: null
        lac: lac
      properties:
        plmnId:
          $ref: "#/components/schemas/PlmnId"
        lac:
          description: Location Area Code.
          pattern: "^[A-Fa-f0-9]{4}$"
          type: string
      required:
      - lac
      - plmnId
      type: object
    RoutingAreaId:
      description: "Contains a Routing Area Identification as defined in 3GPP TS 23.003,\
        \ clause 4.2."
      example:
        rac: rac
        plmnId:
          mnc: null
          mcc: null
        lac: lac
      properties:
        plmnId:
          $ref: "#/components/schemas/PlmnId"
        lac:
          description: Location Area Code
          pattern: "^[A-Fa-f0-9]{4}$"
          type: string
        rac:
          description: Routing Area Code
          pattern: "^[A-Fa-f0-9]{2}$"
          type: string
      required:
      - lac
      - plmnId
      - rac
      type: object
    GeraLocation:
      description: "Exactly one of cgi, sai or lai shall be present."
      example:
        geographicalInformation: geographicalInformation
        ageOfLocationInformation: 18471
        cgi:
          plmnId:
            mnc: null
            mcc: null
          cellId: cellId
          lac: lac
        lai:
          plmnId:
            mnc: null
            mcc: null
          lac: lac
