          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResult"
          description: Expected response to a valid request
          headers:
            Cache-Control:
              description: "Cache-Control containing max-age, described in IETF RFC\
                \ 9111, 5.2"
              explode: false
              schema:
                type: string
              style: simple
            ETag:
              description: |
                Entity Tag containing a strong validator, described in IETF RFC 9110, 8.8.3
              explode: false
              schema:
                type: string
              style: simple
            Content-Encoding:
              description: "Content-Encoding, described in IETF RFC 9110"
              explode: false
              schema:
                type: string
              style: simple
          links:
            search:
              description: |
                The 'searchId' parameter returned in the response can be used as the 'searchId' parameter in the GET request to '/searches/{searchId}'
              operationId: RetrieveStoredSearch
              parameters:
                searchId: $response.body#/searchId
            completeSearch:
              description: |
                The 'searchId' parameter returned in the response can be used as the 'searchId' parameter in the GET request to '/searches/{searchId}/complete'
              operationId: RetrieveCompleteSearch
              parameters:
                searchId: $response.body#/searchId
        "307":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RedirectResponse"
          description: Temporary Redirect
          headers:
            Location:
              description: The URI pointing to the resource located on the redirect
                target NRF
              explode: false
              required: true
              schema:
                type: string
              style: simple
        "308":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RedirectResponse"
          description: Permanent Redirect
          headers:
            Location:
              description: The URI pointing to the resource located on the redirect
                target NRF
              explode: false
              required: true
              schema:
                type: string
              style: simple
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          description: Bad request
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          description: Unauthorized
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          description: Forbidden
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          description: Not Found
        "406":
          description: 406 Not Acceptable
        "411":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          description: Length Required
        "413":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          description: Content Too Large
        "415":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          description: Unsupported Media Type
        "429":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          description: Too Many Requests
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          description: Internal Server Error
        "501":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          description: Not Implemented
        "503":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          description: Service Unavailable
        default:
          description: Generic Error
