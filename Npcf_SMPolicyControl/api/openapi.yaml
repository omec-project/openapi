      minimum: 0
      type: integer
    EpsRanNasRelCause:
      description: Defines the EPS RAN/NAS release cause.
      type: string
    PacketFilterContent:
      description: Defines a packet filter for an IP flow.
      type: string
    FlowDescription:
      description: Defines a packet filter for an IP flow.
      type: string
    TsnPortNumber:
      description: "Unsigned Integer, i.e. only value 0 and integers above 0 are permissible."
      minimum: 0
