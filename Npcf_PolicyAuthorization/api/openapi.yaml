        "5gSmCause":
          $ref: "#/components/schemas/fiveGSmCause"
        epsCause:
          $ref: "#/components/schemas/EpsRanNasRelCause"
      type: object
    fiveGSmCause:
      $ref: "#/components/schemas/Uinteger"
    EpsRanNasRelCause:
      description: Defines the EPS RAN/NAS release cause.
      type: string
    RatType:
      description: Indicates the radio access used.
      enum:
      - NR
      - EUTRA
      - WLAN
      - VIRTUAL
      - NBIOT
      - WIRELINE
      - WIRELINE_CABLE
      - WIRELINE_BBF
      - LTE-M
      - NR_U
      - EUTRA_U
      - TRUSTED_N3GA
      - TRUSTED_WLAN
      - UTRA
      - GERA
      - NR_LEO
      - NR_MEO
      - NR_GEO
      - NR_OTHER_SAT
      - NR_REDCAP
      - WB_E_UTRAN_LEO
      - WB_E_UTRAN_MEO
      - WB_E_UTRAN_GEO
      - WB_E_UTRAN_OTHERSAT
      - NB_IOT_LEO
      - NB_IOT_MEO
      - NB_IOT_GEO
      - NB_IOT_OTHERSAT
      - LTE_M_LEO
      - LTE_M_MEO
      - LTE_M_GEO
      - LTE_M_OTHERSAT
      - NR_EREDCAP
      type: string
    SatelliteBackhaulCategory:
      description: Indicates the satellite backhaul used.
      enum:
      - GEO
      - MEO
      - LEO
      - OTHER_SAT
      - DYNAMIC_GEO
      - DYNAMIC_MEO
      - DYNAMIC_LEO
      - DYNAMIC_OTHER_SAT
      - NON_SATELLITE
      type: string
    UserLocation:
