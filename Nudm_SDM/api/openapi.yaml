      - "5120"
      - "10240"
      - "60000"
      type: string
    MeasurementPeriodLteMdt:
      description: |
        The enumeration MeasurementPeriodLteMdt defines Measurement period LTE for MDT in the trace.  See 3GPP TS 32.422 for further description of the values. It shall comply with the provisions defined in table 5.6.3.16-1.
      enum:
      - "1024"
      - "1280"
      - "2048"
      - "2560"
      - "5120"
      - "10240"
      - "60000"
      type: string
    MbsfnArea:
      description: Contains an MBSFN area information.
      example:
        carrierFrequency: 185109
        mbsfnAreaId: 58
      properties:
        mbsfnAreaId:
          description: This IE shall contain the MBSFN Area ID.
          maximum: 255
          minimum: 0
          type: integer
        carrierFrequency:
          description: "When present, this IE shall contain the Carrier Frequency\
            \ (EARFCN)."
          maximum: 262143
          minimum: 0
          type: integer
      type: object
    InterFreqTargetInfo:
      description: Indicates the Inter Frequency Target information.
      example:
        dlCarrierFreq: null
        cellIdList:
        - null
        - null
        - null
        - null
        - null
      properties:
        dlCarrierFreq:
          $ref: "#/components/schemas/ArfcnValueNR"
        cellIdList:
          description: |
            When present, this IE shall contain a list of the physical cell identities where the UE is requested to perform measurement logging for the indicated frequency.
          items:
            $ref: "#/components/schemas/PhysCellId"
          maxItems: 32
          minItems: 1
          type: array
      required:
      - dlCarrierFreq
      type: object
    ArfcnValueNR:
      description: |
        Integer value indicating the ARFCN applicable for a downlink, uplink or bi-directional (TDD) NR global frequency raster, as definition of "ARFCN-ValueNR" IE in clause 6.3.2 of 3GPP TS 38.331.
      maximum: 3279165
      minimum: 0
      type: integer
    PhysCellId:
      description: |
        Integer value identifying the physical cell identity (PCI), as definition of "PhysCellId" IE  in clause 6.3.2 of 3GPP TS 38.331.
      maximum: 1007
      minimum: 0
      type: integer
    StnSr:
      description: String representing the STN-SR as defined in clause 18.6 of 3GPP
        TS 23.003.
      type: string
    CMsisdn:
      description: String representing the C-MSISDN as defined in clause 18.7 of 3GPP
        TS 23.003.
      pattern: "^[0-9]{5,15}$"
      type: string
    RgWirelineCharacteristics:
      $ref: "#/components/schemas/Bytes"
    Bytes:
      description: string with format 'bytes' as defined in OpenAPI
      format: byte
      type: string
    WirelineArea:
      description: |
        One and only one of the "globLineIds", "hfcNIds", "areaCodeB",d "areaCodeC" and  combGciAndHfcNIds attributes        shall be included in a WirelineArea data structure
      example:
        combGciAndHfcNIds:
        - hfcNId: null
          globalCableId: null
        - hfcNId: null
          globalCableId: null
        globalLineIds:
        - null
        - null
        hfcNIds:
        - null
        - null
        areaCodeC: null
        areaCodeB: null
      properties:
        globalLineIds:
          items:
            $ref: "#/components/schemas/Gli"
          minItems: 1
          type: array
        hfcNIds:
          items:
            $ref: "#/components/schemas/HfcNId"
          minItems: 1
          type: array
        areaCodeB:
          $ref: "#/components/schemas/AreaCode"
        areaCodeC:
          $ref: "#/components/schemas/AreaCode"
        combGciAndHfcNIds:
          items:
            $ref: "#/components/schemas/CombGciAndHfcNIds"
          minItems: 1
          type: array
      type: object
    Gli:
      $ref: "#/components/schemas/Bytes"
    HfcNId:
      description: |
        This IE represents the identifier of the HFC node Id as specified in CableLabs WR-TR-5WWC-ARCH. It is provisioned by the wireline operator as part of wireline operations and may contain up to six characters.
      maxLength: 6
      type: string
    CombGciAndHfcNIds:
      example:
        hfcNId: null
        globalCableId: null
      properties:
        globalCableId:
          $ref: "#/components/schemas/Gci"
        hfcNId:
          $ref: "#/components/schemas/HfcNId"
      type: object
    Gci:
      description: |
        Global Cable Identifier uniquely identifying the connection between the 5G-CRG or FN-CRG to the 5GS. See clause 28.15.4 of 3GPP TS 23.003. This shall be encoded as a string per clause 28.15.4 of 3GPP TS 23.003, and compliant with the syntax specified  in clause 2.2  of IETF RFC 7542 for the username part of a NAI. The GCI value is specified in CableLabs WR-TR-5WWC-ARCH.
      type: string
    WirelineServiceAreaRestriction:
      description: |
        The "restrictionType" attribute and the "areas" attribute shall be either both present or absent.  The empty array of areas is used when service is allowed/restricted nowhere.
      example:
        restrictionType: null
        areas:
        - combGciAndHfcNIds:
          - hfcNId: null
            globalCableId: null
          - hfcNId: null
            globalCableId: null
          globalLineIds:
          - null
          - null
          hfcNIds:
          - null
          - null
          areaCodeC: null
          areaCodeB: null
        - combGciAndHfcNIds:
          - hfcNId: null
            globalCableId: null
          - hfcNId: null
            globalCableId: null
          globalLineIds:
          - null
          - null
          hfcNIds:
          - null
          - null
          areaCodeC: null
          areaCodeB: null
      properties:
        restrictionType:
          $ref: "#/components/schemas/RestrictionType"
        areas:
          items:
            $ref: "#/components/schemas/WirelineArea"
          type: array
      type: object
    RoamingRestrictions:
      description: |
        Indicates if access is allowed to a given serving network, e.g. a PLMN (MCC, MNC) or an  SNPN (MCC, MNC, NID).
      example:
        accessAllowed: true
      properties:
        accessAllowed:
          type: boolean
      type: object
    QmcConfigInfo:
      description: "It contains the configuration information for signaling-based\
        \ activation of the  Quality of Experience (QoE) Measurements Collection (QMC)\
        \ functionality. \n"
      example:
        serviceType: DASH
        availableRanVisibleQoeMetrics:
        - APPLICATION_LAYER_BUFFER_LEVEL_LIST
        - APPLICATION_LAYER_BUFFER_LEVEL_LIST
        containerForAppLayerMeasConfig: null
        sliceScope:
        - sd: sd
          sst: 20
        - sd: sd
          sst: 20
        areaScope:
          nrCellIdList:
          - null
          - null
          tacList:
          - null
          - null
          plmnList:
          - mnc: null
            mcc: null
          - mnc: null
            mcc: null
          taiList:
          - tac: null
            nid: null
            plmnId:
              mnc: null
              mcc: null
          - tac: null
            nid: null
            plmnId:
              mnc: null
              mcc: null
        qoeTarget:
          imsi: null
          supi: null
        mbsCommunicationServiceType: MULTICAST
        qoeCollectionEntityAddress:
          ipv6Addr: 2001:db8:85a3::8a2e:370:7334
          ipv4Addr: 198.51.100.1
          ipv6Prefix: 2001:db8:abcd:12::0/64
        mdtAlignmentInfo: null
        qoeReference: null
      properties:
        qoeReference:
          $ref: "#/components/schemas/QoeReference"
        serviceType:
          $ref: "#/components/schemas/QoeServiceType"
        sliceScope:
          items:
            $ref: "#/components/schemas/Snssai"
          minItems: 1
          type: array
        areaScope:
          $ref: "#/components/schemas/QmcAreaScope"
        qoeCollectionEntityAddress:
          $ref: "#/components/schemas/IpAddr"
        qoeTarget:
          $ref: "#/components/schemas/QoeTarget"
        mdtAlignmentInfo:
          $ref: "#/components/schemas/MdtAlignmentInfo"
        availableRanVisibleQoeMetrics:
          items:
            $ref: "#/components/schemas/AvailableRanVisibleQoeMetric"
          minItems: 1
          type: array
        containerForAppLayerMeasConfig:
          $ref: "#/components/schemas/Bytes"
        mbsCommunicationServiceType:
          $ref: "#/components/schemas/MbsServiceType"
      required:
      - qoeReference
      type: object
    QoeReference:
      description: |
        String containing MCC (3 digits), MNC (2 or 3 digits)  and QMC ID (3 octets, encoded as 6 hexadecimal digits).
      pattern: "^[0-9]{3}-[0-9]{2,3}-[A-Fa-f0-9]{6}$"
      type: string
    QoeServiceType:
      description: |
        The enumeration QoeServiceType indicates the kind of service that shall be recorded for QMC. It shall comply with the provisions defined in TS 29.571, table 5.6.3.21-1.
      enum:
      - DASH
      - MTSI
      - VR
      type: string
    QmcAreaScope:
      description: |
        This IE contains the area in Cells or Tracking Areas where the QMC data collection shall take place.
      example:
        nrCellIdList:
        - null
        - null
        tacList:
        - null
        - null
        plmnList:
        - mnc: null
          mcc: null
        - mnc: null
          mcc: null
        taiList:
        - tac: null
          nid: null
          plmnId:
            mnc: null
            mcc: null
        - tac: null
          nid: null
          plmnId:
            mnc: null
            mcc: null
      properties:
        nrCellIdList:
          items:
            $ref: "#/components/schemas/NrCellId"
          minItems: 1
          type: array
        tacList:
          items:
            $ref: "#/components/schemas/Tac"
          minItems: 1
          type: array
        taiList:
          items:
            $ref: "#/components/schemas/Tai"
          minItems: 1
          type: array
        plmnList:
          items:
            $ref: "#/components/schemas/PlmnId"
          minItems: 1
          type: array
      type: object
    Tai:
      description: Contains the tracking area identity as described in 3GPP 23.003
      example:
        tac: null
        nid: null
        plmnId:
          mnc: null
          mcc: null
      properties:
        plmnId:
          $ref: "#/components/schemas/PlmnId"
        tac:
          $ref: "#/components/schemas/Tac"
        nid:
          $ref: "#/components/schemas/Nid"
      required:
      - plmnId
      - tac
      type: object
    IpAddr:
      description: Contains an IP adresse.
      example:
        ipv6Addr: 2001:db8:85a3::8a2e:370:7334
        ipv4Addr: 198.51.100.1
        ipv6Prefix: 2001:db8:abcd:12::0/64
      nullable: true
      oneOf: []
      properties:
        ipv4Addr:
          $ref: "#/components/schemas/Ipv4Addr"
        ipv6Addr:
          $ref: "#/components/schemas/Ipv6Addr"
        ipv6Prefix:
          $ref: "#/components/schemas/Ipv6Prefix"
      type: object
    Ipv6Prefix:
      description: |
        String identifying an IPv6 address prefix formatted according to clause 4 of RFC 5952. IPv6Prefix data type may contain an individual /128 IPv6 address.
      example: 2001:db8:abcd:12::0/64
      pattern: "^(((:|(0?|([1-9a-f][0-9a-f]{0,3}))):)((0?|([1-9a-f][0-9a-f]{0,3})):){0,6}(:|(0?|([1-9a-f][0-9a-f]{0,3})))(\\\
        /(([0-9])|([0-9]{2})|(1[0-1][0-9])|(12[0-8])))|((([^:]+:){7}([^:]+))|((([^:]+:)*[^:]+)?::(([^:]+:)*[^:]+)?))(\\\
        /.+))$"
      type: string
    QoeTarget:
      description: |
        This parameter specifies the target object (individual UE) for the QMC in case of signalling based QMC. It shall be able to carry an IMSI or a SUPI.
      example:
        imsi: null
        supi: null
      properties:
        supi:
          $ref: "#/components/schemas/Supi"
        imsi:
          $ref: "#/components/schemas/Imsi"
      type: object
    Imsi:
      description: String identifying an IMSI
      pattern: "^[0-9]{5,15}$"
      type: string
    MdtAlignmentInfo:
      description: "String containing:\n- Trace Reference: MCC (3 digits), MNC (2\
        \ or 3 digits), \n  Trace ID (3 octets, encoded as 6 hexadecimal digits)\n\
        - Trace Recording Session Reference (2 octets, encoded as 4 hexadecimal digits)\n"
      format: string
      pattern: "^[0-9]{3}-[0-9]{2,3}-[A-Fa-f0-9]{6}-[A-Fa-f0-9]{4}$"
    AvailableRanVisibleQoeMetric:
      description: |
        The enumeration AvailableRanVisibleQoeMetric indicates different available RAN-visible QoE metrics to the gNB. It shall comply with the provisions defined in TS 29.571, table 5.6.3.22-1.
      enum:
      - APPLICATION_LAYER_BUFFER_LEVEL_LIST
      - PLAYOUT_DELAY_FOR_MEDIA_STARTUP
      type: string
    MbsServiceType:
      description: Indicates the MBS service type of an MBS session
      enum:
      - MULTICAST
      - BROADCAST
      type: string
    TemporalValidity:
      description: Indicates the time interval(s) during which the AF request is to
        be applied.
      example:
        startTime: null
        stopTime: null
      properties:
        startTime:
          $ref: "#/components/schemas/DateTime"
        stopTime:
          $ref: "#/components/schemas/DateTime"
      type: object
    ClockQualityDetailLevel:
      description: Indicates the Clock Quality Detail Level.
      enum:
      - CLOCK_QUALITY_METRICS
      - ACCEPT_INDICATION
      type: string
    ClockQualityAcceptanceCriterion:
      description: Contains a Clock Quality Acceptance Criterion.
      example:
        clockQuality:
          traceabilityToGnss: true
          clockAccuracyValue: 16582432
          traceabilityToUtc: true
          clockAccuracyIndex: clockAccuracyIndex
          frequencyStability: null
        synchronizationState:
        - LOCKED
        - LOCKED
        parentTimeSource:
        - SYNC_E
        - SYNC_E
      properties:
        synchronizationState:
          items:
            $ref: "#/components/schemas/SynchronizationState"
          minItems: 1
          type: array
        clockQuality:
          $ref: "#/components/schemas/ClockQuality"
        parentTimeSource:
          items:
            $ref: "#/components/schemas/TimeSource"
          minItems: 1
          type: array
      type: object
    SynchronizationState:
      description: Indicates the Synchronization State.
      enum:
      - LOCKED
      - HOLDOVER
      - FREERUN
      type: string
    ClockQuality:
      description: Contains Clock Quality.
      example:
        traceabilityToGnss: true
        clockAccuracyValue: 16582432
        traceabilityToUtc: true
        clockAccuracyIndex: clockAccuracyIndex
        frequencyStability: null
      properties:
        traceabilityToGnss:
          type: boolean
        traceabilityToUtc:
          type: boolean
        frequencyStability:
          $ref: "#/components/schemas/Uint16"
        clockAccuracyIndex:
          pattern: "^[A-Fa-f0-9]{2}$"
          type: string
        clockAccuracyValue:
          maximum: 40000000
          minimum: 1
          type: integer
      type: object
    Uint16:
      description: |
        Integer where the allowed values correspond to the value range of an unsigned 16-bit integer.
      maximum: 65535
      minimum: 0
      type: integer
    TimeSource:
      description: Indicates the Time Source.
      enum:
      - SYNC_E
      - PTP
      - GNSS
      - ATOMIC_CLOCK
      - TERRESTRIAL_RADIO
      - SERIAL_TIME_CODE
      - NTP
      - HAND_SET
      - OTHER
      type: string
    ProseServiceAuth:
      description: |
        Indicates whether the UE is authorized to use related services.
      example:
        proseL2EndAuth: null
        proseL3EndAuth: null
        proseL2RelayAuth: null
        proseL3RemoteAuth: null
        proseL3RelayAuth: null
        proseDirectDiscoveryAuth: null
        proseL2RemoteAuth: null
        proseMultipathComL2RemoteAuth: null
        proseDirectCommunicationAuth: null
        proseL2UeRelayAuth: null
        proseL3UeRelayAuth: null
      properties:
        proseDirectDiscoveryAuth:
          $ref: "#/components/schemas/UeAuth"
        proseDirectCommunicationAuth:
          $ref: "#/components/schemas/UeAuth"
        proseL2RelayAuth:
          $ref: "#/components/schemas/UeAuth"
        proseL3RelayAuth:
          $ref: "#/components/schemas/UeAuth"
        proseL2RemoteAuth:
          $ref: "#/components/schemas/UeAuth"
        proseL3RemoteAuth:
          $ref: "#/components/schemas/UeAuth"
        proseMultipathComL2RemoteAuth:
          $ref: "#/components/schemas/UeAuth"
        proseL2UeRelayAuth:
          $ref: "#/components/schemas/UeAuth"
        proseL3UeRelayAuth:
          $ref: "#/components/schemas/UeAuth"
        proseL2EndAuth:
          $ref: "#/components/schemas/UeAuth"
        proseL3EndAuth:
          $ref: "#/components/schemas/UeAuth"
      type: object
    UeAuth:
      description: |
        Possible values are:
        - AUTHORIZED: Indicates that the UE is authorized.
        - NOT_AUTHORIZED: Indicates that the UE is not authorized.
      enum:
      - AUTHORIZED
      - NOT_AUTHORIZED
      type: string
    DateTime:
      description: string with format 'date-time' as defined in OpenAPI.
      format: date-time
      type: string
    EpsInterworkingInfo:
      description: |
        This information element contains the associations between APN/DNN and PGW-C+SMF selected by the AMF for EPS interworking.
      example:
        registrationTime: null
        epsIwkPgws:
          key:
            smfInstanceId: null
            plmnId:
              mnc: null
              mcc: null
            pgwFqdn: null
      properties:
        epsIwkPgws:
          additionalProperties:
            $ref: "#/components/schemas/EpsIwkPgw"
          description: A map (list of key-value pairs where Dnn serves as key) of
            EpsIwkPgws
          type: object
        registrationTime:
          $ref: "#/components/schemas/DateTime"
      type: object
    EpsIwkPgw:
      description: "This datatype signifies the PGW FQDN, SMF instance ID and the\
        \ PLMNId location."
      example:
        smfInstanceId: null
        plmnId:
          mnc: null
          mcc: null
        pgwFqdn: null
      properties:
        pgwFqdn:
          $ref: "#/components/schemas/Fqdn"
        smfInstanceId:
          $ref: "#/components/schemas/NfInstanceId"
        plmnId:
          $ref: "#/components/schemas/PlmnId"
      required:
      - pgwFqdn
      - smfInstanceId
      type: object
    Guami:
      description: "Globally Unique AMF Identifier constructed out of PLMN, Network\
        \ and AMF identity."
      example:
        plmnId:
          mnc: null
          nid: null
          mcc: null
        amfId: null
      properties:
        plmnId:
          $ref: "#/components/schemas/PlmnIdNid"
        amfId:
          $ref: "#/components/schemas/AmfId"
      required:
      - amfId
      - plmnId
      type: object
    AmfId:
      description: "String identifying the AMF ID composed of AMF Region ID (8 bits),\
        \ AMF Set ID (10 bits) and AMF  Pointer (6 bits) as specified in clause 2.10.1\
        \ of 3GPP TS 23.003. It is encoded as a string of  6 hexadecimal characters\
        \ (i.e., 24 bits). \n"
      pattern: "^[A-Fa-f0-9]{6}$"
      type: string
    SubscribedDefaultQos:
      description: "Provides the subsribed 5QI and the ARP, it may contain the priority\
        \ level."
      example:
        priorityLevel: null
        "5qi": null
        arp:
          priorityLevel: null
          preemptCap: NOT_PREEMPT
          preemptVuln: NOT_PREEMPTABLE
      properties:
        "5qi":
          $ref: "#/components/schemas/fiveQi"
        arp:
          $ref: "#/components/schemas/Arp"
        priorityLevel:
          $ref: "#/components/schemas/fiveQiPriorityLevel"
      required:
      - 5qi
      - arp
      type: object
    fiveQi:
      description: |
        Unsigned integer representing a 5G QoS Identifier (see clause 5.7.2.1 of 3GPP TS 23.501, within the range 0 to 255.
      maximum: 255
      minimum: 0
      type: integer
    Arp:
      description: Contains Allocation and Retention Priority information.
      example:
        priorityLevel: null
        preemptCap: NOT_PREEMPT
        preemptVuln: NOT_PREEMPTABLE
      properties:
        priorityLevel:
          $ref: "#/components/schemas/ArpPriorityLevel"
        preemptCap:
          $ref: "#/components/schemas/PreemptionCapability"
        preemptVuln:
          $ref: "#/components/schemas/PreemptionVulnerability"
      required:
      - preemptCap
      - preemptVuln
      - priorityLevel
      type: object
    ArpPriorityLevel:
      description: "nullable true shall not be used for this attribute. Unsigned integer\
        \ indicating the ARP Priority Level (see clause 5.7.2.2 of 3GPP TS 23.501,\
        \ within the range 1 to 15.Values are ordered in decreasing order of priority,\
        \ i.e. with 1 as the highest priority and 15 as the lowest priority. \n"
      maximum: 15
      minimum: 1
      nullable: true
      type: integer
    PreemptionCapability:
      description: |
        The enumeration PreemptionCapability indicates the pre-emption capability of a request on other QoS flows. See clause 5.7.2.2 of 3GPP TS 23.501. It shall comply with the provisions defined in table 5.5.3.1-1.
      enum:
      - NOT_PREEMPT
      - MAY_PREEMPT
      type: string
    PreemptionVulnerability:
      description: |
        The enumeration PreemptionVulnerability indicates the pre-emption vulnerability of the QoS flow to pre-emption from other QoS flows. See clause 5.7.2.2 of 3GPP TS 23.501. It shall comply with the provisions defined in table 5.5.3.2-1
      enum:
      - NOT_PREEMPTABLE
      - PREEMPTABLE
      type: string
    fiveQiPriorityLevel:
      description: "Unsigned integer indicating the 5QI Priority Level (see clauses\
        \ 5.7.3.3 and 5.7.4 of 3GPP TS 23.501, within the range 1 to 127.Values are\
        \ ordered in decreasing order of priority,  i.e. with 1 as the highest priority\
        \ and 127 as the lowest priority. \n"
      maximum: 127
      minimum: 1
      type: integer
    UpSecurity:
      description: Contains Userplain security information.
      example:
        upIntegr: REQUIRED
        upConfid: REQUIRED
      properties:
        upIntegr:
          $ref: "#/components/schemas/UpIntegrity"
        upConfid:
          $ref: "#/components/schemas/UpConfidentiality"
      required:
      - upConfid
      - upIntegr
      type: object
    UpIntegrity:
      description: "indicates whether UP integrity protection is required, preferred\
        \ or not needed for all the traffic on the PDU Session. It shall comply with\
        \ the provisions defined in  table 5.4.3.4-1. \n"
      enum:
      - REQUIRED
      - PREFERRED
      - NOT_NEEDED
      type: string
    UpConfidentiality:
      description: |
        indicates whether UP confidentiality protection is required, preferred or not needed for all the traffic on the PDU Session. It shall comply with the provisions defined in table 5.4.3.5-1.
      enum:
      - REQUIRED
      - PREFERRED
      - NOT_NEEDED
      type: string
    NefId:
      description: Identity of the NEF
      type: string
    AcsInfo:
      description: "The ACS information for the 5G-RG is defined in BBF\_TR-069\_\
        [42] or in BBF\_TR-369"
      example:
        acsUrl: null
        acsIpv4Addr: 198.51.100.1
        acsIpv6Addr: 2001:db8:85a3::8a2e:370:7334
      properties:
        acsUrl:
          $ref: "#/components/schemas/Uri"
        acsIpv4Addr:
          $ref: "#/components/schemas/Ipv4Addr"
        acsIpv6Addr:
          $ref: "#/components/schemas/Ipv6Addr"
      type: object
    EcsAddrConfigInfo:
      example:
        snssai:
          sd: sd
          sst: 20
        dnn: null
        spatialValidityCond:
          countries:
          - null
          - null
          geographicalServiceArea:
            geographicAreaList:
            - null
            - null
            civicAddressList:
            - POBOX: POBOX
              usageRules: usageRules
              country: country
              PRD: PRD
              PLC: PLC
              HNO: HNO
              PRM: PRM
              HNS: HNS
              FLR: FLR
              A1: A1
              A2: A2
              A3: A3
              A4: A4
              STS: STS
              A5: A5
              A6: A6
              RDSEC: RDSEC
              providedBy: providedBy
              LOC: LOC
              UNIT: UNIT
              SEAT: SEAT
              POD: POD
              RDBR: RDBR
              method: method
              LMK: LMK
              POM: POM
              ADDCODE: ADDCODE
              RD: RD
              PC: PC
              PCN: PCN
              NAM: NAM
